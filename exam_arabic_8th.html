<script>
// Progress saving & loading utility
const pageName = window.location.pathname.split("/").pop() || "index.html";
const examKey = "exam_progress_" + pageName;

function getSavedAnswers() {
  try {
    return JSON.parse(localStorage.getItem(examKey)) || {};
  } catch (e) {
    return {};
  }
}

function saveAnswer(qNum, value) {
  const answers = getSavedAnswers();
  answers[qNum] = value;
  localStorage.setItem(examKey, JSON.stringify(answers));
}

function clearProgress() {
  if (confirm("هل أنت متأكد من رغبتك في مسح جميع إجاباتك والبدء من جديد؟")) {
    localStorage.removeItem(examKey);
    window.location.reload();
  }
}

function restoreProgress() {
  const answers = getSavedAnswers();
  for (const qNum in answers) {
    const qdiv = document.getElementById("q" + qNum);
    if (!qdiv) continue;
    const ul = qdiv.querySelector(".options");
    if (ul) {
      const selectedIndex = answers[qNum];
      const lis = ul.querySelectorAll("li");
      if (lis[selectedIndex]) {
        lis[selectedIndex].classList.add("selected");
      }
    }
    const ta = qdiv.querySelector(".essay-box");
    if (ta) {
      ta.value = answers[qNum];
    }
  }
}

dameer: `من مقال للأستاذ أحمد أمين (بتصرف): الضمير الحي

نشعر بالضمير الحي كأنه صوت ينبعث من أعماق صدورنا، يأمرنا بالخير، وينهانا عن الشر، ولو لم نرج مكافأة أو نخش عقوبة، نرى البائس الفقير يجد مالًا أو متاعًا وهو أشد ما يكون حاجة إلى مثله، ولم يكن يراه أحد إلا ربه، ثم هو يتعفف عنه ويؤديه إلى صاحبه، فما الذي حمله على ذلك؟! لا شيء إلا الضمير يأمر صاحبه بعمل الواجب لا لمثوبة ولا عقوبة إلا مثوبة الدنيا بارتياح نفسه أو تأنيبها، ومثوبة الآخرة التي يرجوها من ربه.

ثمة مؤثرات يتأثر بها الضمير، منها: الحالة الاجتماعية للأمم والأفراد، ومدى تغلغل الأعراف والتقاليد ذات النزعة الإنسانية؛ فالإنسان ينشأ في أسرة تستحسن أعمالًا وتستقبح أخرى فيتبعها في استحسانها أو استقباحها، ويتأثر كذلك بدرجة رقي الأمة أو تخلفها، كما يتأثر بدرجة عقل الإنسان وعلمه؛ فكلما زاد علم الإنسان ونما عقله ارتقى ضميره؛ ذلك أن الخبرة والتجربة والمعرفة بعواقب الأمور النافعة والضارة توسع العقل، فيتبع ذلك ارتقاء ضميره، حتى قد يأمره ضميره بعد هذه التجارب بما كان ينهاه عنه من قبل، لأن عقله عرف من الحقائق ما كان يجهله، بل هو إذا وصل إلى درجة كبيرة من رقي العقل كان ضميره تابعًا لعقله أكثر من تبعته لتقاليد قومه، والأهم من ذلك كله أن يكون لدى الإنسان المتعلم قناعة راسخة أن العلم النظري لا قيمة له ما لم يتحول إلى سلوك عملي؛ لأن تلك القناعة إذا ضعفت ستجد انفصامًا حادًا بين النظرية والتطبيق، فقد تصادف أحيانًا كائنًا منظم العقل ثري الثقافة لكنه قد يكون حاقد القلب، أو جشع النفس، أو تافه المقصد أو تجتمع فيه كل تلك الموبقات؛ لأنه منعدم الضمير.

لا قيمة للضمير يأمر وينهى إذا لم يدعم ذلك إرادة تنفذ أمره ونهيه، فقد يشعر الإنسان بالواجب، ويتأكد من أنه واجب، ويأمره ضميره به، ولكن يذهب كل ذلك هباء إذا لم يمنح إرادة قوية تخرج هذا الأمر إلى الوجود، فالإرادة هي القوة الفاعلة في الإنسان وبدونها تكون أوامر الضمير أحلامًا وأمانيًا لا قيمة لها.

الضمير ككل ـــ ملكات الإنسان وقواه الفطرية ـــ ينمو بالتربية، ويضعف بالإهمال، فعصيان الضمير يضعفه أو يميه، كالأديب الذي يتذوق الشعر والأدب، فإذا هو أهمل قراءة الأدب واشتغل «بالرياضة» - مثلًا - ضعف ذوقه الأدبي، ولربما وصل إلى الابتذال، وكذلك الحال بالنسبة للضمير، فعندما يعصي الإنسان ضميره مرة يحس بلذع شديد جراء عصيانه، فإذا لم يتأثر بهذا اللذع ويعدل سلوكه سيضعف هذا الوازع اللاذع، وكلما تكرر اللذع، ولم يعدل السلوك ازداد الضمير وهنًا على وهن، حتى نرى صاحبه يخلق المعاذير، ويبرر ارتكاب الأخطاء، بل ربما أقنع نفسه بأن سيئاته حسنات، ومع تقدم العمر تزداد القناعات الخطأ أكثر رسوخًا، "ومن شبّ على شيء شاب عليه". وكما يضعف الضمير بالعصيان يضعف بصحبة الأشرار وإطالة القراءة في الكتب الساقطة، فكلاهما يكرر منظر الشر أمام النفس حتى تعتاده، وكلاهما يتحدث عن الشر حديث المستحسن فيتخدر الضمير ويخمد صوته، وتخمل قواه.

إن من أهم الأمور التي تضمن حياة الضمير صَقْله بمداومة الطاعة، وتنشيطه بسرعة الاستجابة لندائه، وتغذيته بقراءة الكتب التي تدعو إلى الفضيلة، وتحويل المقروء النظري إلى تطبيق سلوكي، ومثول القدوة الصالحة بصحبة الأخيار. فما أحوجنا إلى ضمير حي! فإن أحسن ما في الإنسان ضميره، فهو الدليل الذي يهدي إلى سبل السلام.`,

 options:["يتفاوت ويتدرج.","يضطرب ويهتز.","يضعف ويتبلد.","يتوارى ويختفي."],
 correct:2,
 explain:"لأن السياق يتحدث عن إضعاف الضمير حتى يصبح غير قادر على التمييز والشعور، وهذا معناه يضعف ويتبلد."},

{n:26, type:"mcq", passage:"dameer", text:"26- بين – من خلال فهمك الفقرة الثانية- المعيار الأقوى تأثيرًا في إصلاح الضمير وإحيائه.",
 options:["ترقية الحياة الاقتصادية للأمم والأفراد، ضمانًا لعيش الجميع في ثراء ورفاهية.","مقاومة العادات والتقاليد الخاطئة التي تربت عليها بعض الأمم ونشأت عليها الأفراد.","مداومة القراءة، وكثرة الاطلاع، واتساع المعرفة والاهتمام بالجانب النظري للعلم.","المواءمة بين تثقيف العقل، وتعديل السلوك وفق المعارف والخبرات الجديدة النافعة."],
 correct:3,
 explain:"لأن الكاتب أكد أن ارتقاء العقل بالعلم والخبرة يجب أن يقترن بتحوّل ذلك إلى سلوك عملي وتعديل للتقاليد القديمة الخاطئة، وهذا هو المعيار الأقوى في إصلاح الضمير."},

{n:27, type:"mcq", passage:"dameer", text:"27- استنتج المغزى من قول الكاتب: \"يحس بلذع شديد جراء عصيانه\" في سياق الفقرة الرابعة.",
 options:["التخويف من شدة الألم الناتج عن مخالفة العادات، وعدم الاكتراث بقوانين المجتمع.","التأكيد على أن الضمير قواه الفطرية مركوزة في نفوسنا، تتأثر بما يبقيه أو يفنيه.","التحذير من الانسياق وراء شهوات النفس وغرائزها.","التنفير من التجاوزات التي يرتكبها فاسدو الأخلاق."],
 correct:1,
 explain:"لأن العبارة تبين أن الضمير يستجيب فطريًا بالألم عند مخالفته، وهذا يؤكد أن قواه الفطرية المركوزة في النفس تتأثر سلبًا بالإهمال والعصيان أو إيجابًا بالتربية."},

{n:28, type:"mcq", passage:"dameer", text:"28- هات من النص السابق ما يؤيد مضمون قول حافظ إبراهيم: \"كم عالمٍ مدّ العلومَ حبائلًا لوقيعةٍ وقطيعةٍ وفراقِ\".",
 options:["\"وكلما تكرر اللذع، ولم يعدل السلوك ازداد الضمير وهنًا على وهن\"","\"فإذا أهمل قراءة الأدب واشتغل «بالرياضة» ضعف ذوقه الأدبي، ولربما وصل إلى الابتذال\"","\"ستصادف أحيانًا كائنًا منظم العقل ثري الثقافة لكنه قد يكون حاقد القلب، أو جشع النفس\"","\"يتحدث عن الشر حديث المستحسن فيتخدر الضمير ويخمد صوته\""],
 correct:2,
 explain:"لأن بيت حافظ إبراهيم يصور عالمًا استخدم علمه أداة للإيقاع بالآخرين والتفريق بينهم، وهذا يطابق ما ذكره الكاتب عن إمكانية وجود كائن ثري الثقافة لكنه حاقد القلب أو جشع النفس رغم علمه."},

{n:29, type:"mcq", passage:"dameer", text:"29- استنتج علاقة عبارة: \"حتى نرى صاحبه يخلق المعاذير\" في الفقرة الرابعة بما قبلها.",
 options:["تعليل.","نتيجة.","استدراك.","توضيح."],
 correct:1,
 explain:"لأن خلق المعاذير هو نتيجة مباشرة لتكرار اللذع وعدم تعديل السلوك وازدياد ضعف الضمير الذي سبق ذكره."},

{n:30, type:"mcq", passage:"dameer", text:"30- ميّز نوع الصورة، وبين سر جمالها وقيمتها الفنية في قوله: \"الضمير.. ينمو بالتربية، ويضعف بالإهمال\".",
 options:["تشبيه بليغ، توضيح، ويوحي بالأثر الإيجابي لتربية الضمير على الخصال الحميدة.","تشبيه تمثيلي، توضيح، ويوحي بالأثر السيئ لمخالفة الضمير وعدم الاستجابة له.","تشبيه ضمني، تجسيم ويوحي بأهمية الالتزام بقيم المجتمع وعدم مخالفته.","استعارة مكنية، تجسيم، وتوحي بضرورة تزكية الضمير، والعمل على تنشيطه."],
 correct:3,
 explain:"لأن الكاتب صوّر الضمير شيئًا حيًا ينمو ويضعف، وحذف المشبه به (وهو الكائن الحي أو النبات) وأبقى من لوازمه (ينمو، يضعف)، فهذه استعارة مكنية تجسيم الضمير وتوحي بأهمية تنشيطه وتزكيته."},

{n:31, type:"mcq", passage:"dameer_q31", text:"31- وازن بين العبارتين من حيث وسائل الإقناع التي اعتمد عليها.",
 options:["اعتمد الكاتب على وسائل التأكيد كالإطناب والترادف، وضرب الأمثلة، والاستشهاد بالأقوال المأثورة، بينما اعتمد الزيات على وسائل التأكيد كالترادف، واللجوء إلى الإحصاء.","كل الكاتبين اعتمد على الإحصاء بالإضافة إلى الاستعانة بوسائل أخرى كالترادف والاعتراض.","كل الكاتبين لم يدعم فكرته بوسائل تقنع القارئ بها.","اعتمد الزيات على وسائل التأكيد كالإطناب والترادف، وضرب الأمثلة، والاستشهاد بالأقوال المأثورة، بينما اعتمد الكاتب على وسائل التأكيد كالإطناب، واللجوء إلى الإحصاء."],
 correct:0,
 explain:"لأن أحمد أمين استخدم الإطناب والترادف وضرب الأمثلة والاستشهاد بالحكمة المأثورة (ومن شبّ على شيء شاب عليه)، بينما اعتمد الزيات في مقاله على الترادف واللجوء إلى الإحصاء (ذكر أعداد الآيات)."},

{n:32, type:"mcq", passage:null, text:"\"يتحقق التكوين الفني في المقال إذا استطاع الكاتب أن يبني مقاله على التسلسل المنطقي والترابط بين أفكاره، مع التحليل والعرض الشائق\"\n\n32- بين – من خلال المقال السابق- كيف نجح الكاتب في تحقيق مبدأ \"التكوين الفني\".",
 options:["بدأ بالنتائج والمسببات، وبعدهما المقدمات، ليحقق عنصر التشويق والإمتاع.","بدأ بتهيئة للموضوع، ثم انتقل إلى التفاصيل، التي عبر منها إلى الخاتمة، ولم يغفل عنصر التشويق.","عرض في بداية مقاله زعمًا خطأ يدّعيه بعض الناس، ثم أخذ يفند هذا الزعم بالأدلة.","ضمّ مقاله عدة أفكار متباينة، محاولًا الربط بينها بأدلة عقلية، واستشهاد بالأقوال المأثورة."],
 correct:1,
 explain:"لأن الكاتب بدأ بتعريف الضمير وتمهيد للموضوع، ثم تناول المؤثرات فيه، فالإرادة، فنموه وضعفه، منتقلًا بترابط منطقي إلى خاتمة تدعو للحفاظ عليه، محققًا التسلسل والتشويق."},

{n:33, type:"mcq", passage:"samman", text:"33- استنتج من خلال الفقرة السابقة ملمحًا رئيسًا في بناء القصة القصيرة فنيًا.",
 options:["الاعتماد على تفاصيل الإنشاء؛ لتعطي العمل الفني تشويقًا.","اختيار العبارات والمواقف الدالة على الفكرة بدقة؛ ليتحقق التكثيف والتركيز.","اتخاذ الحوار مرتكزًا أساسيًا في عملية البناء الدرامي؛ لتطور الحدث وتدرجه.","استخدام لغة الحياة اليومية؛ ليتحقق أساس محاكاة الواقع."],
 correct:1,
 explain:"لأن الكاتبة في جملة قصيرة ومكثفة عبّرت عن انشغال أمها الدائم دون تفصيل أو استطراد، وهذا يعكس التكثيف والتركيز في اختيار العبارات الدالة، وهو ملمح رئيس في بناء القصة القصيرة."},

{n:34, type:"mcq", passage:null, text:"قال الشاعر: وما كل ساعٍ نفسه سؤل بالغ      ولا كل طلاب يصاحبه الرشد\n\n34- ميز المحل الإعرابي لجملة \"يصاحبه الرشد\".",
 options:["رفع خبر.","جر نعت.","نصب حال.","جر مضاف إليه."],
 correct:1,
 explain:"لأن الجملة (يصاحبه الرشد) وقعت نعتًا لكلمة (طلاب) النكرة التي قبلها، فمحلها الإعرابي جر نعت."},

{n:35, type:"mcq", passage:null, text:"قال الشاعر: الحقُّ كلَّ سلاحهم وكفاحهم      والحقُّ نِعْمَ مُثبِت الأقدام\n\n35- ميز إعراب كلمة (الحق) الواردة في الشطر الثاني من البيت السابق.",
 options:["خبر لمبتدأ محذوف.","معطوف.","مفعول معه.","مبتدأ."],
 correct:3,
 explain:"لأن كلمة (الحق) في الشطر الثاني وقعت في بداية الجملة وأخبر عنها بـ (نعم مثبت الأقدام)، فهي مبتدأ مرفوع."},

{n:36, type:"mcq", passage:null, text:"قال الشاعر: فأجمل أخلاقِ الفتى ما تكافأتْ      بمنزلةٍ بين التواضع والكبر\n\n36- بين المفضَّل الوارد في البيت السابق.",
 options:["أخلاق.","التواضع.","ما تكافأت.","الفتى."],
 correct:2,
 explain:"لأن اسم التفضيل (أجمل) دخل على (أخلاق)، والمفضَّل هو ما تكافأت بمنزلة بين التواضع والكبر، أي الخُلq المتكافئ والمتوسط بين الطرفين هو المفضَّل."},

{n:37, type:"mcq", passage:null, text:"قال الشاعر: وثاروا فجُنَّ جنونُ الرياح      وزُلزلتِ الأرضُ زلزالَها\n\n37- حدد الإعراب الصحيح لكلمة \"جنون\" كما وردت في سياق البيت.",
 options:["فاعل مرفوع.","مفعول مطلق.","نائب فاعل مرفوع.","توكيد لفظي."],
 correct:0,
 explain:"لأن الفعل (جُنَّ) مبني للمجهول، وكلمة (جنون) وقعت بعده نائبة عن الفاعل... إلا أنها هنا هي الفاعل المرفوع لفعل (جُنَّ) المبني للمعلوم بمعنى أصابه الجنون، فهي فاعل مرفوع."},

{n:38, type:"mcq", passage:null, text:"38- ميز - مما يلي – الجملة التي ورد بها مصدر رباعي.",
 options:["كل مصري أصيل متحمل مسئولياته بعزة وإباء.","الحكيم من يعمل على مجاراة منجزات العصر واستخدامها بوعي.","من مطالب الذكاء الاجتماعي التحلي بالوعي في الحديث مع الآخرين.","الأفكار الهدامة مقاومة بشدة من محبي الخير."],
 correct:1,
 explain:"لأن كلمة (مجاراة) مصدر للفعل الرباعي (جارى) على وزن (مفاعلة)، وهو مصدر رباعي."},

{n:39, type:"mcq", passage:null, text:"39- بين - مما يلي – الجملة التي ورد بها أسلوب استثناء تام منفي.",
 options:["كل إنسان يسعى لعمل غير نافع لا يقدره المجتمع الرشيد.","إذا أردت أن تحقق هدفك فلا تسعَ إلا لنهضة مجتمعك.","لا يسمح لأحد بالوقوف على المنصة إلا ذوي الفصاحة.","بناء الوطن والسعي لارتقائه لا يصدر إلا من إنسان حريص."],
 correct:2,
 explain:"لأن الجملة (لا يسمح لأحد... إلا ذوي الفصاحة) تحتوي على مستثنى منه مذكور (أحد) وأداة استثناء (إلا) وجملة منفية، فهي أسلوب استثناء تام منفٍ، والمستثنى فيها منصوب (ذوي)."},

{n:40, type:"mcq", passage:null, text:"قال الشاعر: ومن ذلّ خوفَ الموت كانت حياته      أضرَّ عليه من حِمامٍ يؤدِّدُه\n\n40- بين سبب نصب كلمة \"خوف\" في البيت السابق.",
 options:["مفعول به.","مفعول لأجله.","تمييز.","نائب عن المفعول المطلق."],
 correct:1,
 explain:"لأن كلمة (خوف) تبين سبب الذل (ذلّ من أجل الخوف من الموت)، فهي مفعول لأجله منصوب."},

{n:41, type:"mcq", passage:null, text:"يا نديمي من سرنديب كفًّا عن ملامي\n\n41- ميز نوع المنادى في العبارة السابقة.",
 options:["مضاف.","شبيه بالمضاف.","نكرة مقصودة.","نكرة غير مقصودة."],
 correct:0,
 explain:"لأن المنادى (نديمي) أضيف إلى ياء المتكلم (نديم + ي)، فهو منادى مضاف."},

{n:42, type:"mcq", passage:null, text:"42- ميز من بين الجمل التالية الجملة التي بها اسم فعل مضارع.",
 options:["شتان ما بين عقل يفكر وآخر يردد ما يسمع.","ويك لمن يقصر ويرجو أن يرتقي ذراع المجد.","من أراد التفوق فعليه بالعلم يتخذه سلاحًا.","هيهات أن يحقق العدو أهدافه في أمة واعية."],
 correct:1,
 explain:"لأن (ويك) اسم فعل مضارع بمعنى (أعجب)، بينما (شتان) و(هيهات) اسما فعل ماضٍ."},

{n:43, type:"mcq", passage:null, text:"43- ميز من بين البدائل التالية الكلمة المعربة بعلامة إعراب فرعية.",
 options:["لا تراقب أقوات الناس؛ فلكل رزقه.","من يدع الشر يستفد من الحياة.","تتقدم الدول النامية وإنجازاتها.","المتحف الكبير من أرقى ما أُريَتْه."],
 correct:1,
 explain:"لأن الفعل (يدع) في جواب الشرط مجزوم بحذف حرف العلة (الواو)، وهي علامة إعراب فرعية لفعل من الأفعال المعتلة الآخر (المعتل الفعل يَدَعُ من وَدَعَ)."},

{n:44, type:"mcq", passage:null, text:"قال الشاعر: ولم تَضِق الحياةُ بنا ولكنْ      زحامُ السوءِ ضيَّقها مَجالًا\n\n44- بين إعراب كلمة \"مَجالًا\" في البيت السابق.",
 options:["مفعول به.","تمييز.","مفعول لأجله.","حال."],
 correct:0,
 explain:"لأن الفعل (ضيَّق) يحتاج إلى مفعول به، وكلمة (مَجالًا) هي ما ضاق نتيجة الزحام، فهي مفعول به منصوب."},

{n:45, type:"mcq", passage:null, text:"قال الشاعر: نعم صديق المرء من كان عونه      وبئس ...... من لا يعين على الدهر\n\n45- املأ الفراغ في البيت السابق بالكلمة الصحيحة.",
 options:["رجل.","امرؤ.","امرأ.","امرئ."],
 correct:2,
 explain:"لأن فاعل (بئس) يكون منصوبًا على التمييز إذا كان نكرة مفردة دالة على الجنس، فتكون الكلمة الصحيحة (امرأ) المنصوبة بالألف لأنها ممنوعة من الصرف وتأخذ حركة النصب الظاهرة على آخرها (امرأً)."},

{n:46, type:"mcq", passage:null, text:"قال الشاعر: يشتهي النيل أن يشيد دولةً      عرضها الثرى والسماء عليه\n\n46- ميز المحل الإعرابي لجملة \"عرضها الثرى\" الواردة في البيت السابق.",
 options:["نصب حال.","نصب نعت.","رفع خبر.","جر مضاف إليه."],
 correct:1,
 explain:"لأن الجملة (عرضها الثرى) وقعت نعتًا لكلمة (دولة) النكرة المنصوبة، فمحلها الإعرابي نصب نعت."},

{n:47, type:"mcq", passage:null, text:"قال الشاعر: أنا الرجل المشفوع بالفعل قولُه      إذا ما عقيد القوم رثَّتْ عقوده\n\n47- ميز الإعراب الصحيح لكلمة \"قولُه\" الواردة في البيت السابق.",
 options:["مضاف إليه مجرور.","مبتدأ مؤخر مرفوع.","نائب فاعل مرفوع.","بدل مطابق مجرور."],
 correct:2,
 explain:"لأن (المشفوع) اسم مفعول عامل، وكلمة (قولُه) نائب فاعل له مرفوع، أي أن القول هو ما يُشفوع به الفعل."},

{n:48, type:"mcq", passage:null, text:"قال الشاعر: لا تقطعنّ ذنب الأفعى وترسلها      إن كنت شهمًا فأتبع رأسها الذنبا\n\n48- بين نوع الواو في البيت السابق، وأعرب ما بعدها.",
 options:["واو العطف – مضارع مرفوع.","واو المعية – مضارع منصوب.","واو الحال – مضارع مرفوع.","واو القسم – مضارع مبني."],
 correct:1,
 explain:"لأن الواو هنا تفيد المصاحبة (واو المعية) بعد النهي، والفعل (ترسلها) منصوب بعدها بفتحة مقدرة لأنه مضارع مسبوق بواو المعية بعد نهي."},

{n:49, type:"mcq", passage:null, text:"\"ممّا يُؤثَر عن أجدادنا الفراعنة أنهم حرصوا أشد الحرص على نهر النيل العظيم\"\n\n49- حدد المحل الإعرابي للمصدر المؤول (أنهم حرصوا) الوارد في العبارة السابقة.",
 options:["رفع خبر.","رفع فاعل.","رفع مبتدأ.","رفع نعت."],
 correct:1,
 explain:"لأن الفعل (يُؤثَر) مبني للمجهول ويحتاج إلى فاعل، والمصدر المؤول (أنهم حرصوا) سدّ مسدّ الفاعل، فمحلها الإعرابي رفع فاعل."},

{n:50, type:"mcq", passage:null, text:"50- حدد - مما يلي - التفصيلة التي لا يمكن الاستغناء عنها في مقال يدور حول زيادة الأمان وتقليل حوادث الطرق.",
 options:["منع السير بالسيارات صغيرة الحجم والتي تكون سريعة بطبعها، ويصعب رصدها من خلال أجهزة الرادار.","رفع الكفاءة المهنية والطبية والنفسية للمسعفين، وإمدادهم بما يحتاجون إليه من أدوية ووسائل طبية.","تخيُّر أوقات السير المناسبة، وعدم السير على الطرق التي ما زالت قيد الإنشاء، والكشف الدوري على السائقين.","عدم السير في الأوقات المزدحمة كأوقات خروج الموظفين من أعمالهم، وخروج الطلاب من مدارسهم."],
 correct:2,
 explain:"لأن هذه التفصيلة (تخيُّر أوقات السير، تجنب الطرق غير المكتملة، الكشف الدوري على السائقين) ترتبط ارتباطًا مباشرًا وأساسيًا بالوقاية من حوادث الطرق نفسها، فلا يمكن الاستغناء عنها، بخلاف التفصيلات الأخرى التي تتعلق بنتائج الحوادث أو جوانب فرعية."},

{n:51, type:"mcq", passage:null, text:"\"تواجه اللغة العربية تحديات ضخمة في ظل عالم الرقمنة والذكاء الاصطناعي وقبل كل هذا منصات التواصل الاجتماعي، ومزاحمة اللغة العامية للغة الفصحى مع التطور السريع في عالم التقنية، واتجاه الحكومات والمؤسسات نحو الرقمنة، والثورة التكنولوجية وموجة التغريب وطمس الهوية العربية وعملية الذوبان والتماهي في شخصية الآخر والسعي نحو تمجيد اللغات الأجنبية على حساب اللغة الأم\"\n\n\"إن إيجاد محرك بحث عربي ذكي يتعامل بشكل علمي مع خصائص اللغة العربية، وترجمة المصطلحات وتعريبها، وإتاحة المحلل الصرفي، وتوسيع عمليات الرقمنة لتشمل النصوص الإبداعية القديمة منها والحديثة، بغاية أرشفتها وحفظها إلكترونيًا، مع التعاون بين المكتبات العربية، إضافة إلى ذلك لحاق العرب بتقنية الويب الدلالية، وجعل اللغة الفصحى لغة حياة بين أبناء المجتمعات سوف يسهم بشكل كبير في تحقيق الهدف المرجو.\"\n\n51- حدد النموذج الأمثل للربط بين الفقرتين السابقتين في سياق مقال عن \"تحديات اللغة العربية: الواقع والمأمول\".",
 options:["سبب – نتيجة.","زعم – تفنيد.","رأي – دليل.","مشكلة – حل."],
 correct:3,
 explain:"لأن الفقرة الأولى تعرض مشكلة (تحديات تواجه اللغة العربية)، والفقرة الثانية تعرض حلولًا مقترحة لمواجهة هذه التحديات، فالنموذج الأمثل للربط هو (مشكلة - حل)."},

{n:52, type:"essay", passage:null, text:"\"إن الرؤية التي انطلقت منها فكرة المتحف تهدف إلى الحفاظ على التراث المصري الفريد، وصونه للأجيال القادمة مع تقديمه في صورة عصرية تجمع بين الأصالة والابتكار، والاستدامة، والاستدامة هنا لا تقتصر على حماية القطع الأثرية فحسب، بل تمتد لتشمل: الحفاظ على التراث والهوية، والتعليم ونقل المعرفة عبر برامج بحثية وتعليمية تفاعلية، والمشاركة المجتمعية من كل فئات المجتمع المحلي والدولي لتبادل الرؤى وحوار الحضارات، وبهذا فإن المتحف لا يقدم الماضي في صورته التقليدية فحسب، بل يربط بين التاريخ والحاضر والمستقبل؛ ليكون منصة حية تضمن استمرار التراث المصري كمصدر إلهام ونبع معرفة يفيض ولا يغيض على مر الأجيال.\"\n\n52- هات من الفقرة أربعة أدلة تؤكد أن مفهوم الاستدامة في المتحف المصري الكبير تجاوز البعد البيئي التقليدي ليشمل أبعادًا حضارية واجتماعية.",
 model:"يكتب الطالب أربعة مما يلي:\n(أ) الحفاظ على التراث المصري الفريد، وصونه للأجيال القادمة مع تقديمه في صورة عصرية تجمع بين الأصالة والابتكار، والاستدامة.\n(ب) الحفاظ على التراث والهوية، والتعليم ونقل المعرفة عبر برامج بحثية وتعليمية تفاعلية.\n(ج) المشاركة المجتمعية من كل فئات المجتمع المحلي والدولي لتبادل الرؤى وحوار الحضارات.\n(د) يربط بين التاريخ والحاضر والمستقبل ليكون منصة حية تضمن استمرار التراث المصري كمصدر إلهام ونبع معرفة."},

{n:53, type:"essay", passage:null, text:"قال طه حسين في سيرته الذاتية:\n\"وهو يذكر أنه كان يستطيع أن يتقدم يمينًا وشمالًا على شاطئ القناة دون أن يخشى كلاب العدويين أو مكر سعيد وامرأته، وهو يذكر أنه كان يقضي ساعات من نهاره على شاطئ القناة سعيدًا مبتهجًا بما سمع من نغمات «حسن» الشاعر يتغنى بشعره في أبي زيد وخليفة ودياب، حين يرفع الماء بشادوفه ليسقي به زرعه على الشاطئ الآخر للقناة، وهو يذكر أنه استطاع غير مرة أن يعبر هذه القناة على كتف أحد إخوته دون أن يحتاج إلى خاتم الملك، وأنه ذهب غير مرة إلى حيث كانت تقوم وراء القناة شجراتٌ من التوت فأكل من توتها ثمرات لذيذة، وهو يذكر أنه تقدم غير مرة عن يمينه على شاطئ القناة حتى وصل إلى حديقة المعلم وأكل فيها غير مرة تفاحًا، وقطف لها فيها غير مرة نعناعٌ وريحان، ولكنه عاجز كل العجز أن يتذكر كيف استحالت الحال وتغيّر وجه الأرض من طوره الأول إلى هذا الطور الجديد\"\n\n53- حدد من الفقرة دليلين على استطاعة تخطي القناة، ثم استنتج سمة أسلوبية من سمات الكاتب، وهات من العبارة ما يدل عليها.",
 model:"الدليل الأول: وهو يذكر أنه استطاع غير مرة أن يعبر هذه القناة على كتف أحد إخوته دون أن يحتاج إلى خاتم الملك.\nالدليل الثاني: ذهب غير مرة إلى حيث كانت تقوم وراء القناة شجرات من التوت فأكل من توتها ثمرات لذيذة.\nالسمة الأسلوبية للكاتب: اللوازم الأسلوبية المتكررة – الموضوعية والتعبير عن نفسه بضمير الغائب.\nالعبارة التي تدل عليها من الفقرة: تكرار جملة (وهو يذكر)."},

const container=document.getElementById("examArea");
let lastPassage=null,lastSection=null;
data.forEach(q=>{
  if(q.section&&q.section!==lastSection){const s=document.createElement("h2");s.textContent=q.section;container.appendChild(s);lastSection=q.section;lastPassage=null;}
  if(q.passage&&q.passage!==lastPassage){const p=document.createElement("div");p.className="passage";p.textContent=passages[q.passage];container.appendChild(p);lastPassage=q.passage;}
  if(!q.passage)lastPassage=null;
  const qdiv=document.createElement("div");qdiv.className="question";qdiv.id="q"+q.n;
  const qt=document.createElement("div");qt.className="qtext";qt.textContent=q.text;qdiv.appendChild(qt);
  if(q.type==="mcq"){
    const ul=document.createElement("ul");ul.className="options";
    const L=["أ","ب","ج","د"];
    q.options.forEach((opt,i)=>{const li=document.createElement("li");li.textContent=L[i]+") "+opt;li.dataset.index=i;li.onclick=()=>{if(qdiv.classList.contains("checked"))return;ul.querySelectorAll("li").forEach(l=>l.classList.remove("selected"));li.classList.add("selected");saveAnswer(q.n,i);};ul.appendChild(li);});
    qdiv.appendChild(ul);
    const exp=document.createElement("div");exp.className="explain";exp.textContent="التوضيح: "+q.explain;qdiv.appendChild(exp);
  }else{
    const ta=document.createElement("textarea");ta.className="essay-box";ta.placeholder="اكتب إجابتك هنا...";ta.oninput=(e)=>{saveAnswer(q.n,e.target.value);};qdiv.appendChild(ta);
    const ans=document.createElement("div");ans.className="model-answer";ans.textContent="الإجابة النموذجية:\n"+q.model;qdiv.appendChild(ans);
  }
  container.appendChild(qdiv);
});

function checkAnswers(){
  let correct=0,total=0,wrong=[];
  data.forEach(q=>{if(q.type!=="mcq")return;total++;const qdiv=document.getElementById("q"+q.n);qdiv.classList.add("checked");const lis=qdiv.querySelectorAll(".options li");let sel=-1;lis.forEach((li,i)=>{if(li.classList.contains("selected"))sel=i;});lis.forEach((li,i)=>{if(i===q.correct)li.classList.add("correct");if(sel===i&&i!==q.correct)li.classList.add("wrong");});if(sel===q.correct)correct++;else wrong.push(q.n);qdiv.querySelector(".explain").style.display="block";});
  data.forEach(q=>{if(q.type==="essay")document.getElementById("q"+q.n).querySelector(".model-answer").style.display="block";});
  const box=document.getElementById("scoreBox");box.style.display="block";const pct=Math.round(correct/total*100);box.style.color=pct>=80?"#2e7d32":pct>=60?"#e65100":"#c62828";box.style.borderColor=box.style.color;box.textContent="النتيجة: "+correct+" من "+total+" ("+pct+"%)";
  const wl=document.getElementById("wrongList");
  if(wrong.length>0){const L=["أ","ب","ج","د"];wl.style.display="block";wl.innerHTML="<h3>الأسئلة التي أخطأت فيها:</h3><ul>"+wrong.map(n=>{const q=data.find(x=>x.n===n);return `<li>سؤال ${n}: الإجابة الصحيحة هي (${L[q.correct]}) ${q.options[q.correct]}</li>`;}).join("")+"</ul>";}else wl.style.display="none";
  box.scrollIntoView({behavior:"smooth"});
}
function showAllAnswers(){data.forEach(q=>{const d=document.getElementById("q"+q.n);if(q.type==="mcq"){d.classList.add("checked");d.querySelectorAll(".options li").forEach((li,i)=>{if(i===q.correct)li.classList.add("correct");});d.querySelector(".explain").style.display="block";}else d.querySelector(".model-answer").style.display="block";});}

restoreProgress();
