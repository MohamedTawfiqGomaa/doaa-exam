<script>
// Progress saving & loading utility
const pageName = window.location.pathname.split("/").pop() || "index.html";
const examKey = "exam_progress_" + pageName;

function getSavedAnswers() {
  try {
    return JSON.parse(localStorage.getItem(examKey)) || {};
  } catch (e) {
    return {};
  }
}

function saveAnswer(qNum, value) {
  const answers = getSavedAnswers();
  answers[qNum] = value;
  localStorage.setItem(examKey, JSON.stringify(answers));
}

function clearProgress() {
  if (confirm("هل أنت متأكد من رغبتك في مسح جميع إجاباتك والبدء من جديد؟")) {
    localStorage.removeItem(examKey);
    window.location.reload();
  }
}

function restoreProgress() {
  const answers = getSavedAnswers();
  for (const qNum in answers) {
    const qdiv = document.getElementById("q" + qNum);
    if (!qdiv) continue;
    const ul = qdiv.querySelector(".options");
    if (ul) {
      const selectedIndex = answers[qNum];
      const lis = ul.querySelectorAll("li");
      if (lis[selectedIndex]) {
        lis[selectedIndex].classList.add("selected");
      }
    }
    const ta = qdiv.querySelector(".essay-box");
    if (ta) {
      ta.value = answers[qNum];
    }
  }
}

const passages = {
p1: `اقرأ ثم أجب.

(التشتت الرقمي)

سهّلت الثورة التكنولوجية الحياة على الكثير منا سواء في العمل أو في حياتنا الشخصية، ومع ذلك فإن منتجات هذه الثورة أسهمت في تشتيت انتباهنا، وإعاقتنا وإصابتنا بالقلق والتوتر والخوف من حدوث أشياء قد لا تكون مهمة على الإطلاق، مثل: الخوف من أن يفوتنا حدث ما على الشبكة، أو الخوف من فقدان أو نسيان الهاتف المحمول، أو الخوف من فقدان الاتصال بالإنترنت، أو عدم الانتباه لرسالة بريد إلكتروني مهمة، وغيرها من المخاوف التي تصيبنا بالتوتر والقلق.

يُعدّ التشتت الرقمي أخطر الآفات التي يعاني منها الإنسان في العصر الحديث "عصر الرقمنة"، كما يعد الإفراط في استخدام وسائل التواصل الاجتماعي من أسباب التشتت، وفقد الذات، وعدم القدرة على الإصغاء والقراءة العميقة والإبداع والتأمل، وتعتمد الرقمنة على استخدام الويب والأجهزة الذكية بديلًا لذاكرة الإنسان، وهذا قد يؤدي إلى إفراغ العقول من ثرواتها؛ والإدمان الإلكتروني، ونقص التركيز، والانطواء، وفرط الحركة، والتباعد الاجتماعي، وقلة الإنتاج؛ لذا يجب الاعتدال في الاعتماد على الرقمنة، وفطم النفس عن الأجهزة الإلكترونية؛ للوقاية من الانحراف التكنولوجي، وهو الإفراط في استخدام التقنية حتى الوصول لمرحلة الإلهاء الرقمي.

وقد أكدت الدراسات أن التشتت الرقمي والإدمان على وسائل التواصل الاجتماعي يؤثران سلبًا في التركيز وضعف الإنتاج، ويسببان الإصابة بضعف الانتباه وقلة تحصيل العلم، حيث يؤدي التشتت الرقمي والإدمان الإلكتروني إلى اضطراب الساعة البيولوجية، والإجهاد، وقلة النوم، والإصابة بالأرق والاكتئاب، وغيرها من الأمراض النفسية والجسدية؛ فالضوء والموجات المنبعثة من الأجهزة الإلكترونية يؤثران سلبًا في توازن الهرمونات المسئولة عن تنظيم الساعة البيولوجية مثل الميلاتونين وغيره، هذه الهرمونات تتحكم في نوم الإنسان ويقظته وغيرها من وظائف الجسم.

وباختلال الساعة البيولوجية تحدث اضطرابات النوم؛ حيث تتراكم المواد السامة في الخلايا، فتقلّ فرص إصلاح الخلل الجيني والخلوي، مما يؤدي إلى خلل وظيفي في أعضاء الجسم لا سيما الجهاز العصبي، فينتج عن ذلك ضعف الذاكرة، وعدم التوازن بين النظام المعرفي والنظام السلوكي، والإصابة بالخرف والزهايمر.`,

p8: `مما كتبه أحمد أمين:

"هذا أبي يأخذني معه كل صباح يوم فأسير في شوارع لا عهد لي بها، وأمشي فأطيل المشي، لا كما كان العهد يوم كنت في المدرسة؛ إذ كانت بالقرب من بيتنا، وأخيرًا أصل إلى بناء كبير، فيقول أبي هذا هو الأزهر، ولا أدري كيف كان وقع هذه الكلمة على نفسي، فالأزهر شيء غامض لا أعلم كنهه، ولا نظامه، ولا منهجه، ولا مستقبله؛ أقدم عليه في هيبة وغموض، وأسمع عند الباب صوتًا غريبًا، دويًّا كدوي النحل يضرب السمع ولا تستوضح له لفظًا، فتأخذني الرهبة مما أسمع.

وأرى أبي يخلع نعليه عند الباب ويطويهما ويمسكهما بيده فأعمل مثل عمله، وأسير بجانبه قليلًا في ممشى قصير، أدخل منه على إيوان كبير لا ترى العين آخره، فُرش كله بالحصير، وامتدت أعمدته صفوفًا، كل عمود وضع بجانبه كرسي عالٍ مُشدّ قد جُنح إلى العمود بسلسلة من حديد، وجلس على كل كرسي شيخ معمم كأبي، بيده مالزم صفراء من كتاب، وأمامه حلقة مفرغة أحيانًا وغير مفرغة أحيانًا، يلبس أكثرهم جلبابًا أبيض عليه عباءة سوداء، ويمسك بيده ملزمة من كتاب كما يمسك الشيخ، والشيخ يقرأ أو يفسر والطلبة ينصتون أو يجادلون وبين العمود والعمود بعض الطلبة يجتمعون فيأكلون أو يذاكرون.

تخطيت هذه الجموع في غرابة، ونظرت إليها في دهشة، وأحيانًا أرى في بعض الأركان كُتابًا ككتابي القديم، فأفهم أن الأزهر امتداد للكُتّاب لا امتداد للمدرسة، ثم نخرج من هذا الإيوان إلى فناء الأزهر أو صحنه فأراه سماويًّا غير مسقوف، ومبلطًا غير مفروش، وهنا وهناك فُرشت ملاءة بيضاء أو عباءة سوداء صُففت عليها خبز ريفي وعُرض في الشمس ليجف، وسألت أبي فقال: إنه بعض زاد المجاورين أحضروه معهم من ريفهم أو أرسله إليهم آباؤهم، فهم يشمسونه ثم يختزنونه في بيوتهم. هذا هو كل الأزهر كما رأيته أول مرة.

وفهمت من هذا أني سأكون أحد هؤلاء المتحلقين، وسأجلس على الحصير كما يجلسون، وأسمع إلى هذا الشيخ كما يسمعون، وآكل في ركن من أركانه كما يأكلون، وقارنت بين حصير الأزهر ومقاعد المدرسة، ومُدرّس الأزهر ومُدرّس المدرسة، وفناء الأزهر حيث يُشمَّس الخبز، وفناء المدرسة حيث نلعب ونمرح، فكانت مقارنة حزينة..

وأُخذت إلى رواق من أروقة الأزهر، وتقدمنا إلى شيخ أخذ منا طلب الالتحاق، وامتحنني في القرآن فأحسنت الإجابة فقيدني طالبًا".`,

p13_14: `قال طه حسين في الأيام:

"وكانت هذه الأسماء تقع من نفس الصبي مواقع لها معنًى؛ ولأنه لا يفهم تيهًا وإعجابًا؛ لأنه لا يفهم لها معنى؛ ولأنه يقدّر أنها تدل على العلم، ولأنه يعلم أنّ أخاه الأزهري قد حفظها وفهمها فأصبح عالمًا، وظفر بهذه المكانة الممتازة في نفس أبويه وإخوته وأهل القرية جميعًا.. وهذا الفتى الأزهري قد اتُّخذ في هذا اليوم خليفة.. لأنه أزهري قد قرأ العلم وحفظ الألفية والجوهرة والخريدة! ".

وقال الكاتب في الفقرة الأولى:
"ولا أدري كيف كان وقع هذه الكلمة على نفسي، فالأزهر شيء غامض لا أعلم كنهه ولا نظامه ولا منهجه ولا مستقبله؛ أقدم عليه في هيبة وغموض، وأسمع عند الباب صوتًا غريبًا، دويًّا كدوي النحل يضرب السمع ولا تستوضح له لفظًا، فتأخذني الرهبة مما أسمع".`,

p14_text: `"وقد أرق الصبي ليلته كلها، ولكنه كان أرقًا فرحًا مبتهجًا، فيه كثير من تعجل الوقت واستبطاء الصبح، وقد ذهب الصبي إلى درس الحديث فسمع صوت الشيخ وهو يتغنى بالسند والمتن، ولكنه لم يلقِ إلى الشيخ بالًا، ولم يفهم عنه شيئًا، وذهب بعد ذلك إلى درس الفقه، فاستمع له لأنه لم يجد عن ذلك بدًّا، فقد أوصى أخوه به الشيخ، وكان الشيخ يحاوره، ويناظره، ويضطره إلى أن يسمع ويفهم عنه، ثم عاد الصبي إلى الغرفة في الضحى فأنفق وقته هادئًا قلقًا".`,

p15_22: `قال أمير الشعراء أحمد شوقي عن المصريين:

١. نفضوا العيونَ من الكرى واستأنفوا     سَفَرَ الحياةِ ورحلةَ الأيامِ
٢. الحقُّ كلُّ سلاحهم وكفاحهم          والحقُّ نِعمَ مُثبِّتُ الأقدامِ
٣. قُل للحوادثِ أقدِمي أو أحجِمي      إنا بنو الإقدامِ والإحجامِ
٤. نحن الَّنيامُ إذا الليالي سالمتْ        فإذا وثبنَ فنحن غيرُ نيامِ
٥. فينا من الصبرِ الجميلِ بقيَّةٌ         لحوادثٍ خلْفَ الغيوبِ جسامِ
٦. من ليسَ في ركبِ الزمانِ مُغبَّرًا     فاعدُدْهُ بينَ غوابرِ الأقوامِ
٧. يا مصرُ أنتِ كِنانةُ اللهِ التي        لا تُستباحُ وللكنانةِ حامِ
٨. استقبلي الآمالَ في غاياتها            وتأمَّلي الدُّنيا بطَرْفٍ سامِ`,

p23: `قالت نازك الملائكة:

هنالكَ كان يعيشُ ... غلامٌ ... بعيدُ الخيالْ
إذا جاءَ يأكلُ ضوءَ... النجومِ... ولونَ الجبالْ`,

p24: `قال إبراهيم ناجي: أصغى العباب ورجَّع الوادي أصداءَه وتناجت السحبُ`,

p25: `قال عباس محمود العقاد:

رأوا فما عرفوا، كلا ولا عجبوا     ولا دروا بالذي أرجو وأرتقب
كأنما أنا من أمسي ومن غده       لم يختلف قط لي شجو ولا طرب`,

p26: `قال جبران خليل جبران:

نسيمُ لُبنانَ حيَّاني ضُحى فشُفي       ما في فُؤادي من العلاّتِ والحُرَقِ`,

p27_35: `قال المنفلوطي (بتصرف):

فيا طالب العلم كن عاليَ الهمة، ولا يكن نظرُك في تاريخ عظماء الرجال نظرًا يبعث في قلبك الرهبة والهيبة، فتتضاءل وتتصاغر كما يفعل الجبان المُستَنْطار حينما يسمع قصَّةً من قصص الحروب، أو خرافةً من خرافات الجن! وحذارِ أن يملكَ عليك اليأسُ قوَّتك وشجاعتك فتستسلم استسلام العاجز الضعيف... جناحان عظيمان يطير بهما المُتَعَلِّم إلى سماء المجد والشرف: علو الهمة، والفهم في العلم. أما علو الهمة فقد عرفته، وأما الفهم في العلم فإليك الكلمة الآتية:

العلم عِلمان: عِلمٌ محفوظ، وعِلمٌ مفهومٌ؛ أمّا العلم المحفوظ فيستوي صاحبه فيه مع الكتاب المرقوم...الحافظ يحفظ ما يسمع؛ لأنه قوي الذاكرة، وقوة الذاكرة قد تكون مشتركًا بين الذكيّ والغبيّ والنابه والأبله؛ لأن الحافظة مَلَكَةٌ مستقلة بنفسها عن بقية الملكات... قيل لأحد العلماء: "إنّ فلانًا حفظ متن البخاري." فقال: "لقد ازدت نسخةٌ في البلد!" ذلك هو السر العظيم في كثرة المتعلمين وقلّة العاملين؛ لأنّ مَنْ فَهِمَ معلومةً من المعلومات حقَّ الفهم أُشْرِبَت روحه، وخالط لحمه ودمه، ووصل من قلبه إلى سويدائه، وكان إحدى غرائزه، فلا يرى له بُدًّا من العمل به، رضي أم أبى. لو كان العلم المحفوظ علمًا - وهو على ما نشاهد ونعلم من سوء الأثر وقلة الجدوى - وما ورد مدح العلم في كتابٍ أو ترنَّم بمدحه شاعرٌ سنةً، ولا قدَّسه كاتبٌ.

فإذا سمعت ذكر العلم فاعلم أنه العلم المفهوم لا المحفوظ، وإذا أردت أن تُلقَّب بالعالم فلا تُلقَّب به مَن يحفظ ما يحفظ، بل من يفهم ما يحفظ. وآية فهم المعلوم تأثُّر العالم به وظهوره في حركاته وسكناته، ولا تثق بالحافظ فيما ينقل إليك، فربما مرَّ بالمعلوم محرَّفًا فأخذه على عَلّاته. وأقبح ما عرفنا من أطواره أنه يجمع في حافظته بين النقيض ونقيضه، والغثّ والثمين، والجيد والزائف، فكأنّ ذاكرته حانوتُ عطّارٍ اختلطت فيها الأدوية الشافية بالعقاقير السامة... ولن يبلغ المتعلم درجة النبوغ إلا إذا وضع في العلم الذي مارسه مسألةً، أو كشف حقيقةً، أو أصلح هفوةً، أو اختراع طريقة.

// ========== القسم الرابع: المدارس الأدبية ==========
{n:23, type:"mcq", passage:"p23", section:"القسم الرابع: المدارس الأدبية",
 text:"٢٣- استنتج السمة التي اتضحت في السطرين السابقين من سمات الواقعية.",
 options:["كثرة الحديث عن النهاية والموت.","التأمل في الكون، والتعمق في أسرار الوجود.","الاهتمام بالصورة، وتوظيف الرمز.","التعبير عن موقف الإنسان من قضايا الوطن."],
 correct:2,
 explain:"* يتضح الاهتمام بالصورة في صوره المبتكرة مثل: \"بعيد الخيال - يأكل ضوء النجوم\".\n* كما يتضح الرمز في: \"النجوم\" فهي رمز للأمل."},

{n:24, type:"mcq", passage:"p24",
 text:"٢٤- استنتج السمة التي اتضحت في البيت السابق من سمات شعراء أبولو.",
 options:["استبطان النفس الإنسانية.","الامتزاج بالطبيعة والولع بها.","التشاؤم والاستسلام للأحزان.","استخدام القصة والأسطورة."],
 correct:1,
 explain:"يتضح الامتزاج بالطبيعة والولع بها في تصويره للعباب (الموج) كأنه يصعد، والوادي كأنه إنسان يرجع، والسحب كأنها أشخاص يناجي بعضها بعضًا."},

{n:25, type:"mcq", passage:"p25",
 text:"٢٥- بين السمة التي اتضحت في هذين البيتين من سمات مدرسة الديوان.",
 options:["ظهور مسحة اليأس والتشاؤم في حديثه عن مستقبله.","غلبة الجانب الفكري في التعبير عن آماله وتطلعاته.","التعمق في أسرار الوجود في تذكر أحداث الماضي.","استهداف المثل العليا والتعجب من طبيعة البشر."],
 correct:1,
 explain:"لأن الأبيات تعبّر عن فلسفة الشاعر ووجهة نظره فهو يرى أن بعض الناس ترى لكنها لا تدرك ما ترى فالناس تراه لكنها لا تعلم ما بداخله من حزن أو فرح.\n(أ) فليس في الأبيات حزن ولا تشاؤم ولا حديث عن المستقبل.\n(ج) ليس في الأبيات تذكر لأحداث الماضي.\n(د) الشاعر يتعجب فعلًا من طبيعة البشر لكن الأبيات ليس فيها تطلع إلى المثل العليا."},

{n:26, type:"mcq", passage:"p26",
 text:"٢٦- أي - مما يلي - يؤكد تحقق سمة الامتزاج بالطبيعة عند شعراء المهاجر في البيت السابق؟",
 options:["أظهر الشاعر تجاوب هواء بلاده معه وعالج آلام الشوق.","عبّر الشاعر عن جمال وطنه وشدة حنينه إليه في غربته.","أكد الشاعر تنوع الطقس في بلاده وتقلبه صباح مساء.","عكس الشاعر ما يعانيه من مرض يرجو الشفاء منه."],
 correct:1,
 explain:"فهو يخاطب وطنه لبنان ونسيمه العليل ويقول إن نور ضحاه يشفي ما في فؤاده من العلل وحرقة الشوق."},

// ========== القسم الخامس: المنفلوطي ==========
{n:27, type:"mcq", passage:"p27_35", section:"القسم الخامس: نص المنفلوطي",
 text:"٢٧- بم ينال طالب العلم المجد والشرف من خلال فهمك للفقرة الأولى.",
 options:["الأمل والتفاؤل والعمل.","الوعي بتاريخ العظماء.","التحمّل وقوة البدن.","الفهم وقوة العزم."],
 correct:3,
 explain:"فقد ذكر ذلك في الفقرة الأولى حيث قال: \"جناحان يطير بهما المتعلم إلى سماء المجد والشرف: علو الهمة، والفهم في العلم\"."},

{n:28, type:"mcq", passage:null,
 text:"٢٨- استنتج علاقة عبارة: \"ربما مرَّ بالمعلوم محرَّفًا فأخذه على عَلّاته.\" بما قبلها في الفقرة الثالثة.",
 options:["تعليل.","توضيح.","نتيجة.","تفصيل."],
 correct:1,
 explain:"لأن العبارة تتضمن سبب نصيحته لطالب العلم في الجملة التي سبقتها: \"لا تثق بالحافظ فيما ينقل إليك\" وإجابة عن سؤال (لماذا؟)."},

{n:29, type:"mcq", passage:null,
 text:"٢٩- استنتج المغزى من قول الكاتب \"قوة الذاكرة قد تكون مشتركًا بين الذكيّ والغبيّ\" في سياق الفقرة الثانية.",
 options:["إظهار إمكانية تمييز الغبيّ.","تأكيد ضرورة الفهم والإدراك.","إبراز أهمية بذل الذكي للجهد.","توضيح أن الحفظ ملكة فطرية."],
 correct:1,
 explain:"فإن ما يفرّق بينهما هو: الذكي والغبيّ شيء مشترك - فإذا كانت قوة الذاكرة مشتركة بينهما - فإن الفهم والإدراك هو من يستطيع التعلّم."},

{n:30, type:"mcq", passage:null,
 text:"٣٠- بيّن نوع الصورة وقيمتها الفنية في قوله: \"أَنِس به أُنسَ العاشق بمعشوقه\" في الفقرة الثالثة.",
 options:["استعارة مكنية، توضّح إخلاصه في طلب العلم.","تشبيه مجمل، يؤكد أن العلم له منزلة العشق.","تشبيه بليغ، يبرز قوة التعلق بطلب العلم.","استعارة تصريحية، تبيّن مكانة العلم السامية."],
 correct:2,
 explain:"ذكر المشبه (أنس طالب العلم) والمشبه به (أنس العاشق بمعشوقه) وهو تشبيه يدل على شدة تعلق المتعلم بالعلم كتعلق العاشق بمحبوبه."},

{n:31, type:"mcq", passage:null,
 text:"٣١- هات من الفقرة الرابعة ما يبرز أثر العلم الصحيح على الإنسان.",
 options:["لم ينظر إليه نظرَ التاجر لسلعته، والمحترف إلى حرفته.","فإذا سمعت ذكر العلم فاعلم أنه العلم المفهوم لا المحفوظ.","آية فهم المعلوم تأثُّر العالم به وظهوره في حركاته وسكناته.","فكأنّ ذاكرته حانوتُ عطّارٍ اختلطت فيها الأدوية الشافية بالعقاقير السامة."],
 correct:2,
 explain:"فهذا الاختيار يعني أن العالم يتأثر بما اكتسبه من العلم فيظهر تأثره في حياته كلها بما فيها من حركة وسكون."},

{n:32, type:"mcq", passage:null,
 text:"٣٢- استخرج من النص استعارة مكنية ووضح سر جمالها.",
 options:["\"جناحان عظيمان يطير بهما المُتَعَلِّم\"، سر جمالها التوضيح.","\"تستسلم استسلام العاجز الضعيف\"، سر جمالها التجسيم.","\"سماء المجد والشرف\"، سر جمالها التجسيم.","\"كان إحدى غرائزه\"، سر جمالها التوضيح."],
 correct:0,
 explain:"صوَّر المتعلم الذي يتحلى بعلو الهمة وفهم العلم بطائر له جناحان وسر جمالها التوضيح لأنه صوَّر العاقل (المتعلم) بغير العاقل (الطائر)."},

{n:33, type:"mcq", passage:"p33_compare",
 text:"٣٣- وازن بين الفقرتين من حيث استخدام الإطناب في الفقرتين.",
 options:["استخدم المنفلوطي الإطناب، في حين لم يستخدمه الزيات.","استخدم الزيات الإطناب، في حين لم يستخدمه المنفلوطي.","كلا الكاتبين لم يستخدم الإطناب.","كلا الكاتبين اعتمد على الإطناب."],
 correct:3,
 explain:"* استخدم المنفلوطي الإطناب بالتفصيل بعد الإجمال في (العلم علمان: علم محفوظ وعلم مفهوم) والإطناب بالتوضيح في (أما العلم المحفوظ فيستوي صاحبه ......) والإطناب بالتعليل في (ليصرعه في أمنع حصونه) والإطناب بالتعليل في (لأنه قوي الذاكرة).\n* واستخدم الزيات الإطناب بالتداؤي في (أشح البلاد طبيعة وأشد الأمم فقرًا) والإطناب بالتعليل في (ليصرعه في أمنع حصونه) والإطناب بالتوضيح في (فإن الفقر إذا انهزم ....)."},

{n:34, type:"mcq", passage:null,
 text:"٣٤- بين اللون الأدبي الذي يمثله النص السابق.",
 options:["قصة قصيرة؛ فقد اعتمد الكاتب على التكثيف والتركيز والإيجاز.","مقال أدبي؛ فقد حرص الكاتب على تحقيق عنصر الذاتية والإقناع.","مقال علمي متأدب؛ فقد استخدم الكاتب مصطلحات علمية، ووظّف البيان.","جزء من رواية أدبية؛ فقد اعتمد الكاتب على الحوار الداخلي والخارجي."],
 correct:1,
 explain:"فالمنفلوطي يكتب في موضوع أدبي وهو اكتساب العلم وأنواع المتعلمين وطرق التعلّم، كما يعبّر عن ذاتيته حيث يوضح آراءه ووجهات نظره والحكمة. واستخدم عدة طرق للإقناع منها الحجج والتأهير."},

{n:35, type:"mcq", passage:null,
 text:"٣٥- توقّع دور اللغة في العمل الروائي في ضوء مقولة أحد النقاد: \"اللغة في العمل الروائي تتجاوز وظيفتها التقليدية في التواصل، وتصبح أداة للفهم والتفكير.\"",
 options:["وسيلة لتناول الحدث ونقله بصورة صادقة.","وسيلة لإدراك أعمق للمواقف والشخصيات.","أداة سهلة للعرض المباشر للحدث الرئيس.","أداة تصف الواقع الخارجي ولا تؤثر على الفكرة."],
 correct:1,
 explain:"لأن مع كلام الناقد أن اللغة في الرواية تتميّز بالجمال والإمتاع وجذب القارئ إلى فهم المعاني غير المباشرة التي يريم إليها الكاتب - الرواية ليست فقط وسيلة للتخاطب مع القارئ ونقل معلومة إليه وإنما فيها لغة تتميّز بالجمال والإمتاع وجذب القارئ إلى فهم المعاني غير المباشرة والهدف الذي يريم إليه الكاتب."},

// ========== القسم السادس: النحو والصرف ==========
{n:36, type:"mcq", passage:null, section:"القسم السادس: النحو والصرف",
 text:"قال الشاعر: وأفضل الناس ما بين الورى رجلٌ    تُقضى على يده للناس حاجات\n\n٣٦- ميز المحل الإعرابي لجملة (تُقضى) في البيت السابق.",
 options:["رفع خبر.","نصب حال.","رفع نعت.","نصب نعت."],
 correct:2,
 explain:"لأنها تصف النكرة (رجل) وكلمة (رجل) خبر للمبتدأ اسم التفضيل (أفضل)."},

{n:37, type:"mcq", passage:null,
 text:"(البطل الحق هو مَنْ عَرَكَتْه هموم الحياة طويلًا)\n\n٣٧- ميز سبب نصب كلمة (طويلًا) في المقولة السابقة.",
 options:["تمييز.","حال.","مفعول به.","نائب عن المفعول المطلق."],
 correct:3,
 explain:"لأنها صفة المصدر الصريح (عِراكًا طويلًا) وتقديره (عراكًا طويلًا)."},

{n:38, type:"mcq", passage:null,
 text:"قال الشاعر: يا بلادي وأنت قرة عيني    طبتَ نفسًا على الزمان وعينًا\n\n٣٨- ميز إعراب كلمة (نفسًا) في البيت السابق.",
 options:["حال منصوب.","مفعول به منصوب.","تمييز منصوب.","مفعول لأجله منصوب."],
 correct:2,
 explain:"لأنها نكرة منصوبة ذكرت بعد لفظ يفيد الاستحسان (طِبتَ)."},

{n:39, type:"mcq", passage:null,
 text:"(شباب مصر، علينا أن نصون وطننا)\n\n٣٩- ميز إعراب كلمة (شباب) في المقولة السابقة.",
 options:["مبتدأ.","منادى.","مفعول به.","خبر."],
 correct:1,
 explain:"أداة النداء محذوفة (يا شباب مصر) والمتحدث هنا يوجه خطابه إلى الشباب."},

{n:40, type:"mcq", passage:null,
 text:"(حذارِ أن تُصاب باليأس فتضعُف)\n\n٤٠- ميز المحل الإعرابي للمصدر المؤول في المقولة السابقة.",
 options:["مفعول به.","مضاف إليه.","فاعل.","خبر."],
 correct:0,
 explain:"لأن (أن تُصاب) مصدر مؤول في محل نصب مفعول به لاسم الفعل (حذارِ) بمعنى (احذرْ)."},

{n:41, type:"mcq", passage:null,
 text:"(ما أعجبت بأساطيل تسعى للقضاء على المظلومين المستضعفين)\n\n٤١- ميز نوع حرف الجر الداخل على كلمة (أساطيل) وأعراب ما بعده في المقولة السابقة.",
 options:["زائد – فاعل.","أصلي – اسم مجرور بالكسرة.","زائد – مفعول به.","أصلي– اسم مجرور بالفتحة."],
 correct:3,
 explain:"لأن حرف الجر لا يمكن حذفه كما أن هذه الجملة ليست من مواضع الباء كحرف جر زائد - و(أساطيل) مجرور بالفتحة لأنه ممنوع من الصرف فيه صيغة منتهى الجموع."},

{n:42, type:"mcq", passage:null,
 text:"(إياكَ وشهادة الزور)\n\n٤٢- بيّن حكم حذف الفعل في الجملة السابقة.",
 options:["جائز.","واجب.","ممتنع.","يقل."],
 correct:1,
 explain:"أسلوب التحذير يحذف الفعل (احذرْ) وجوبًا مع كل أشكال المحذّر منه ماعدا المحذّر منه المفرد فحذفه جائز - نوع الأسلوب (تحذير) وفي أسلوب التحذير يحذف الفعل (احذر) وجوبًا."},

{n:43, type:"mcq", passage:null,
 text:"قال الشاعر: تأنَّ ولا تعجل بلومِ صاحبًا     وأنت تلوم     لعلَّ له عُذرًا وأنت تلوم\n\n٤٣- بيّن خبر الناسخ، ونوعه في البيت السابق.",
 options:["تلوم – جملة فعلية.","أنت تلوم – جملة اسمية.","له - شبه جملة.","عُذرًا – مفرد."],
 correct:2,
 explain:"لأن الجملة الواقعة بعد (لعلَّ) بدأت بجار ومجرور (له) فهو خبر شبه جملة مقدّم و(عذرًا) اسم لعلَّ مؤخر."},

{n:44, type:"mcq", passage:null,
 text:"قال الشاعر: وأحسنُ منكَ لم ترَ قطُّ عيني    وأجملُ منكَ لم تَلِدِ النساءُ\n\n٤٤- بيّن حكم اسم التفضيل في البيت السابق.",
 options:["جواز مطابقته للمفضل.","جواز الإفراد والتذكير والتنكير.","وجوب مطابقته للمفضل عليه.","وجوب الإفراد والتذكير والتنكير."],
 correct:3,
 explain:"لأن اسما التفضيل (أحسن – أجمل) مجردان من أل والإضافة فيلزمان الإفراد والتذكير ويمتنع مطابقتهما للمفضل."},

{n:45, type:"mcq", passage:null,
 text:"٤٥- بيّن الجملة التي ورد بها المختص مبنيًّا في محل نصب.",
 options:["إنك أيها العبد فقير إلى عفو الله.","أيها العبد إنك فقير إلى عفو الله.","إنك عبد الله فقير إلى عفو الله.","إنك العبد الفقير إلى عفو الله."],
 correct:0,
 explain:"لأن (أيُّها) اسم مختص مبني على الضم في محل نصب مفعول به تقديره (أخصّ أو أقصد أو أعني)."},

{n:46, type:"mcq", passage:null,
 text:"(ما هذا الرجل إلا ساعٍ إلى الخير)\n\n٤٦- بيّن الصياغة الصحيحة عند وضع (ليس) مكان (ما) في الجملة السابقة.",
 options:["ليس هذا الرجل إلا ساعٍ إلى الخير.","ليس هذا الرجل إلا ساعيًا إلى الخير.","ليس هذا الرجل إلا ساعي إلى الخير.","ليس هذا الرجل إلا إلى الخير ساعي."],
 correct:1,
 explain:"لأن أسلوب الاستثناء هنا ناقص منفي - فما بعد إلا يعرب حسب موقعه فبعد دخول (ليس) على الجملة تُصبح كلمة (ساعيًا) خبر ليس."},

{n:47, type:"mcq", passage:null,
 text:"(انطلق جنودنا في حرب أكتوبر منطلقَ الأسود)\n\n٤٧- بيّن نوع كلمة (منطلق) الواردة في الجملة السابقة.",
 options:["اسم زمان.","اسم مفعول.","مصدر ميمي.","اسم مكان."],
 correct:2,
 explain:"لأن (منطلق) بمعنى المصدر الصريح (انطلاق) ويجوز حلوله محلها."},

{n:48, type:"mcq", passage:null,
 text:"(ليتَ الداعيين إلى الخير موفَّقان)\n\n٤٨- بيّن الصياغة الصحيحة للجملة السابقة عند دخول (ما) على (ليت).",
 options:["ليتما الداعِيَن إلى الخير موفَّقان.","ليتما الداعيين إلى الخير موفَّقِين.","ليتما الداعيان إلى الخير موفَّقان.","ليتما الداعيان إلى الخير موفَّقِين."],
 correct:2,
 explain:"لأن اتصال (ما) الكافة بالحرف الناسخ (ليت) يجعله جائز العمل أو عدم العمل فلو لم يعمل يعرب ما بعده مبتدأ مرفوع وخبر مرفوع وهذا ما حدث في الجملة (ج)."},

{n:49, type:"mcq", passage:null,
 text:"(نُريكِ يا أمي ما تعاهدنا عليه من الاجتهاد)\n\n٤٩- بيّن الصياغة الصحيحة عند بناء فعلي الجملة السابقة للمجهول.",
 options:["تُرَيْن يا أمي ما تعاهَد عليه من الاجتهاد.","تُرَيْن يا أمي ما تُعوهِد عليه من الاجتهاد.","تُري يا أمي ما عُوهِد عليه من الاجتهاد.","تُرَي يا أمي ما تُعوهَد عليه من الاجتهاد."],
 correct:1,
 explain:"* فعند بناء (نُريكِ) للمجهول نحوّل المفعول به (ضمير النصب الكاف) إلى ضمير رفع حتى يكون نائب فاعل وضمير الرفع الذي يؤدي معنى الكاف للمخاطبة المؤنثة هو ياء المخاطبة فيصبح الفعل (تُرَيْن).\n* والفعل (تعاهدنا) خما مبدوء بتاء فعند بنائه للمجهول نضم أوله وثانيه ونكسر ما قبل آخره ونحذف الفاعل (نا الفاعلين) فيصبح نائب الفاعل شبه الجملة (عليه)."},

{n:55, type:"essay", passage:null,
 text:"٥٥- اكتب كلمة افتتاحية لندوة عنوانها: (وسائل التواصل.. لكَ أو عليك).\n\n▪ تكون في حدود (٦-٨) أسطر، (٨٠) كلمة.\n▪ تتضمن التعريف بالغرض من الندوة - وأهميتها - والجمهور المستهدف.\n▪ تتضمن التعريف بالمتحدثين الرئيسيين في الندوة أو صفتهم.\n▪ تتضمن عبارات ترحيبية، تستثير اهتمام الجمهور لمتابعة الندوة واستشهادات بأقوال مأثورة أو حقائق أو إحصاءات.",
 model:`الحضور الكرام، تحية طيبة لحضراتكم..

ويتحدث إليكم في هذه الندوة الأستاذ الدكتور / محمود عيسى - المتخصص في علم النفس الاجتماعي، والدكتورة / سلمى مصطفى - رئيس قسم الذكاء الاصطناعي بكلية الهندسة جامعة النيل.

];

const container = document.getElementById("examArea");
let lastPassage = null;
let lastSection = null;

data.forEach((q, idx) => {
  if (q.section && q.section !== lastSection) {
    const sdiv = document.createElement("h2");
    sdiv.textContent = q.section;
    container.appendChild(sdiv);
    lastSection = q.section;
    lastPassage = null;
  }

  if (q.passage && q.passage !== lastPassage) {
    const pdiv = document.createElement("div");
    pdiv.className = "passage";
    pdiv.textContent = passages[q.passage];
    container.appendChild(pdiv);
    lastPassage = q.passage;
  }
  if (!q.passage) lastPassage = null;

  const qdiv = document.createElement("div");
  qdiv.className = "question";
  qdiv.id = "q" + q.n;

  const qt = document.createElement("div");
  qt.className = "qtext";
  qt.textContent = q.text;
  qdiv.appendChild(qt);

  if (q.type === "mcq") {
    const ul = document.createElement("ul");
    ul.className = "options";
    const letters = ["أ","ب","ج","د"];
    q.options.forEach((opt, i) => {
      const li = document.createElement("li");
      li.textContent = letters[i] + ") " + opt;
      li.dataset.index = i;
      li.onclick = () => {
        if (qdiv.classList.contains("checked")) return;
        ul.querySelectorAll("li").forEach(l => l.classList.remove("selected"));
        li.classList.add("selected");
        saveAnswer(q.n, i);
      };
      ul.appendChild(li);
    });
    qdiv.appendChild(ul);

    const exp = document.createElement("div");
    exp.className = "explain";
    exp.textContent = "التوضيح: " + q.explain;
    qdiv.appendChild(exp);
  } else {
    const ta = document.createElement("textarea");
    ta.className = "essay-box";
    ta.placeholder = "اكتب إجابتك هنا...";
    ta.oninput = (e) => {
      saveAnswer(q.n, e.target.value);
    };
    qdiv.appendChild(ta);

    const ans = document.createElement("div");
    ans.className = "model-answer";
    ans.textContent = "الإجابة النموذجية:\n" + q.model;
    qdiv.appendChild(ans);
  }

  container.appendChild(qdiv);
});

function checkAnswers() {
  let correctCount = 0;
  let totalMcq = 0;
  let wrongNums = [];

  data.forEach(q => {
    if (q.type !== "mcq") return;
    totalMcq++;
    const qdiv = document.getElementById("q" + q.n);
    qdiv.classList.add("checked");
    const lis = qdiv.querySelectorAll(".options li");
    let selectedIndex = -1;
    lis.forEach((li, i) => {
      if (li.classList.contains("selected")) selectedIndex = i;
    });
    lis.forEach((li, i) => {
      if (i === q.correct) li.classList.add("correct");
      if (selectedIndex === i && i !== q.correct) li.classList.add("wrong");
    });
    if (selectedIndex === q.correct) {
      correctCount++;
    } else {
      wrongNums.push(q.n);
    }
    qdiv.querySelector(".explain").style.display = "block";
  });

  data.forEach(q => {
    if (q.type === "essay") {
      document.getElementById("q" + q.n).querySelector(".model-answer").style.display = "block";
    }
  });

  const box = document.getElementById("scoreBox");
  box.style.display = "block";
  const percent = Math.round((correctCount / totalMcq) * 100);
  let scoreColor = percent >= 80 ? "#2e7d32" : percent >= 60 ? "#e65100" : "#c62828";
  box.style.borderColor = scoreColor;
  box.style.color = scoreColor;
  box.textContent = "النتيجة: " + correctCount + " من " + totalMcq + " (" + percent + "%)";

  const wl = document.getElementById("wrongList");
  if (wrongNums.length > 0) {
    wl.style.display = "block";
    wl.innerHTML = "<h3>الأسئلة التي أخطأت فيها:</h3><ul>" +
      wrongNums.map(n => {
        const q = data.find(x => x.n === n);
        const letters = ["أ","ب","ج","د"];
        return `<li>سؤال ${n}: الإجابة الصحيحة هي (${letters[q.correct]}) ${q.options[q.correct]}</li>`;
      }).join("") + "</ul>";
  } else {
    wl.style.display = "none";
  }

  box.scrollIntoView({behavior:"smooth"});
}

function showAllAnswers() {
  data.forEach(q => {
    const qdiv = document.getElementById("q" + q.n);
    if (q.type === "mcq") {
      qdiv.classList.add("checked");
      const lis = qdiv.querySelectorAll(".options li");
      lis.forEach((li, i) => {
        if (i === q.correct) li.classList.add("correct");
      });
      qdiv.querySelector(".explain").style.display = "block";
    } else {
      qdiv.querySelector(".model-answer").style.display = "block";
    }
  });
}

restoreProgress();
