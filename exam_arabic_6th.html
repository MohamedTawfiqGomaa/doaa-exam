 explain:"رمز الإجابة: ب\nالتوضيح: في الفقرة الثالثة يوضح الكاتب أن التحول النقدي يعني قيام البنوك المركزية بتدبير المال اللازم مقابل هذا الذهب .. بينما الإجابة (أ) خطأ لأنها تعني أنه بعد التحول النقدي تصبح شراء الذهب والفضة موقوفًا على البنوك فقط حرية للحكومة."},

{n:3, type:"mcq", passage:null,
 text:'٣ – استنتج – مما يلي- المبدأ الذي اعتمده طلعت حرب في قوله: "الاستقلال الاقتصادي سبيل الاستقلال السياسي."',
 options:["لا تعطني سمكة ولكن علمني كيف أصطاد.","من يملك فأسه يملك حريته.","امتلاكك للمال قد يكون وبالاً عليك.","أنفق يُنفق عليك، وأَعِن تُعَن."],
 correct:1,
 explain:"رمز الإجابة: ب\nالتوضيح: لأن هذه الحكمة تعني أن من يملك أداة العمل يستطيع الاعتماد على نفسه وبالتالي يتحرر من سيطرة الغير – فقد كانت وجهة نظر طلعت حرب أننا إذا امتلكنا بنوكنا وشركاتنا واقتصادنا استطعنا أن ننال حريتنا السياسية ونتخلص من سيطرة الاستعمار .. وقد يختلط عليك الأمر بالإجابة (أ) ولكنها خطأ لأنها حكمة تعني: إذا وجدت محتاجًا فلا تمنحه طعامًا فأحتاج من يطعمني سأجوع مرة أخرى بعد قليل بل علمه حرفة أو عملاً أكسب منه من جديد وقد لا أجده بل الرزق الذي يطعمني يعني المؤقت."},

{n:4, type:"mcq", passage:null,
 text:'٤ – استنتج – مما يلي- علاقة عبارة " فأسس بنك مصر وشركاته العتيدة " بما قبلها في الفقرة الخامسة.',
 options:["تعليل.","نتيجة.","تفصيل.","توضيح."],
 correct:1,
 explain:"رمز الإجابة: ب\nالتوضيح: لأن مضمونها يترتب على رؤية طلعت حرب للاستقلال الاقتصادي بأنه طريق للاستقلال السياسي فنتج عن ذلك أنه أسس بنك مصر."},

{n:5, type:"mcq", passage:null,
 text:"٥- استدل - من خلال قراءتك للموضوع - على سياسة الاحتلال القائمة على استنزاف الموارد والتخلي عن الحلفاء وقت الأزمات.",
 options:['"إنها لا تستطيع أن تأمر رعايا دولة أخرى بقبوله"','"تلقي على بنكها عبء تدبير المال، وتقوم البنوك المركزية بدورها في التحول النقدي"','" ينافسها في كافة أعمالها، ثم لا يمد لها يد المساعدة إذا وقعت في شدة من الشدائد"','\"مكنت للبنك الأهلي من أن يتمتع بكافة امتيازات البنوك المركزية دون أن يكون عليه أية تبعة\"'],
 correct:2,
 explain:"رمز الإجابة: ج\nالتوضيح: لأن مضمون العبارة يعني أنه ينافسها تمامًا فهو ينافسها ثم لا يمد لها يد المساعدة."},

{n:6, type:"mcq", passage:null,
 text:"٦ – توقَّع – في ضوء فهمك للموضوع – الدور الذي يجب أن تقوم به الدولة كصورة من صور دعم الاقتصاد الوطني.",
 options:["قصر التعامل بالعملات الورقية داخل الدولة مع الاحتفاظ بالمعدن النفيس لتأمين المعاملات الخارجية.","إلزام البنوك المركزية بالاستقلال التام عن رقابة الحكومة لتتحرر من قيود النظام النقدي.","تشجيع رعايا الدول الأخرى على تداول العملة الوطنية الورقية دون غطاء ذهبي.","إخضاع المؤسسات المالية لرقابة وطنية تضمن حماية البنوك المحلية واستثمار خيرات البلاد."],
 correct:0,
 explain:"رمز الإجابة: أ\nالتوضيح: فهذا الإجراء هو ما ذكره الكاتب في الموضوع كوسيلة للتحول النقدي – لكن بقية الإجابات خطأ للأسباب التالية:\nب- لأن البنوك لا بد أن تكون خاضعة لرقابة الحكومة ج- لأنه ذكر أن من حق الدولة إلزام رعاياها فقط باستخدام العملة المحلية كما أن العملة لا قيمة لها دون غطاء ذهبي.\nد - وقائم بالفعل في هذا أمر واقعي على كل دولة."},

{n:7, type:"mcq", passage:"p_eqad",

 correct:1,
 explain:"رمز الإجابة: ب\nالتوضيح: ذكر الكاتب ذلك في الفقرة الأخيرة."},

{n:8, type:"mcq", passage:null,
 text:'قال المتنبي: خُلِقتُ أَلوفًا لو رَجَعتُ إلى الصِّبا     لَفارَقتُ شيبي مُوجَعَ القلبِ باكيا\n\n٨ - حدد الفقرة التي يلتقي مضمونها مع دلالة البيت السابق.',
 options:["الأولى.","الثانية.","الثالثة.","الرابعة."],
 correct:1,
 explain:"رمز الإجابة: ب\nالتوضيح: * فهذا البيت معناه: (خُلِقتُ ألوفًا وأنا أفارق الشيخوخة) رغم أن أمنية كل إنسان أن يعود للشباب والصبا إلا أن الشاعر وفيٌّ لشيخوخته .. وهذا نفس مضمون الفقرة الثانية محبًّا لها لو رجعونا مخلصًا للصبا والشباب لكان قليلاً."},

{n:9, type:"mcq", passage:null,
 text:'٩ – ما دلالة قول الكاتب " لا أميل إلى التوسط في الصداقة ولا في العداوة " في الفقرة الأولى؟',
 options:["المبالغة في ردود الأفعال والتحيز للمقربين.","يحب الوضوح والثبات وينفر من المواربة.","يخشى الأناس الذين يُبدِّلون مواقفهم.","يدقق في تخيّر أصدقائه ورفاقه."],
 correct:1,
 explain:"رمز الإجابة: ب\nالتوضيح: فمن الجملة أن الكاتب لا يحب المواربة (الأمور غير المحددة) – فهو واضح الرأي ثابت الموقف دون تذبذب بين شيئين."},

{n:10, type:"mcq", passage:null,
 text:'١٠ – استنتج علاقة جملة" ولكني لا أزال إلى الساعة أجري على النظام.. " في الفقرة الثانية بما قبلها.',

{n:11, type:"mcq", passage:null,

 options:["ثقافته الواسعة، وقدرته على الجمع بين المتناقضات.","نشأته في أسوان التي يجتمع فيها العراقة والحداثة.","صداقاته التي تجمع بين المجددين والمحافظين.","ألفته وعدم قدرته على تغيير عاداته بيُسر مع حبه للتجديد."],

// مقارنة العقاد وطه حسين
{n:12, type:"mcq", passage:"p_ayam_compare",
 text:'١٢ - وازن بين العقاد وبين أخي الصبي ورفاقه، من حيث "تأصُّل سمة الوفاء" لديهم وكيفية التعبير عنها كما ظهر في النصين:',
 options:["كلاهما أظهر وفاءً يتناسب مع طبيعة علاقته بالراحلين؛ العقاد بالارتباط الوجداني بالأماكن، ورفاق الصبي بالحزن الهادئ الذي لا رياء فيه.","العقاد وفي لأصدقائه، وكذلك أخي الصبي ورفاقه وفوا للحاج علي حتى بعد وفاته بالدعاء وزيارة الربع.","العقاد وفى لأصدقائه إلى حد المبالغة في الوفاء، بينما لا يتصف أخو الصبي وأصدقاؤه بذلك.","سمة الوفاء غير متأصِّلة عند العقاد، وهي كذلك غير متأصلة عند أخي الصبي ورفاقه."],
 correct:2,
 explain:"رمز الإجابة: ج\nالتوضيح: أظهر العقاد وفاءً وصل أحيانًا إلى حد المبالغة فعلاً حيث يمتنع عن الذهاب للأماكن التي كان فيها أحباب * قد يشكك البعض في الإجابة (أ) لكنها خطأ لأن ما فعله العقاد عكس ما تضمنته هذه الإجابة فهو لم يرتبط بالأماكن وإنما امتنع عن ارتيادها."},

// ===== أبو ماضي =====
{n:13, type:"mcq", passage:"p_abuMadi",
 text:"١٣ – إلامَ يدعو الشاعر في البيت الأول.",

{n:14, type:"mcq", passage:null,

 correct:1,
 explain:"رمز الإجابة: ب\nالتوضيح: فسؤال الشاعر عن السماء وأنوارها ونجومها هو دعوة للمخاطب إلى تأمل الطبيعة وأخذ العبرة منها."},

{n:15, type:"mcq", passage:null,
 text:'١٥ – بين المبدأ الذي طبقه الشاعر في قوله: " كُنْ وَردةً طيِّبُها حَتَّى لِسارِقِها ". ',
 options:['"من يفعل الخير لا يعدم جوازيه"','"لا يُفسد المعروف إلا الكبر والغرور".','\" أحسن دومًا وإن أُسيئ إليك\"','"يموت الصالحون وتبقى سيرتهم"'],
 correct:2,
 explain:"رمز الإجابة: ج\nالتوضيح: فهو يدعو إلى أن يصبح الإنسان كالوردة التي تفوح بعطرها ويشمه الجميع حتى من يسرقها من غصنها."},

{n:16, type:"mcq", passage:null,
 text:"١٦ – بيِّن – في ضوء فهمك الأبيات – فلسفة الشاعر في الحياة.",

 explain:"رمز الإجابة: ب\nالتوضيح: فالشاعر يدعو إلى العطاء وأن يُحسن الإنسان للآخرين ويعتبر ذلك قمة السعادة ولذا يضرب الأمثلة بعطاء الوردة وعطاء السماء للمتلقي."},

{n:17, type:"mcq", passage:null,
 text:"١٧ – هات من النص ما يدل على الأثر السيئ للشُّح على صاحبه.",
 options:['"لكن تعلَّم قليلاً كيف تعطيها"','"هل وجدت به روحًا تؤاسيك"','"لو السماء طَوَت عنَّا دَرارِيـها"','\"لكنَّ عادَتَها الشنعاء تُرديها\"'],
 correct:3,
 explain:"رمز الإجابة: د\nالتوضيح: * لأنها جملة تدل على سوء عاقبة النار لأنها تحرق غيرها وتؤذيه ولهذا تنتهي إلى الردى (الموت أو الانطفاء) * وتعتبر الإجابة (ب) قريبة من الصواب نظر الشاعر وليس سوء عاقبة الشح (البخل) في نظر الشاعر ولكننا استبعدناها لأنها تدل على عدم جدوى المال واليأس من أنه ليس كل ثري أو غني بخيل، فعاقبة اليأس تختلف عن عاقبة البخل."},

{n:18, type:"mcq", passage:null,
 text:"١٨ – استنتج العاطفة المسيطرة على الشاعر في الأبيات.",
 options:["الضجر والضيق من أفعال البخيل التي تهلك أهله وذويه.","الإعجاب بالبذل وحب العطاء دون انتظار المقابل.","الأمل في انتشار مشاعر الخير التي تؤدي إلى صلاح المجتمع.","الأسى والحزن لما يفعله الحاقدون من نشر للضغينة والكراهية."],
 correct:1,
 explain:"رمز الإجابة: ب\nالتوضيح: * ومن دلائل تلك العاطفة قوله: (تعلم كيف تعطيها – كن وردة – البذل شيمته) بينما بقية الإجابات خطأ للأسباب التالية:\nأ- إضرار بصاحبه وبكل من حوله وليس أهله وأقاربه فقط (أهله وذويه) فالشاعر يكره البخل عامة ويراه مُضِرًّا\nن ج- البذل والعطاء د- هو لا يتحدث عن أفعال الحاقدين ولا مشاعر الضغينة (الكراهية) إجابة عامة لا تتضمن معنى."},

{n:19, type:"mcq", passage:null,
 text:'١٩ – ميِّز اللون البياني في قول الشاعر " كُنْ وردةً " في البيت الثاني.',
 options:["تشبيه بليغ.","استعارة مكنية.","استعارة تصريحية.","مجاز مرسل."],

{n:20, type:"mcq", passage:null,
 text:"٢٠ – استنتج السمة التي اتضحت في الأبيات من سمات مدرسة المهاجر من حيث المضمون.",
 options:["المغالاة في التجديد، والتساهل في اللغة.","الدعوة إلى المحبة والأخوة الإنسانية.","حدة العاطفة والامتزاج بالطبيعة.","التأمل في النفس واستبطان النفس."],

// ===== الزهاوي =====

// ===== شكري =====

 options:["التعبير عن الواقع بوجوهه المختلفة من تقدم وتخلف.","التطلع للمثل العليا من إظهار القيم المثلى في الشعر.","استخدام اللغة الحية القريبة من كلام الناس.","اعتزاز الفرد بثقافته الجديدة ووعيه الاجتماعي."],

 explain:"رمز الإجابة: ج\nالتوضيح: الأسطر: (الزفة – إيقاعًا نحاسيًّا) بينما بقية الإجابات خطأ للأسباب التالية:\nأ- السؤال يسأل عن سمة شكلية وليست من سمات المضمون + الأسطر ليس فيها متناقضات\nب- من سمات مطران والديوان وأبوللو والمهجر + كما أنها سمة من سمات المضمون وليس الشكل\nد- من سمات المضمون + من سمات الرومانتيكيين لا الواقعيين."},

{n:27, type:"mcq", passage:null,

{n:28, type:"mcq", passage:null,

{n:29, type:"mcq", passage:null,

{n:30, type:"mcq", passage:null,
 text:"٣٠ – هات من الموضوع ما يدل على أن الرضا الداخلي للإنسان هو خير معين على الوصول إلى الهدف.",

{n:32, type:"mcq", passage:null,
 text:"٣٢ – بيِّن الفن النثري الذي يمثله النص السابق، ودلِّل على ذلك.",

{n:33, type:"mcq", passage:null,
 text:'– قال المازني في الفقرة الثالثة: " ولا يسع المرء معها رفقًا بنفسه، وإبقاءً عليها إلا أن يَفرُغ من الأمر الذي يعالجه، ولو خسر في سبيل ذلك غايتَه "\n– وقال الزيات في نص (التكافل الاجتماعي): "عالَج الإسلامُ الفقرَ من طريق ... الكسر من حدة الشهوة، والكف من سورة الطموح، والغض من إشراف الطمع "\n\n٣٣ – وازن بين الكاتبين من حيث الاعتماد على الموسيقا.',
 options:["اعتمد كلا الكاتبين على الموسيقا الخفية، والموسيقا الظاهرة المتمثلة في الازدواج.","اقتصر كلا الكاتبين على استخدام الموسيقا الخفية فقط.","اقتصر كلا الكاتبين على الموسيقا الظاهرة فقط النابعة من المحسنات اللفظية كالازدواج.","اقتصر المازني على الموسيقا الخفية فقط، بينما اعتمد الزيات على الموسيقا الخفية والظاهرة."],
 correct:0,
 explain:"رمز الإجابة: أ\nالتوضيح: * الموسيقا الخفية: تمثلت عند الكاتبين في سهولة الألفاظ وروعة التصوير وجمال الصياغة\n* الموسيقا الظاهرة: تمثلت في الازدواج مثل: - (رفقًا بنفسه، وإبقاءً عليها) عند المازني\n(الكسر من حدة الشهوة، والكف من سورة الطموح، والغض من إشراف الطمع) عند الزيات."},

// ===== نحو وصرف =====
{n:34, type:"mcq", passage:null,
 text:"– قال الشاعر: وَلا تَقنَطَنَّ من رَحمَةِ اللهِ ساعَةً     فَما حُرِمَت رِزقًا عَلى صَخرَةٍ نَملَةٌ\n\n٣٤ – حدد الإعراب الصحيح لكلمة \" نملة \" في الشطر الثاني من البيت الشعري السابق.",
 options:["مضاف إليه.","مفعول به ثانٍ.","نائب فاعل.","بدل."],
 correct:2,
 explain:"رمز الإجابة: ج\nالتوضيح: لأن الفعل (حُرِمَت) مبني للمجهول وكلمة (نملة) نائب فاعل تتمم معناه."},

{n:35, type:"mcq", passage:null,
 text:"– قال الشاعر: قد قالَ وهوَ مُحَلِّقٌ بجَناحِه     أَينَ الهُبوطُ أَجبتُهُ في ناظِري\n\n٣٥ – ميِّز مما يلي المحل الإعرابي الصحيح لجملة \" أين الهبوط \" في الشطر الثاني.",
 options:["حال.","مفعول به.","لا محل لها.","خبر."],
 correct:1,
 explain:"رمز الإجابة: ب\nالتوضيح: لأنها جملة مقول القول أي الجملة الواقعة بعد كلمة (قال) ووردت على لسان المتكلم ولا تتمم معناه."},

{n:36, type:"mcq", passage:null,
 text:'– " فأشرف الناس نفسًا وأعلاهم همةً وأرفعهم قدرًا من لذتهم في مرضاة الله "\n\n٣٦ – ميِّز المفضَّل في العبارة السابقة.',
 options:["الناس.","نفسًا.","همةً.","مِن."],
 correct:3,
 explain:"رمز الإجابة: د\nالتوضيح: لأنها الكلمة التي تتمم معنى وأجزاء أسلوب التفضيل فالمفضَّل عليه (الناس) والمفضَّل (من لذتهم في مرضاة الله)."},

{n:37, type:"mcq", passage:null,
 text:'– " لما تجلت همة الأسد وظهرت شجاعته سمَّته العرب مائة اسم "\n\n٣٧ – حدد الإعراب الصحيح لكلمة " مائة " في العبارة السابقة.',
 options:["تمييز منصوب.","تمييز مجرور.","فاعل مرفوع.","مفعول به ثانٍ."],
 correct:3,
 explain:"رمز الإجابة: د\nالتوضيح: الفعل (سمَّى) متعدٍّ لمفعولين: الأول (الهاء) والثاني (مائة)."},

{n:38, type:"mcq", passage:null,
 text:'– قال الشاعر: ما أضيَعَ الغِمدَ بغَيرِ نَصلِهِ     والشِّعرُ ما لَم يَكُ عِندَ أهلِهِ\n\n٣٨ – ميِّز نوع " ما " في البيت الشعري.',
 options:["مصدرية.","تعجبية.","نافية.","موصولة."],
 correct:1,
 explain:"رمز الإجابة: ب\nالتوضيح: واضع السؤال لم يحدد (ما) التي يقصدها – وقد تم تعديل السؤال على قناة الوزارة وأكد المسئول أنه يقصد (ما) الشطر الأول فهو أسلوب تعجب على وزن (ما أفعل)."},

{n:39, type:"mcq", passage:null,
 text:'– قال الشاعر: وَكُن في الطَريقِ عَفيفَ الخُطا     شَريفَ السَماعِ كَريمَ النَظَر\n\n٣٩ – حدد الإعراب الصحيح لكلمة " شريف " الواردة في الشطر الثاني.',
 options:["نعت.","خبر منصوب.","فاعل لصيغة المبالغة.","مبتدأ."],
 correct:1,
 explain:"رمز الإجابة: ب\nالتوضيح: فالكلمة خبر ثانٍ لكلمة (كن) والخبر الأول (عفيف)."},

{n:40, type:"mcq", passage:null,
 text:'– قال الشاعر: وَلَو أَنِّي استَطَعتُ لَتُبتُ عَنهُ     وَلَكِن كَيفَ عَن روحيَ المَتاب\n\n٤٠ – حدد نوع الكلمة " المتاب " في الشطر الثاني البيت الشعري.',
 options:["اسم زمان.","مصدر ميمي.","اسم مفعول.","اسم مكان."],
 correct:1,
 explain:"رمز الإجابة: ب\nالتوضيح: فالكلمة تبدأ بميم زائدة ويجوز وضع المصدر الصريح (توبة) مكانها فهي مصدر ميمي على وزن (مَفعَل) من الفعل الثلاثي (تاب)."},

{n:41, type:"mcq", passage:null,
 text:'– قال الشاعر: أَلَم تَرَ أَنَّ الرِّزقَ غادٍ وَرائِحٌ     وَأَنَّ الَّذي أَعطاكَ سَوفَ يُعيد\n\n٤١ – حدد العلامة الإعرابية للفعل " تَرَ " في البيت الشعري.',
 options:["حذف النون.","الفتحة.","الضمة.","حذف حرف العلة."],
 correct:3,
 explain:"رمز الإجابة: د\nالتوضيح: لأنه معتل الآخر وسبقه أداة الجزم (لم)."},

{n:42, type:"mcq", passage:null,
 text:'– قال الشاعر: إِنَّ السَّعيدَ لَهُ في غَيرِهِ عِظَةٌ     وَفي التَجارِبِ تَحكيمٌ وَمُعتَبَر\n\n٤٢ – بيِّن نوع خبر الحرف الناسخ في البيت الشعري.',
 options:["شبه جملة.","جملة اسمية.","جملة فعلية.","مفرد."],
 correct:1,
 explain:"رمز الإجابة: ب\nالتوضيح: فالخبر جملة (له في غيره عظة) لأنها تكمل معنى إن – ولا يجوز اعتبار جزء منها خبرًا – وقد يبدو لك أنه خبر شبه جملة لأنه قدَّم الخبر (له) على المبتدأ (عظة)."},

{n:43, type:"mcq", passage:null,
 text:'– مما قيل في الحكم " إن سمعت من صاحبك كلامًا أو رأيت منه رأيًا يعجبك فلا تنتحله تزيينًا به عند الناس، واكتفِ من التزيِّن بأن تجتني الصواب إذا سمعته وتنسبه إلى صاحبه "\n\n٤٣ - سبب اقتران جواب الشرط بالفاء في العبارة السابقة.',
 options:["جملة اسمية.","جملة طلبية.","جملة منفية.","مبدوءة بفعل جامد."],
 correct:1,
 explain:"رمز الإجابة: ب\nالتوضيح: لأن جواب الشرط الذي يتمم أسلوب الشرط هو (فلا تنتحله) وقد جاء مقترنًا بالفاء لأنه جملة طلبية (نهي)."},

{n:44, type:"mcq", passage:null,
 text:'– قال الشاعر: ناشَدتُكَ اللهَ يا طَيرَ الحَمامِ إِذا     أَرَيتَ يَومًا حُمولَ القَومِ فانعاني\n\n٤٤ – حدد المحل الإعرابي لجملة " انعاني " في الشطر الثاني من البيت الشعري.',
 options:["في محل نصب.","في محل رفع.","في محل جزم.","لا محل لها."],
 correct:3,
 explain:"رمز الإجابة: د\nالتوضيح: جملة جواب شرط (إذا) غير جازمة."},

{n:45, type:"mcq", passage:null,
 text:'– قال الشاعر: ظَنُّوا الضِّعافَ عَبيدًا بِئسَ ما زَعَموا     هَل يَخلُقُ اللهُ قَومًا غَيرَ أَحرار؟!\n\n٤٥ – ميِّز الإعراب الصحيح لكلمة "غير" في الشطر الثاني من البيت الشعري.',
 options:["نعت منصوب.","مستثنى منصوب.","مضاف إليه مجرور.","بدل منصوب."],
 correct:0,
 explain:"رمز الإجابة: أ\nالتوضيح: لأن (غير) نافية = (ليس) وهي تصف النكرة قبلها (قومًا)."},

{n:46, type:"mcq", passage:null,
 text:'– " أذاق جيش مصر أعداءنا مرارة الهزيمة "\n\n٤٦ – ميِّز الصياغة الصحيحة عند بناء الفعل في الجملة السابقة للمجهول.',
 options:["ذيق أعداؤنا.","أُذيق أعداؤنا.","أَذيق أعداءنا.","تذوق أعداؤنا."],
 correct:1,
 explain:"رمز الإجابة: ب\nالتوضيح: عند بناء الجملة للمجهول يُحذف الفاعل (جيش مصر) ويوضع المفعول مكان الفاعل كنائب فاعل فيصبح (أعداؤنا) وهمزته على واو لأنه مرفوع – والفعل ضُمَّ أوله ويُكسر ما قبل آخره فيصبح (أُذيق)."},

{n:47, type:"mcq", passage:null,
 text:'– قال الشاعر: أَرضَ آبائِنا عَلَيكَ سَلامٌ     وَسَقَى اللهُ أَنفُسَ الآباءِ\n\n٤٧ – بيِّن نوع المنادى الوارد في البيت السابق.',
 options:["نكرة مقصودة.","نكرة غير مقصودة.","مضاف.","شبيه بالمضاف."],
 correct:2,
 explain:"رمز الإجابة: ج\nالتوضيح: فالمنادى (أرض) مضاف لكلمة (آبائنا) وحرف النداء محذوف وتقديره (يا أرض آبائنا)."},

{n:48, type:"mcq", passage:null,
 text:'– قال الشاعر: طَرِبتُ وَلَولا الحِلمُ أَدرَكَني الجَهلُ     وَعاوَدَني ما زالَ مِن شِرَّتي قَبلُ\n\n٤٨ – حدد الفعل اللازم الوارد في البيت السابق.',
 options:["طرب.","أدرك.","عاود.","زال."],
 correct:0,
 explain:"رمز الإجابة: أ\nالتوضيح: لأنه لم ينصب مفعولاً به ولا يقبل الاتصال بضمير نصب به."},

{n:49, type:"mcq", passage:null,
 text:"٤٩ – حدد الجملة التي تشتمل على أسلوب تحذير نحوي صحيح.",
 options:["إياك أعني، فاحذر الشر والأشرار.","الحذر الحذر من مصاحبة الأشرار.","رفقاء السوء؛ فإنهم بوابة الندم.","مصاحبة الأشرار بوابة الندم."],
 correct:2,
 explain:"رمز الإجابة: ج\nالتوضيح: لأن (رفقاء) مفعول به لفعل محذوف تقديره (احذر رفقاء السوء) وبقية الإجابات لا تصلح للأسباب التالية:\nأ- (إياك) ضمير نصب مفعول به للفعل (أعني) وأصل الجملة (أعني إياك) و (احذر) فعل أمر بعد معطوفان فلا يجوز ذكر الفعل معهما\nب- أسلوب إغراء وتقديره (الزم الحذر) فلا يجوز أن نقول (احذر الحذر)\nد- جملة اسمية عادية فالمبتدأ (مصاحبة) والخبر (بوابة)."},

const container = document.getElementById("examArea");
let lastPassage = null;

data.forEach((q, idx) => {
  if (q.passage && q.passage !== lastPassage) {
    const pdiv = document.createElement("div");
    pdiv.className = "passage";
    const titleEl = document.createElement("div");
    titleEl.className = "passage-title";
    titleEl.textContent = passages[q.passage].title;
    pdiv.appendChild(titleEl);
    const textEl = document.createElement("div");
    textEl.style.whiteSpace = "pre-line";
    textEl.textContent = passages[q.passage].text;
    pdiv.appendChild(textEl);
    container.appendChild(pdiv);
    lastPassage = q.passage;
  }
  if (!q.passage) lastPassage = null;

  const qdiv = document.createElement("div");
  qdiv.className = "question";
  qdiv.id = "q" + q.n;

  const qt = document.createElement("div");
  qt.className = "qtext";
  qt.textContent = q.text;
  qdiv.appendChild(qt);

  if (q.type === "mcq") {
    const ul = document.createElement("ul");
    ul.className = "options";
    const letters = ["أ","ب","ج","د"];
    q.options.forEach((opt, i) => {
      const li = document.createElement("li");
      li.textContent = letters[i] + ") " + opt;
      li.dataset.index = i;
      li.onclick = () => {
        if (qdiv.classList.contains("checked")) return;
        ul.querySelectorAll("li").forEach(l => l.classList.remove("selected"));
        li.classList.add("selected");
      };
      ul.appendChild(li);
    });
    qdiv.appendChild(ul);

    const exp = document.createElement("div");
    exp.className = "explain";
    exp.textContent = q.explain;
    qdiv.appendChild(exp);
  } else {
    const ta = document.createElement("textarea");
    ta.className = "essay-box";
    ta.placeholder = "اكتب إجابتك هنا...";
    qdiv.appendChild(ta);

    const ans = document.createElement("div");
    ans.className = "model-answer";
    ans.textContent = q.model;
    qdiv.appendChild(ans);
  }

  container.appendChild(qdiv);
});

function checkAnswers() {
  let correctCount = 0;
  let totalMcq = 0;
  let wrongList = [];

  data.forEach(q => {
    if (q.type !== "mcq") return;
    totalMcq++;
    const qdiv = document.getElementById("q" + q.n);
    qdiv.classList.add("checked");
    const lis = qdiv.querySelectorAll(".options li");
    let selectedIndex = -1;
    lis.forEach((li, i) => {
      if (li.classList.contains("selected")) selectedIndex = i;
    });
    lis.forEach((li, i) => {
      if (i === q.correct) li.classList.add("correct");
      if (selectedIndex === i && i !== q.correct) li.classList.add("wrong");
    });
    if (selectedIndex === q.correct) {
      correctCount++;
    } else {
      wrongList.push(q.n);
    }
    qdiv.querySelector(".explain").style.display = "block";
  });

  data.forEach(q => {
    if (q.type === "essay") {
      document.getElementById("q" + q.n).querySelector(".model-answer").style.display = "block";
    }
  });

  const box = document.getElementById("scoreBox");
  box.style.display = "block";
  const percent = Math.round((correctCount / totalMcq) * 100);
  let msg = "النتيجة: " + correctCount + " من " + totalMcq + " (" + percent + "%)";
  if (wrongList.length > 0) {
    msg += "\n\nالأسئلة التي أُخطئت فيها: " + wrongList.join("، ");
  } else {
    msg += "\n\nأحسنت! لم تُخطئ في أي سؤال اختياري ✓";
  }
  box.style.whiteSpace = "pre-line";
  box.textContent = msg;
  box.scrollIntoView({behavior:"smooth"});
}

function showAllAnswers() {
  data.forEach(q => {
    const qdiv = document.getElementById("q" + q.n);
    if (q.type === "mcq") {
      qdiv.classList.add("checked");
      const lis = qdiv.querySelectorAll(".options li");
      lis.forEach((li, i) => {
        if (i === q.correct) li.classList.add("correct");
      });
      qdiv.querySelector(".explain").style.display = "block";
    } else {
      qdiv.querySelector(".model-answer").style.display = "block";
    }
  });
}
