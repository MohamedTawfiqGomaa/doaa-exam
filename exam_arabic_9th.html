<script>
// Progress saving & loading utility
const pageName = window.location.pathname.split("/").pop() || "index.html";
const examKey = "exam_progress_" + pageName;

function getSavedAnswers() {
  try {
    return JSON.parse(localStorage.getItem(examKey)) || {};
  } catch (e) {
    return {};
  }
}

function saveAnswer(qNum, value) {
  const answers = getSavedAnswers();
  answers[qNum] = value;
  localStorage.setItem(examKey, JSON.stringify(answers));
}

function clearProgress() {
  if (confirm("هل أنت متأكد من رغبتك في مسح جميع إجاباتك والبدء من جديد؟")) {
    localStorage.removeItem(examKey);
    window.location.reload();
  }
}

function restoreProgress() {
  const answers = getSavedAnswers();
  for (const qNum in answers) {
    const qdiv = document.getElementById("q" + qNum);
    if (!qdiv) continue;
    const ul = qdiv.querySelector(".options");
    if (ul) {
      const selectedIndex = answers[qNum];
      const lis = ul.querySelectorAll("li");
      if (lis[selectedIndex]) {
        lis[selectedIndex].classList.add("selected");
      }
    }
    const ta = qdiv.querySelector(".essay-box");
    if (ta) {
      ta.value = answers[qNum];
    }
  }
}
const passages = {
p1: `أنسنة الفراغ العمراني: نحو مدن أفضل للإنسان
يُقصد بـ (أَنْسَنَةِ الفراغ العمراني) إضفاء النزعة الإنسانية على المدن لجعلها أكثر ملاءمة للطبيعة البشرية واحتياجات الإنسان النفسية، من خلال استغلال الفراغات العامة في المدن، وتخطيطها بشكل يسمح للأفراد بممارسة جوانب حياتهم الرُّوحية، والنفسية، والمساهمة في التقاء السكان واحتكاكهم بعضهم ببعض، بصرف النظر عن طبقاتهم، واختلاف ثقافتهم، وتُعدُّ هذه الخطوة من أهم الاستراتيجيات التي تساعد في تحسين جودة الحياة، مما يسهم بشكل كبير في إضفاء طابع إنساني يُخَفِّفُ زَخمَ المدينة، ويمتص ضغوطاتها، وينمَى الإحساس بالسكينة والطمأنينة، ويرسِّخ الإحساسَ بالراحة، ويُشعِر المرءَ بإنسانيته، ويُلبي احتياجاتِه النفسية والروحية وسط هذا الجو المشحون بالمادية.

تكمن أهمية أنسنة المدن في أثرها الشامل والمتعدد الأبعاد؛ فعلى المستوى الاجتماعي تعزز الأنسنة المساواة الاجتماعية، وتزيد شعور الانتماء والأمن والسلامة، وعلى المستوى الاقتصادي تسهم في تنشيط الاقتصاد المحلي للمدينة، وجذب رءوس الأموال، ورفع أسعار العقارات والأراضي المحيطة بالفراغات المُعتنى بها، أما على المستوى البيئي فهي تسهم في خفض معدلات التلوث، وتوفر في استهلاك الطاقة، وتزيد من صحة السكان وسعادتهم.

وحتى تتحقَّق الأنسنة، يجب وضع الحياة الإنسانية كأولوية في دراسة الجدوى قبل دراسة البيئة المادية. فإلى جانب الاحتياجات المادية الأساسية، لابد من مراعاة احتياجات الحواسّ؛ فلكل حاسة نسبة فاصلة تجعل الحاسة تنقل إلى صاحبها شعورًا بالراحة والأمان، فحاسة البصر - مثلاً- تُشكِّل 75% من تجربة الإنسان الحسيّة، وتتطلب "مقياسًا إنسانيًّا" يوفر الاحتواء ويقدم تفاصيل بصرية ممتعة، ولكن الأنسنة لا تتوقف عند البصر، بل تشمل حاسة السمع، والتي تُعد مصدر التحذير الأول في أوقات الخطر، وحاسة الشم، وهي الجزء الأهم في إثارة الأحاسيس العاطفية.

يجب أيضًا تصميم الفراغات لدعم الأنشطة الإنسانية المتنوعة، سواء أكانت "ضرورية" أم "اختيارية"، ويعد وجود الأنشطة الاختيارية: كالجلوس للاستمتاع بالهواء النقي أو المشي للتنزه مؤشرًا مهمًّا على جودة الفراغ ومراعاته للأبعاد الإنسانية العامة، والتي يجب أن تتراوح من 1.2 متر إلى 3.6 متر تقريبًا (4-12 قدمًا). وقد وضع منظرون كبار أسس هذا الفكر؛ فـ "كيفن لينش" ركز على تلبية الاحتياجات النفسية كـ"الحيوية" و"الإحساس"، و"جين جاكوبز" دافعت عن الفهم التقليدي للمدينة، داعية إلى "خليط من الاستعمالات" و"الكثافة" لمواجهة نظريات التخطيط الحداثية التي فصلت بين الأنشطة والبيئة المبنية، وتجربة رائد المعمار المصري حسن فتحي في "عمارة الفقراء" ودمج العناصر المحلية والمناخية والثقافة، مما يجعل العمارة أكثر إنسانية وخدمة للسكان، ونظريات البيئة والسلوك كما يلاحظ على أعمال (ج. دوغلاس) والتي يظهر فيها الاهتمام بتفاعل الإنسان مع بيئته العمرانية.

وقد نجحت مدن عالمية في تطبيق هذه المبادئ؛ فمدينة "كوبنهاجن" الدنماركية نجحت عبر عملية تدريجية بدأت عام 1962 في إعادة دمج الأنشطة البشرية بالبيئة المبنية عبر تقليص حركة السيارات لصالح المشاة والدراجات، حتى أصبحت ثقافة ركوب الدراجات جزءًا أساسيًّا من نمط الحياة اليومي لسكانها.

يمكن إذًا تلخيص المعايير الرئيسة لتحقيق الأنسنة في خمسة محاور: أولًا: البعد الأمني، ويُقصد به: توفير الحماية للإنسان من الحوادث والجرائم، والتجارب الحسيّة غير المستحبة. ثانيًا: البعد الترفيهي، ويُقصد به توفير الراحة والاستمتاع عبر تسهيل المشي، وتوفير أماكن للجلوس والتحدث. ثالثًا: البعد النفسي، ويُقصد به تلبية الاحتياجات النفسية كالشعور بالهوية والوضوح. رابعًا: البعد المجتمعي، ويُقصد به ضمان المشاركة المجتمعية. وأخيرًا، بعد الاستدامة، ويُقصد به وجود إدارة وتشغيل وصيانة فعالة تضمن استدامة هذه الفراغات الحيوية.`,

p2: `من مقال أحمد لطفي السيد
"ولما بلغت الرابعة من عمري أدخلني والدي كتاب القرية، وكانت صاحبته سيدة تدعى «الشيخة فاطمة»، فمكثت فيه ست سنوات تعلمت فيها القراءة والكتابة، وحفظت القرآن كله، وكنت أجلس مع زملائي على الحصير، ونصنع الحبر بأيدينا، وإلى هذه السيدة يرجع فضل تنشئتي الأولى في تلك السنين.

بعد أن أتممت حفظ القرآن الكريم رغب والدي في أن يبعثني للدراسة في الأزهر، وصادف في ذلك الوقت أن جاء يتغدى عندنا إبراهيم باشا أدهم – مدير الدقهلية سابقًا – فدخلت لتحيته، فسأل والدي إلى أين يبعث بي للدراسة، فأجاب: «إلى الأزهر الشريف إن شاء الله»، فأشار عليه أن يبعث بي إلى مدرسة المنصورة الابتدائية، وكانت المدرسة الحكومية الوحيدة في الدقهلية كلها، وقد عين المرحوم أمين سامي باشا ناظرًا لها، وكان معروفًا بالدقة والنظام والشدة وعدم التسامح في أي تقصير يبدو من أحد التلاميذ... وكان بالمدرسة قسم داخلي، فالتحقت بالسنة الثانية بامتحان؛ لأني كنت – عدا حفظي للقرآن الكريم – أعرف قواعد الحساب الأربعة.

وكانت سنة 1882م حينما التحقت بمدرسة المنصورة الابتدائية، ولما اختلطت بزملائي التلاميذ شعرت بعد أيام بشيء من القلق؛ لأنهم كانوا يضحكون مني حينما أنطق القاف «جافا» كأهل بلدتي. هذا إلى أن الضرب والحبس في «الزنزانة» كانا من أنواع العقاب في هذه المدرسة، وقد رأيت في الأيام الأولى تلميذًا وضعت رجلاه في الحديد؛ لأنه ارتكب ذنبًا.

وكانت عيشة المدرسة عيشة شظف وخشونة، وقد كانوا في وجبة الفطور يقدمون لكل تلميذ رغيفًا فقط، وعليه أن يشتري من جيبه الخاص ما يأتدم به من جبن أو حلاوة، وكان العدس أو الفول هو وجبة الغداء والعشاء، وفي بعض أيام الأسبوع يقدمون لنا شيئًا من اللحم والفاكهة.

وجاء والدي كعادته لزيارتي يوم الجمعة، فأبديت له أسباب تعبي وضيقي من هذه المدرسة، وأخشى أن أنسى فيها القرآن الكريم فيعاقبني الله بالنسيان، وقد قال تعالى: ﴿كذلك أتتك آياتنا فنسيتها وكذلك اليوم تنسى﴾ ... فابتسم رحمه الله وقال لي: اقرأ كل يوم جزءًا منه وأنت لا تنساه. فاستمعت لنصيحة والدي، ومكثت بالمدرسة، وقد حبب إلى البقاء فيها أستاذ اللغة العربية «سيد أفندي محمد»، وكان مشهورًا بالقدرة والتفوق في تربيته وتعليمه."`,

p2b: `من كتاب الأيام لطه حسين

poem1: `قال معروف الرصافي
1 - إذا ناب قومي حادثُ الدَّهر نابني  وإن كـنت عـنهم نازح الدار نائيا
2 - وما ينفعُ الشعرُ الذي أنا قائلٌ  إذا لم أكن للقوم في النفع ساعيا
3 - ولستُ على شعري أروم مثوبةً  ولكن نُصحَ القومِ جُلُّ مَرامِيا
4 - وما الشعر إلا أن يكون نصيحةً  تُنشِّط كُسالَنا وتُنهِض ثاويا
5 - وليس سَريَّ القوم من كان شاعرًا  ولكنّ سَريَّ القوم من كان هاديًا
6 - فعلِّمهم كيف التقدم في العُلا  ومن أي طُرقٍ يبتغونَ المعاليا
7 - وأبلى جديدَ الغيِّ منهم برشدهِ  وجدد رُشدًا عندهم كان باليًا
8 - وإن أفسدتهم خطةٌ قام مصلحًا  وإن لدغتهم فتنةٌ قام راقيًا`,

p3: `من كتاب فيض الخاطر لأحمد أمين
"يبدأ أي إصلاح خلقي بتربية الإرادة أولًا، فإذا طالبنا شابًا أو شابة بضبط النفس عند الغضب، أو عدم الإسراف في الملذات، أو بالشجاعة عند الجبن، أو بالعدل عن الظلم؛ فلا قيمة لكل هذه النصائح ما لم تسبقها عند الشاب أو الشابة إرادة قوية رباها صاحبها لينفذ بها ما اعتقد أنه حَسَن، ويتجنب بها ما اعتقد أنه ضار. فانصح ما شئت، وكرر النصح ما أردت، فليس لهذا كله قيمة إذا لم يكن المنصوحَ قويَّ الإرادة يستطيع بها أن يسيطر على نفسه.

ولكن كيف نربي إرادتنا؟ ... انظر إلى من يريد أن يتعلم ركوب الدراجة، إن الشخص أول الأمر لا يحسن السير عليها، وبعد جهد جهيد تستقيم في يده الدراجة ويسير بها سيرًا حسنًا، فماذا حدث؟ الدراجة هي الدراجة لم تتغير، ولكن الذي تغير هو راكبها، فالتغير إنما حدث في النفس لا في الدراجة. كذلك الشأن في كل أنواع الحياة يحتاج الإنسان أول أمره إلى كبير جهد وقوة تصميم وصحة عزم واحتمال الشدائد، ثم تسير الأمور بعد ذلك في يسر وسهولة من غير جهد ملحوظ، ولذلك جاء في الحديث: "إنما الصبر عند الصدمة الأولى"، فمن صبر على الشدة الأولى في تربية إرادته كان ما بعدها أهون. إنَّ الذى يفسد الإرادة أن تعزم وتعدل، ثم تعزم وتعدل، فيكون شأنك شأن بكرة الخيط يلقي صاحبها عليها الخيط ثم ينقض ما لفّ.

كثير من الشباب يقع في العادات السيئة من غير تفكير، وينساقون مع المغريات من غير وعي، ولا إعمال عقل في النتائج، أما عظماء الناس فسرُّ عظمتهم يكمن في قوة إرادتهم؛ فالرجل العظيم يتلذذ من مقاومة الإغراء، ويتلذذ من السيطرة على نفسه، ويحس اغتباطًا من أنه غلب الإغراء ولم يغلبه الإغراء، وصبر على الشدة، ولم يخضع لها، وفي التاريخ أمثلة كثيرة من هذا القبيل، كقول رسول الله ﷺ: «والله لو وضعوا الشمس في يميني والقمر في يساري على أن أترك هذا الأمر ما تركته».

وعلى كل حال فتربية الإرادة وقوتها وتعويدها مقاومة الإغراء سر النجاح وسر الاستقامة وحصن حصين من الزلل، ومن ربى إرادته أمكن إصلاحه وأمكن حسن توجيهه، ومن فقد إرادته فلا أمل مطلقًا في تقويمه إلا أن يبدأ من جديد، فيعالج نفسه كما يعالج المريض، ويصبر على العلاج المر حتى يشفى من الداء."`,

const container = document.getElementById("examArea");
let lastPassage = null, lastSection = null;
data.forEach(q => {
  if (q.section && q.section !== lastSection) {
    const s = document.createElement("h2");
    s.textContent = q.section;
    container.appendChild(s);
    lastSection = q.section;
    lastPassage = null;
  }
  if (q.passage && q.passage !== lastPassage) {
    const p = document.createElement("div");
    p.className = "passage";
    p.textContent = passages[q.passage];
    container.appendChild(p);
    lastPassage = q.passage;
  }
  if (!q.passage) lastPassage = null;
  const qdiv = document.createElement("div");
  qdiv.className = "question";
  qdiv.id = "q" + q.n;
  const qt = document.createElement("div");
  qt.className = "qtext";
  qt.textContent = q.n + "- " + q.text;
  qdiv.appendChild(qt);
  if (q.type === "mcq") {
    const ul = document.createElement("ul");
    ul.className = "options";
    const L = ["أ", "ب", "ج", "د"];
    q.options.forEach((opt, i) => {
      const li = document.createElement("li");
      li.textContent = L[i] + ") " + opt;
      li.dataset.index = i;
      li.onclick = () => {
        if (qdiv.classList.contains("checked")) return;
        ul.querySelectorAll("li").forEach(l => l.classList.remove("selected"));
        li.classList.add("selected");
        saveAnswer(q.n, i);
      };
      ul.appendChild(li);
    });
    qdiv.appendChild(ul);
    const exp = document.createElement("div");
    exp.className = "explain";
    exp.textContent = "التوضيح: " + q.explain;
    qdiv.appendChild(exp);
  } else {
    const ta = document.createElement("textarea");
    ta.className = "essay-box";
    ta.placeholder = "اكتب إجابتك هنا...";
    ta.oninput = (e) => { saveAnswer(q.n, e.target.value); };
    qdiv.appendChild(ta);
    if (q.model) {
      const ans = document.createElement("div");
      ans.className = "model-answer";
      ans.textContent = "الإجابة النموذجية:\n" + q.model;
      qdiv.appendChild(ans);
    }
  }
  container.appendChild(qdiv);
});

function checkAnswers() {
  let correct = 0, total = 0, wrong = [];
  data.forEach(q => {
    if (q.type !== "mcq") return;
    total++;
    const qdiv = document.getElementById("q" + q.n);
    qdiv.classList.add("checked");
    const lis = qdiv.querySelectorAll(".options li");
    let sel = -1;
    lis.forEach((li, i) => {
      if (li.classList.contains("selected")) sel = i;
    });
    lis.forEach((li, i) => {
      if (i === q.correct) li.classList.add("correct");
      if (sel === i && i !== q.correct) li.classList.add("wrong");
    });
    if (sel === q.correct) correct++;
    else wrong.push(q.n);
    qdiv.querySelector(".explain").style.display = "block";
  });
  data.forEach(q => {
    if (q.type === "essay") {
      const modelDiv = document.getElementById("q" + q.n).querySelector(".model-answer");
      if (modelDiv) modelDiv.style.display = "block";
    }
  });
  const box = document.getElementById("scoreBox");
  box.style.display = "block";
  const pct = Math.round(correct / total * 100);
  box.style.color = pct >= 80 ? "#2e7d32" : pct >= 60 ? "#e65100" : "#c62828";
  box.style.borderColor = box.style.color;
  box.textContent = "النتيجة: " + correct + " من " + total + " (" + pct + "%)";
  const wl = document.getElementById("wrongList");
  if (wrong.length > 0) {
    const L = ["أ", "ب", "ج", "د"];
    wl.style.display = "block";
    wl.innerHTML = "<h3>الأسئلة التي أخطأت فيها:</h3><ul>" +
      wrong.map(n => {
        const q = data.find(x => x.n === n);
        return "<li>سؤال " + n + ": الإجابة الصحيحة هي (" + L[q.correct] + ") " + q.options[q.correct] + "</li>";
      }).join("") +
      "</ul>";
  } else {
    wl.style.display = "none";
  }
  box.scrollIntoView({ behavior: "smooth" });
}

function showAllAnswers() {
  data.forEach(q => {
    const d = document.getElementById("q" + q.n);
    if (q.type === "mcq") {
      d.classList.add("checked");
      d.querySelectorAll(".options li").forEach((li, i) => {
        if (i === q.correct) li.classList.add("correct");
      });
      d.querySelector(".explain").style.display = "block";
    } else {
      const modelDiv = d.querySelector(".model-answer");
      if (modelDiv) modelDiv.style.display = "block";
    }
  });
}
