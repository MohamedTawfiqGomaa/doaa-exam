<script>
// Progress saving & loading utility
const pageName = window.location.pathname.split("/").pop() || "index.html";
const examKey = "exam_progress_" + pageName;

function getSavedAnswers() {
  try {
    return JSON.parse(localStorage.getItem(examKey)) || {};
  } catch (e) {
    return {};
  }
}

function saveAnswer(qNum, value) {
  const answers = getSavedAnswers();
  answers[qNum] = value;
  localStorage.setItem(examKey, JSON.stringify(answers));
}

function clearProgress() {
  if (confirm("هل أنت متأكد من رغبتك في مسح جميع إجاباتك والبدء من جديد؟")) {
    localStorage.removeItem(examKey);
    window.location.reload();
  }
}

function restoreProgress() {
  const answers = getSavedAnswers();
  for (const qNum in answers) {
    const qdiv = document.getElementById("q" + qNum);
    if (!qdiv) continue;
    const ul = qdiv.querySelector(".options");
    if (ul) {
      const selectedIndex = answers[qNum];
      const lis = ul.querySelectorAll("li");
      if (lis[selectedIndex]) {
        lis[selectedIndex].classList.add("selected");
      }
    }
    const ta = qdiv.querySelector(".essay-box");
    if (ta) {
      ta.value = answers[qNum];
    }
  }
}

const passages = {
p1: `(السرقات العلمية)

السرقة العلمية حسب تعريف المكتب الأمريكي للنزاهة البحثية، هي الاستيلاء على أفكار شخص آخر، أو إجراءاته، أو نتائجه، أو كلماته دون نسبتها إليه بشكل سليم، وتشير دراسة نُشرت في عام 2015 إلى أن 1.7% من العلماء أقُّروا بإقدامهم على السرقة العلمية، وأن 30% منهم يعرفون زملاء لهم ارتكبوا هذا الجرم البحثي.

ومن أنواع السرقات العلمية: الانتحال الحرفي، وذلك بأن يستخدم الباحث كامل العمل المنسوب لشخص آخر سواء ذكر أو من دون ذكر المرجع الأصلي، والنسخ واللصق من مصادر متعددة، وإعادة الصياغة بتغيير بعض الكلمات واستخدام بعض المرادفات، وعدم الاعتراف بالجهات الداعمة كجهات قدمت البيانات اللازمة للبحث.

صحيحٌ أن أدوات الذكاء الاصطناعي، من قبيل (تشات جي بي تي)، القائمة على خوارزميات تعرف بالنماذج اللغوية الكبيرة، يمكن أن توفر الوقت، وتجعل النصوص أوضح، وتقلل الفجوة الناشئة عن العوائق اللغوية، وهناك كثرة من الباحثين الذين يرون ألّا ضير في الاستعانة بها في ظروف بعينها، شريطة الإفصاح عن استخدامها بشكلٍ واضح لا لبس فيه.

والتوصيف الذي وضعته الشبكة الأوروبية للنزاهة الأكاديمية التي تضم في عضويتها جامعات وأفرادًا للاستخدام الممنوع أو غير المُفصَح عنه لأدوات إنتاج النصوص القائمة على الذكاء الاصطناعي هو: "توليد المحتوى بطريقة غير مصرَّح بها"؛ ما يعني أنها لم تجزم بأن هذا مما يدخل في باب السرقة العلمية، وتقول فيبر-فولف: "السرقة العلمية - من وجهة نظري- هي سرقة أشياء يمكن نسبتها إلى شخص آخر معلوم".

وقد احتجَّ عدد من المؤسسات الإعلامية وآحاد المؤلفين على ما يرون أنه انتهاكٌ لحقوق الملكية الفكرية من قِبل أنظمة الذكاء الاصطناعي، ففي ديسمبر من عام 2023، رفعت صحيفة (ذا نيويورك تايمز) دعوى قضائية ضد شركة التكنولوجيا العملاقة (مايكروسوفت)، وشركة (أوبن إيه آي) وهي الشركة الأمريكية التي تقف وراء النموذج اللغوي الكبير المسَّمى (جي بي تي 4) الذي يقوم عليه روبوت الدردشة (تشات جي بي تي)، وفي هذه القضية المنظورة أمام المحاكم الأمريكية، ادَّعت الصحيفة على الشركتين المشار إليهما أنهما نَسَختا الملايين من مقالاتها لتغذية النماذج اللغوية الكبيرة التي باتت تنافس الصحيفة فيما تقدم من مواد صحفية، واشتملت الدعوى على أمثلةٍ على توجيهات بعينها عند إدخالها إلى النموذج (جي بي تي 4) نتج العديد من الفقرات المنقولة من مقالات الصحيفة نقلًا حرفيًّا أو يكاد.`,

p7: `وقد احتجَّ عدد من المؤسسات الإعلامية وآحاد المؤلفين على ما يرون أنه انتهاكٌ لحقوق الملكية الفكرية من قِبل أنظمة الذكاء الاصطناعي، ففي ديسمبر من عام 2023، رفعت صحيفة (ذا نيويورك تايمز) دعوى قضائية ضد شركة التكنولوجيا العملاقة (مايكروسوفت)، وشركة (أوبن إيه آي) وهي الشركة الأمريكية التي تقف وراء النموذج اللغوي الكبير المسَّمى (جي بي تي 4)، الذي يقوم عليه روبوت الدردشة (تشات جي بي تي)، وفي هذه القضية المنظورة أمام المحاكم الأمريكية، ادَّعت الصحيفة على الشركتين المشار إليهما أنهما نَسَختا الملايين من مقالاتها لتغذية النماذج اللغوية الكبيرة، التي باتت تنافس الصحيفة فيما تقدم من مواد صحفية، واشتملت الدعوى على أمثلةٍ على توجيهات بعينها، عند إدخالها إلى النموذج (جي بي تي 4)، نتج العديد من الفقرات المنقولة من مقالات الصحيفة نقلًا حرفيًّا أو يكاد.`,

p8_12: `مما كتبه أحمد أمين (بتصرف):

كانت حارتنا تشمل ثلاث طبقات، فالغني من الطبقة العليا كان شيخًا معممًا، هو نائب المحكمة العليا الشرعية وسيد الحارة، إذا حضر من عمله تأدب أهلها، فلا ترفع نساء الطبقة الدنيا أصواتهن، وكثيرًا ما يجتمع في منظرته أبي وبعض أهل العلم يتدارسون المسائل الفقهية، وفي يوم المحمل أو الاحتفال بالمولد النبوي يلبس الشيخ "فرجية" مقصبة مذهبة، ويركب بغلة، ويذهب بها إلى مكان الاحتفال.

أما الطبقة الوسطى، فكانت تتألف من موظفين في الدواوين، هذا كاتب في ديوان الأوقاف، وهذا كاتب في الدفترخانة، وبيوت الطبقة الدنيا يسكنها بنّاء أو مبيض أو خياط..إلخ، وهؤلاء كثيرو الأولاد بؤساء ولا يشعرون ببؤسهم، يعيشون أغلب أيامهم على الطعمية والفول المدمس، وقليلًا ما يستطيعون أن يطبخوا، كما أن أولادهم لا يُعلَّمون في كتّاب ولا مدرسة.

ولكن مع اختلاف هذه الطبقات فقد كنا - نحن الأطفال - ديمقراطيين، لا نقيم كبير وزن لغنى ولا فقر، ولا تعلم ولا جهل، فكنا نلعب سواسية، ونتخاطب بلغة واحدة ليس فيها تكبر ولا ضعة، وكان أحب أصدقائي إلي ابن كاتب في الدفترخانة، وابن صاحب مقهى، وابن فقيه كفيف يقرأ في البيوت كل يوم صباحًا.

كانت نسبة المواليد في الحارة نسبة عكسية مع الطبقات، فأفقر الطبقات أكثرها عددًا؛ تلد سيدة ستة أو ثمانية أو عشرة، والبيت الغني الوحيد ليس به ولد، وكلما كثر عدد المواليد كثر عدد الوفيات، فالحالة الصحية أسوأ ما يكون، لا عناية بنظافة ماء، ولا بنظافة أكل، وهم لا يعرفون طبيبًا، وإنما يمرض المريض فيعالجه كل زائر وزائرة، كل يصف دواء من عند العطار جربه فنجح، والمريض تحت رحمة القدر، وقد يصاب أحد بالحمى فيزوره كل من أراد، ويسلم عليه ويجلس بجانبه طويلًا، ويحدثه طويلًا، فتكون العدوى أمرًا سهلًا ميسورًا، ولذلك كان كثيرًا ما يتخطف الموت أصدقائي من الأطفال حولي. كانت الحارة وما حولها مدرسة لي، تعلمت منها اللغة العامية القاهرية الصميمة، وتعلمت منها كل العادات والتقاليد.`,

p13: `▪ قال أحمد أمين:
"كانت نسبة المواليد في الحارة نسبة عكسية مع الطبقات، فأفقر الطبقات أكثرها عددًا؛ تلد سيدة ستة أو ثمانية أو عشرة، والبيت الغني الوحيد ليس به ولد، وكلما كثر عدد المواليد كثر عدد الوفيات، فالحالة الصحية أسوأ ما يكون، لا عناية بنظافة ماء ولا بنظافة أكل؛ وهم لا يعرفون طبيبًا، وإنما يمرض المريض فيعالجه كل زائر وزائرة، كل يصف دواء من عند العطار جربه فنجح".

▪ وقال طه حسين في كتابه "الأيام":
"تدعوه أخته إلى الدخول فيأبى، فتخرج فتشده من ثوبه فيمتنع عليها، فتحمله بين ذراعيها كأنه الثُّمامة، وتعدو به إلى أمِّه، حيث تُنيمه على الأرض وتضع رأسه على فخِذها، ثم تعمد إلى عينيه المظلمتين فتفتحهما واحدة بعد الأخرى، وتُقطر فيهما سائلًا يؤذيه ولا يُجدِي عليه خيرًا، وهو يألم، ولكنه لا يشكو ولا يبكي..."`,

p14: `"وكان مجلس الصبي من هذه الغرفة معروفًا محدودًا كمجلسه من كل غرفةٍ سكنها واختلف إليها، حصير قد بسط على الأرض، أُلقي عليه بساط قديم، ولكنه قيِّم. هنالك يجلس أثناء النهار، وهنالك ينام أثناء الليل؛ تُلقى له وسادة يضع عليها رأسه ولحاف يلتف فيه، وكان يحاذي مجلسه من الغرفة مجلس أخيه الشيخ، حصير قد بسط على الأرض وأُلقي عليه بساط، ثم أُلقي على البساط فراش آخر، ثم أُلقي من فوق هذا الفراش حشية، عليها كان يجلس الفتى الشيخ ويجلس معه أصفياؤه، ولم يكونوا يسندون ظهورهم إلى الحائط كما كان يفعل الصبي، وإنما كانوا يسندونها إلى وسائد."`,

p15_22: `قال محمود حسن إسماعيل:

1- يا سماء الشرق طوفي بالضياء وانشري شمسك في كل سماء
2- ذكِّريه واذكري أيامه بهدى الحق ونور الأنبياء
3- كانت الدنيا ظلامًا حوله وهو يهدي بخطاه الحائرينا
4- أرضه لم تعرف القيد ولا خفضت إلا لباريها الجبينا
5- كيف يمشي في ثراها غاصبًا يملأ الأفق جراحًا وأنينا؟
6- كيف من جناتها يجني المنى ونرى في ظلها كالغرباء؟
7- أيها السائل عن راياتنا لم تزل خفّاقة في الشهب
8- تشعل الماضي وتسقى ناره عزة الشرق وبأس العرب`,

p23: `قال عبد المحسن الكاظمي:

لله جمعيةٌ للشرق جامعة شتت عزم لغير الشرق ما جمعا
لا الدين فيها بمرموقٍ تعصُّبه ولا السياسة القت عندها نجعا`,

p24: `قال العقاد:

إنا لنضحك لا صفًا ولا لعبًا وقد ينوح بغير الدمع أسوان`,

p25: `قال مطران:

وأنتِ أوقدتِ في جنبي الغرام فما قَدِتُ إلَّا حسبتُ المهد محترقا`,

p26: `قال فوزي المعلوف:

أشواقي إلى الوادي! وادي الهوى والحسن والشعر
يا طول ملهى صباي ومهد ميلادي وعساي يكون بحضنه قبري`,

p27_32: `قال ميخائيل نعيمة في (قصة أبو بطة):

"كان أبو بطة سيِّد العتّالين وكنت قد كلَّفته مصادفة بنقل حقيبة خفيفة مسافة لا تتجاوز المائة من الخطوات، ثم نقدته أجرًا كان على ما بدا لي فوق ما توقعه، فما كاد يصدِّق عينيه، والتفت إلي وقال: "ممنون يا أستاذ"، ومن هنا صارت صداقتنا.

وذات يوم ذهبت لأبتاع حاجة من المخزن الذي وقف أبو بطة جلّ عمره على خدمته، فرأيت صديقي وقد جاوز الخمس والثمانين على عادته رابضًا على العتبة، وفي يده رغيف من الخبز يقضمه على مهل بما تبقّى في فمه من أسنان بالية، حييته بلطف فما هشّ ولا بشّ، بل تظاهر كأنه لم يرني ولم يسمعني، وما دخلت المخزن حتى بادرني صاحبه بقوله: جئت في وقتك، فما يستطيع غيرك أن يخرجنا من هذا المأزق، أترى ذلك البرميل من زيت النفط؟ إن صاحبك أبا بطة يصر على حمله، ويؤكد أنه ليس في المدينة كلّها عتّال يقوى عليه، ويأبى أن نأتي بابنه حسين ليحمله. أفلا تلطفت وأقنعته؟

ما كاد صاحب المخزن يُنهي كلامه حتى وثب أبو بطة من مربضه وصاح، بل زمجر، واللقمة ما تزال في فمه يحاول بلعها فلا تنبلع: نادوه - نادوه، لا حسين ولا غير حسين يستطيع أن يحمله ويخطو به خطوة واحدة. وجاءوا بحسين فألقى نظرة على برميل النفط، ثم دحرجه قليلًا، ثم حاول رفعه من جانب واحد، ثم جمد مكانه برهة في تردُّد ووجل. وأخيرًا تنحَّى جانبًا وقال بخجل وانكسار قلب: ولا أبي في ربيع مجده كان يستطيع أن يقوم به، عندئذ تقدم أبو بطة من البرميل وبحركة عصبيّة من يده اليمنى دفع بابنه بضع خطوات إلى الوراء متمتمًا: اليوم أعرفك قدر نفسك، ثم نادى بصوت عالٍ: ائتوني بمن يرفعه إلى ظهري، فجاءوه بعتّالين آخرين علاوة على حسين، والثلاثة رفعوا البرميل وأوثقوه جيدًا بالحبل إلى ظهر أبي بطة، ولحظت أن العتّالين وصاحب المخزن ومستخدميه قد حبسوا أنفاسهم مثلي...!

ولكن أبا بطة خطا بالبرميل خطوة الجمل، وهتف الجميع: عاش أبو بطة! عاش بطل العتّالين! عاش قاهر الخمس والثمانين! وبغتة أريت أبا بطة يجمد مكانه ثم أبصرته يهوي فينطح الأرض بجبينه، وكان آخر ما أبصرتُ النجيع على شفتيها وجبهتها، والجثّة هامدة تجمّد الحبل حول عنقها. وكان آخر ما سمعتُ نداء المؤذن: "الله أكبر".

*النجيع: الدم`,

p33: `▪ قال ميخائيل نعيمة: "جاءوا بحسين فألقى نظرة على برميل النفط، ثم دحرجه قليلًا، ثم حاول رفعه من جانب واحد، ثم جمد مكانه برهة في تردُّد ووجل".

▪ وقال إبراهيم أصلان في نص (الكنيسة نورت): "كان أهالي إمبابة يقضون سهراتهم على طول شاطئ النيل الممتد، وهم يتسامرون ويشربون الشاي، والأولاد يلعبون، وهم يحملون الحُصر والأواني، يغادرون الحواري وهم يحملون الحصر."`,

p53: `"المحميات الطبيعية من الكنوز المهمة التي تحقق التنوع البيولوجي للكائنات الحية"`,

p54: `الرياضيات أسهل من الفيزياء؛ فالرياضيات أداة أساسية في عمل الفيزياء، والفيزياء تتطلب فقط الفهم العام للرياضيات دون الحاجة إلى إتقانها بشكل عميق.

إن الفيزياء تحتاج إلى بعض المفاهيم الرياضية المحددة، مثل المعادلات التفاضلية المثلثية، ولا يتطلب من دارس الفيزياء فهم كيفية استخراج أو إثبات هذه المعادلات، بل هو بحاجة فقط لاستخدام نتائج الرياضيات لحل المسائل الفيزيائية بناءً على شروط المسألة.`

 explain:"لأن هذه العبارة تصف الشرق بأنه يهدي الحائرين (الضائعين والتائهين في ظلام الجهل) بخطاه، وهذا دليل مباشر على الريادة الحضارية والفكرية للشرق في إرشاد غيره من الأمم."},

{n:20, type:"mcq", passage:"p15_22", text:"20- استنتج العاطفة المسيطرة على الشاعر في الأبيات.",
 options:["الإعجاب بالوطن والاعتزاز بأمجاده العظيمة.","التعجب من استكانة أبناء الوطن وضعفهم.","الأمل والرغبة في بناء نهضة قوية للوطن.","الإشادة بأمجاد السابقين والأمل في عودتها."],
 correct:0,
 explain:"لأن أغلب الأبيات تدور حول التغني بمجد الشرق وأمجاده التاريخية وريادته الحضارية وحريته الأصيلة، وهذا يدل على عاطفة الإعجاب والاعتزاز بالوطن."},

{n:21, type:"mcq", passage:"p15_22", text:"21- ميز نوع الصورة البيانية في قول الشاعر: \"تشعل الماضي\" في البيت الأخير.",
 options:["كناية عن موصوف.","استعارة تصريحية.","تشبيه بليغ.","استعارة مكنية."],
 correct:3,
 explain:"شبّه الشاعر الماضي بشيء قابل للاشتعال (إعادة الحياة فيه)، فحذف المشبه به (النار أو الشيء المشتعل) وذكر صفة من صفاته (تشعل)، وهذه استعارة مكنية."},

{n:22, type:"mcq", passage:"p15_22", text:"22- استنتج السمة التي ظهرت في الأبيات من سمات مدرسة أبولو.",
 options:["العاطفة الجياشة في التغني بأمجاد الشرق.","الحنين إلى مواطن الذكريات وأيام الصبا.","التأمل والتعمق في ظواهر الأشياء.","غلبة المناسبات والمحافل في أشعارهم."],
 correct:0,
 explain:"لأن هذا هو موضوع النص بالتحديد، حيث ظهرت العاطفة القوية والجياشة في حب الشرق والتغني بأمجاده."},

{n:23, type:"mcq", passage:"p23", text:"23- استنتج السمة التي اتضحت في البيتين من سمات مدرسة الإحياء من حيث الموضوع.",
 options:["إيمانهم بضرورة الإصلاح الاجتماعي والاقتصادي.","ترسيخ الإحساس بتراث الأجداد والماضي العريق.","التنديد بالاحتلال ومظالمه.","الإيمان بفكرة الجامعة الإسلامية."],
 correct:3,
 explain:"لأن الشاعر يتحدث عن \"جمعية للشرق جامعة\" تجمع عزم الشرق دون تعصب ديني أو سياسي، وهذا يدل على إيمانه بفكرة الجامعة الإسلامية الشاملة لكل الشرق."},

{n:24, type:"mcq", passage:"p24", text:"24- استنتج السمة التي ظهرت في البيت السابق من سمات مدرسة الديوان.",
 options:["غلبة الجانب العاطفي على الجانب الذهني.","ظهور مسحة الحزن والتشاؤم.","التعبير عن قضايا العصر.","التأمل في الكون والتعمق في أسرار الوجود."],
 correct:1,
 explain:"لأن الشاعر يقول إن ضحكهم ليس صفاءً ولا لعبًا، بل قد ينوحون بغير الدموع، وهذا يدل على مسحة الحزن والتشاؤم التي تكمن خلف مظاهر الفرح الزائفة."},

{n:25, type:"mcq", passage:"p25", text:"25- بيّن السمة التي اتضحت في البيت السابق من سمات الاتجاه الوجداني.",
 options:["الاهتمام بالنواحي البيانية مثل: \"أوقدت في جنبي الغرام\".","الاعتماد على الرمز واللغة الحية مثل: \"جنبي\".","قوة العاطفة تجاه المحبوبة والذاتية في: \"حسبت المهد محترقا\".","ظهور مسحة التشاؤم والحزن في: \"محترقا\"."],
 correct:2,
 explain:"لأن الشاعر يعبر عن شدة تأثره وعاطفته الذاتية تجاه محبوبته التي أوقدت في جنبه نار الغرام حتى ظن أن المهد (مكان طفولته) قد احترق، وهذا يعكس قوة العاطفة والذاتية الواضحة في التعبير."},

{n:26, type:"mcq", passage:"p26", text:"26- أيٌّ - مما يلي - يؤكد تحقق سمة الحنين إلى الوطن لدى شعراء المهجر في البيتين السابقين.",
 options:["عبر عن شدة شوقه إلى موطن ميلاده ولعبه.","أظهر رغبته في التمتع بجمال الوادي في غربته.","عبر عن إعجابه بما في قريته من جمال.","أظهر رغبته في رؤية قبور الوادي."],
 correct:0,
 explain:"لأن الشاعر يعبر عن شدة شوقه إلى الوادي الذي كان \"ملهى صباي ومهد ميلادي\"، وهذا تعبير مباشر عن الحنين إلى موطنه وذكريات طفولته."},

{n:27, type:"mcq", passage:"p27_32", text:"27- ما الكلمة التي تؤدي معنى جملة: \"ما هشّ ولا بشّ\" في سياق الفقرة الثانية؟",
 options:["تجمّل.","تألم.","تصنّع.","تجاهل."],
 correct:3,
 explain:"لأن النص يكمل: \"بل تظاهر كأنه لم يرني ولم يسمعني\"، فهو تجاهله تمامًا ولم يرحب به أو يبتسم له."},

{n:28, type:"mcq", passage:"p27_32", text:"28- بمَ وصف الكاتب \"أبا بطة\" في الفقرة الثانية؟",
 options:["بدت عليه علامات اليأس والإحباط والضيق.","بدت عليه علامات الشيخوخة والهرم.","حب الطعام والإسراف فيه.","التكبر والتعالي على الناس."],
 correct:1,
 explain:"وصفه الكاتب بأنه \"جاوز الخمس والثمانين\"، رابضًا على العتبة، يقضم رغيفًا \"بما تبقى في فمه من أسنان بالية\"، وهذه كلها علامات الشيخوخة والهرم الواضحة."},

{n:29, type:"mcq", passage:"p27_32", text:"29- استنتج مغزى قوله: \"اليوم أعرفك قدر نفسك\" في سياق الفقرة الثالثة.",
 options:["الثقة والتحدي.","الغضب والغيظ.","الشماتة والتشفي.","المزاح والمداعبة."],
 correct:0,
 explain:"قالها أبو بطة بعد أن دفع ابنه حسين إلى الوراء وهو يستعد لحمل البرميل بنفسه إثباتًا لقوته أمام الجميع، فهي عبارة تحدٍّ وثقة بالنفس رغم تقدمه في السن."},

{n:30, type:"mcq", passage:"p27_32", text:"30- بيّن نوع الصورة البيانية وقيمتها الفنية في قوله: \"وقف أبو بطة جلّ عمره على خدمته\" في الفقرة الثانية.",
 options:["تشبيه بليغ، يظهر حب أبي بطة للعمل.","كناية، تؤكد ما أصابه من الملل والسأم.","مجاز مرسل، يبين إخلاصه في العمل.","استعارة تصريحية، تبين قوة التحمل."],
 correct:0,
 explain:"شبّه الكاتب تفاني أبي بطة في خدمة المخزن طوال عمره بالوقوف الدائم، وهذا تشبيه بليغ يظهر مدى حب أبي بطة وتفانيه في عمله."},

{n:31, type:"mcq", passage:"p27_32", text:"31- هات من الموضوع ما يدل على أن أبا بطة لم يدرك تأثير مرور السنين على قوته.",
 options:["\"إن صاحبك أبا بطة يصر على حمله، ويؤكد أنه ليس في المدينة كلها عتّال يقوى عليه\".","\"فرأيت صديقي وقد جاوز الخمس والثمانين على عادته رابضًا على العتبة\".","\"فألقى نظرة على برميل النفط، ثم دحرجه قليلًا، ثم حاول رفعه من جانب واحد\".","\"وأخيرًا تنحَّى جانبًا وقال بخجل وانكسار قلب: ولا أبي في ربيع مجده كان يستطيع أن يقوم به\"."],
 correct:0,
 explain:"لأن هذه العبارة تظهر إصرار وثقة أبي بطة المطلقة بقدرته على حمل البرميل وحده، رافضًا الاستعانة بابنه، وهذا يدل بوضوح على عدم إدراكه أن السنين قد أثرت على قوته الجسدية."},

{n:32, type:"mcq", passage:"p27_32", text:"32- استخرج من النص تشبيهًا، وبين سر جماله.",
 options:["\"عاش قاهر الخمس والثمانين\"، وسر جماله التشخيص.","\"حبسوا أنفاسهم\"، وسر جماله التشخيص.","\"وثب أبو بطة من مربضه وصاح\"، وسر جماله التوضيح.","\"خطا بالبرميل خطوة الجمل\"، وسر جماله التوضيح."],
 correct:3,
 explain:"شبّه الكاتب خطوة أبي بطة بخطوة الجمل (في الثبات والقوة وحمل الأعباء الثقيلة)، وسر جمال هذا التشبيه هو التوضيح، فقد وضّح صورة قوة وثبات أبي بطة وهو يحمل البرميل الثقيل."},

{n:33, type:"mcq", passage:"p33", text:"33- وازن بين الكاتبين من حيث استخدامهما للصورة الكلية في الفقرتين السابقتين.",
 options:["عناصر الصورة الكلية أوضح عند الكاتب منها عند أصلان.","افتقدت الصورة الكلية بعض عناصرها عند الكاتب ولم تظهر عند أصلان.","عناصر الصورة الكلية أوضح عند أصلان منها عند الكاتب.","افتقدت الصورة الكلية بعض عناصرها عند أصلان ولم تظهر عند الكاتب."],
 correct:2,
 explain:"لأن مشهد إبراهيم أصلان عن أهالي إمبابة جاء أكثر تفصيلًا وحيوية ووضوحًا في عناصره (السهر، التسامر، شرب الشاي، لعب الأولاد، حمل الحصر والأواني)، بينما مشهد نعيمة عن حسين كان أقل تفصيلًا في رسم الصورة الكلية."},

{n:34, type:"mcq", passage:"p27_32", text:"34- حدد مما يلي أي مقومات القصة القصيرة تحقق في هذا النص.",
 options:["محدودية الشخصيات، والأحداث.","امتداد عنصري الزمان والمكان.","الحوار الصامت غير المنطوق.","التقرير والخطابية والمباشرة."],
 correct:0,
 explain:"القصة القصيرة تتميز بمحدودية الشخصيات (أبو بطة، حسين، صاحب المخزن، الكاتب) ومحدودية الأحداث التي تدور حول حادثة واحدة محددة (حمل البرميل)، وهذا ما تحقق في هذا النص."},

{n:35, type:"mcq", passage:"p27_32", text:"35- بيّن كيف عبر الكاتب عن فكرته للقراء في هذا العمل الأدبي.",
 options:["اعتمد على الحوار الداخلي ليفصح للقارئ عن مجتمع الحمالين.","اعتمد على أسلوب الإلقاء في عبارات تقريرية لإيصال الفكرة.","جمع بين الحقيقة والخيال في رسم ملامح العتالين وسرد الأحداث.","جمع بين السرد والحوار القصصي لإقناع القارئ بوجهة نظره."],
 correct:3,
 explain:"اعتمد الكاتب في تقديم قصته على السرد (وصف الأحداث والشخصيات) إلى جانب الحوار القصصي المباشر بين الشخصيات (مثل حوار صاحب المخزن مع الكاتب، وأبي بطة)، وهذا الجمع بين السرد والحوار هو ما أوصل فكرته للقراء."},

{n:36, type:"mcq", passage:null, text:"قال الشاعر: ليس الجمال بأثواب تزيننا إنّ الجمال جمال العلم والأدب\n\n36- ميز - مما يلي - المحل الإعرابي لجملة (تزيننا) الواردة في الشطر الأول.",
 options:["نصب خبر.","جر نعت.","جر مضاف إليه.","نصب حال."],
 correct:1,
 explain:"جملة (تزيننا) في محل جر نعت لكلمة (أثواب) المجرورة بحرف الجر (الباء)."},
{n:37, type:"mcq", passage:null, text:"قال الشاعر: لِمِصْرَ أُمِّ لرُّبُوعِ الشَّامُ تَنْتَسِبُ، هُنَا العُلَا وَهُنَاكَ المَجْدُ وَالحَسَبُ.\n\n37- حدد إعراب كلمة (العُلَا) في الشطر الثاني من البيت السابق.",
 options:["مبتدأ.","خبر.","مضاف إليه.","بدل."],
 correct:0,
 explain:"(العلا) مبتدأ مرفوع، وما بعدها (المجد والحسب) معطوف عليه، والجملة الفعلية (تنسبه) في محل رفع خبر المبتدأ."},

{n:38, type:"mcq", passage:null, text:"قال الشاعر: وليس بعامر بنيان قوم إذا أخلاقهم كانت خرابًا\n\n38- ميز - مما يلي - إعراب كلمة \"بنيان\" في البيت السابق.",
 options:["مبتدأ.","اسم ليس.","خبر ليس.","مضاف إليه."],
 correct:1,
 explain:"(بنيان) اسم (ليس) مرفوع، وجاء متأخرًا عن الخبر (عامر) الذي تقدم عليه بسبب دخول الباء الزائدة على الخبر."},

{n:39, type:"mcq", passage:null, text:"(يسعى المرء نحو تحقيق أهدافه فيعمل عقله ويتقن عمله فيكتسب الخبرات)\n\n39- ميز الفعل (اللازم) الوارد في المقولة السابقة.",
 options:["يعمل.","يتقن.","يسعى.","يكتسب."],
 correct:2,
 explain:"(يسعى) فعل لازم لا يحتاج إلى مفعول به ليكتمل معناه (يسعى نحو تحقيق أهدافه: شبه جملة جار ومجرور وليس مفعولًا به)، بينما (يعمل، يتقن، يكتسب) كلها أفعال متعدية تأخذ مفعولًا به."},

{n:40, type:"mcq", passage:null, text:"(نعم الخلق الذي يتحلى به المرء الوفاء)\n\n40- بيّن - مما يلي - المخصوص بالمدح في المقولة السابقة.",
 options:["الوفاء.","المرء.","الخلق.","الذي."],
 correct:0,
 explain:"(الوفاء) هو المخصوص بالمدح بعد فعل المدح (نعم)، وهو مبتدأ مؤخر، والجملة قبله (نعم الخلق الذي يتحلى به المرء) خبر مقدم."},

{n:41, type:"mcq", passage:null, text:"(لا يغرك ارتقاء السهل، إذا كان المنحدر وعرًا؛ فإن الذي يتأنى ويتدرب يتغلب على ما يعتريه)\n\n41- بيّن الفعل الذي يجوز توكيده بالنون في المقولة السابقة.",
 options:["يتأنى.","يغرك.","يتغلب.","يعتري."],
 correct:0,
 explain:"يجوز توكيد الفعل المضارع بنون التوكيد إذا كان مسندًا إلى ضمير يجوز معه بناء أمره، و(يتأنى) فعل مضارع طلبي السياق (يفيد النصح) يجوز توكيده بالنون فيصبح (يتأنينّ)."},

{n:42, type:"mcq", passage:null, text:"(كفى باليقين غنًى)\n\n42- ميز - مما يلي - إعراب كلمة (اليقين) في المقولة السابقة.",
 options:["خبر.","فاعل.","تمييز مجرور.","مفعول به."],
 correct:1,
 explain:"(اليقين) فاعل لفعل (كفى) مجرور لفظًا بحرف الجر الزائد (الباء) ومرفوع محلًا، وهذا أسلوب من أساليب التوكيد المعروفة."},

{n:43, type:"mcq", passage:null, text:"قال الشاعر: تأبى الرماح إذا اجتمعن تكسّرًا وإذا افترقن تكسرت آحادا\n\n43- ميز المحل الإعرابي لجملة (تكسرت) في البيت السابق.",
 options:["نعت.","مضاف إليه.","حال.","لا محل لها."],
 correct:3,
 explain:"جملة (تكسرت) هي جواب الشرط لأداة الشرط (إذا) غير الجازمة، وجواب الشرط مع (إذا) غير الجازمة لا محل له من الإعراب."},

{n:44, type:"mcq", passage:null, text:"44- ميز الجملة التي بها (كم) استفهامية.",
 options:["كم قرنٍ بُنيَ أهرام الجيزة.","كم أعمالٍ للخيرات قدّمت.","كم من ليلةٍ سهرتها أتأمل.","كم أمنياتٍ عشناها ثم حققناها."],
 correct:0,
 explain:"(كم) في الاختيار الأول استفهامية تسأل عن عدد القرون التي بنيت فيها أهرام الجيزة، وتمييزها مفرد منصوب (قرنًا)، بينما بقية الاختيارات تستخدم (كم) الخبرية التي يأتي تمييزها مجرورًا بـ (من) أو مجرورًا بالإضافة بصيغة الجمع."},

{n:45, type:"mcq", passage:null, text:"قال الشاعر: وإذا اؤتمنت على الأمانة فارعها إن الكريم على الأمانة راعِ\n\n45- بيّن سبب اقتران جواب الشرط بالفاء في البيت السابق.",
 options:["منفية.","اسمية.","مبدؤة بجامد.","طلبية."],
 correct:3,
 explain:"جواب الشرط (فارعها) جملة طلبية (فعل أمر)، وجواب الشرط إذا كان جملة طلبية يجب اقترانه بالفاء."},

{n:46, type:"mcq", passage:null, text:"(يجب عليك ألا تقصر في رد الأمانات، وإلا تندم. ألا تحب أن يغفر الله لك؟)\n\n46- ميز - مما يلي - المضارع المجزوم في المقولة السابقة.",
 options:["يجب.","تغفر.","تندم.","تحب."],
 correct:2,
 explain:"(تندم) فعل مضارع مجزوم في جواب الشرط بعد أداة الشرط (إن) المحذوفة المقدّرة في (إلا = إن + لا)، بينما باقي الأفعال مرفوعة لعدم وجود ما يجزمها."},

{n:47, type:"mcq", passage:null, text:"47- بيّن - مما يلي - أسلوب الاختصاص الصحيح.",
 options:["شباب الوطن، احرصوا على نهضته الكبرى.","أنتم شباب مثقف تسعون إلى المجد.","أيها الشباب ليكن شعاركم الجد والاجتهاد.","أصبحتم شباب النيل درع الوطن."],
 correct:3,
 explain:"أسلوب الاختصاص يتكون من ضمير (نحن أو نا أو تم...) متبوع باسم منصوب يفسره (مختص)، وفي الاختيار (د): \"أصبحتم شباب النيل\" يأتي الضمير (تم) متبوعًا بالاسم المختص المنصوب (شباب النيل)."},

{n:48, type:"mcq", passage:null, text:"(صاحب الأخيار تعلُ مكانتك، وتهنأ نفسك، ويسترح بالك، وتنل محبة الناس)\n\n48- ميز - مما يلي - الفعل المعرب بعلامة فرعية في المقولة السابقة.",
 options:["تعلُ.","تنل.","تهنأ.","يسترح."],
 correct:0,

{n:55, type:"essay", passage:null, text:"55- اكتب كلمة افتتاحية لندوة للتوعية بتحكيم العقل في التصرف تحت عنوان: (عقلك قبل لسانك ويديك).\n\nالكلمة من (6-8) أسطر في حدود (80) كلمة تتضمن:\n- التعريف بالغرض من الندوة - أهميتها - الجمهور المستهدف.\n- التعريف بالمتحدثين الرئيسيين في الندوة أو (صفتهم).\n- عبارات ترحيبية تستثير اهتمام الجمهور لمتابعة الندوة (يشمل ذلك استشهادات أو أقوالًا مأثورة).",
 model:`الحضور الكرام، تحية طيبة لحضراتكم..

ميّز الله الإنسان عن غيره من المخلوقات بالعقل والتفكير، لذا وجب على الإنسان أن يُحسن استخدام تلك النعمة الإلهية ويجعلها بمثابة أداة لتقييم كل ما يقول أو يفعل؛ فلا تصدر عنه كلمة أو تصرف إلا بعدما يزن ذلك بميزان العقل والحكمة، إذ يترتب على ذلك عواقب وخيمة لا يمكن علاجها.

ومن هنا تأتي هذه الندوة لنتناقش كيفية تطبيق ذلك في حياتنا اليومية، وقد وجهنا الدعوة إلى عدد من شباب الجامعات المصرية باعتبارهم الفئة الأكثر حاجة إلى تنظيم دور العقل في مستقبلهم العلمي والعملي والاستغلال الأمثل له، ويسعدنا أن تكون مشاركتهم فعّالة في نقاشنا.

ويتحدث إليكم في هذه الندوة الأستاذ الدكتور/ محمود علي - رئيس قسم الفلسفة والمنطق بكلية الآداب جامعة عين شمس، والدكتور/ فوزي سامي - أستاذ التخطيط وعلوم المستقبل بجامعة القاهرة، والأستاذة الدكتورة/ سماح عبد المقصود - أستاذة الشريعة والفقه بجامعة الأزهر الشريف.

نرحب بحضراتكم جميعًا.. ونحن على ثقة بأن كل من لبى دعوة هذه الندوة وحضرها سوف يخرج منها بفائدة عظيمة من خلال الاستفادة من خبرات وعلم السادة المتحدثين فيها من عالمنا، ولا ننسى قوله تعالى: {إِنَّ فِي خَلْقِ السَّمَاوَاتِ وَالْأَرْضِ وَاخْتِلَافِ اللَّيْلِ وَالنَّهَارِ لَآيَاتٍ لِأُولِي الْأَلْبَابِ * الَّذِينَ يَذْكُرُونَ اللَّهَ قِيَامًا وَقُعُودًا وَعَلَىٰ جُنُوبِهِمْ وَيَتَفَكَّرُونَ فِي خَلْقِ السَّمَاوَاتِ وَالْأَرْضِ}، داعين الله أن يلهمنا إلى تدارك ما بقي من علامنا.`}
];

const container = document.getElementById("examArea");
let lastPassage = null;

data.forEach((q, idx) => {
  if (q.passage && q.passage !== lastPassage) {
    const pdiv = document.createElement("div");
    pdiv.className = "passage";
    pdiv.textContent = passages[q.passage];
    container.appendChild(pdiv);
    lastPassage = q.passage;
  }
  if (!q.passage) lastPassage = null;

  const qdiv = document.createElement("div");
  qdiv.className = "question";
  qdiv.id = "q" + q.n;

  const qt = document.createElement("div");
  qt.className = "qtext";
  qt.textContent = q.text;
  qdiv.appendChild(qt);

  if (q.type === "mcq") {
    const ul = document.createElement("ul");
    ul.className = "options";
    const letters = ["أ","ب","ج","د"];
    q.options.forEach((opt, i) => {
      const li = document.createElement("li");
      li.textContent = letters[i] + ") " + opt;
      li.dataset.index = i;
      li.onclick = () => {
        if (qdiv.classList.contains("checked")) return;
        ul.querySelectorAll("li").forEach(l => l.classList.remove("selected"));
        li.classList.add("selected");
        saveAnswer(q.n, i);
      };
      ul.appendChild(li);
    });
    qdiv.appendChild(ul);

    const exp = document.createElement("div");
    exp.className = "explain";
    exp.textContent = "التوضيح: " + q.explain;
    qdiv.appendChild(exp);
  } else {
    const ta = document.createElement("textarea");
    ta.className = "essay-box";
    ta.placeholder = "اكتب إجابتك هنا...";
    ta.oninput = (e) => {
      saveAnswer(q.n, e.target.value);
    };
    qdiv.appendChild(ta);

    const ans = document.createElement("div");
    ans.className = "model-answer";
    ans.textContent = "الإجابة النموذجية:\n" + q.model;
    qdiv.appendChild(ans);
  }

  container.appendChild(qdiv);
});

function checkAnswers() {
  let correctCount = 0;
  let totalMcq = 0;
  data.forEach(q => {
    if (q.type !== "mcq") return;
    totalMcq++;
    const qdiv = document.getElementById("q" + q.n);
    qdiv.classList.add("checked");
    const lis = qdiv.querySelectorAll(".options li");
    let selectedIndex = -1;
    lis.forEach((li, i) => {
      if (li.classList.contains("selected")) selectedIndex = i;
    });
    lis.forEach((li, i) => {
      if (i === q.correct) li.classList.add("correct");
      if (selectedIndex === i && i !== q.correct) li.classList.add("wrong");
    });
    if (selectedIndex === q.correct) correctCount++;
    qdiv.querySelector(".explain").style.display = "block";
  });

  data.forEach(q => {
    if (q.type === "essay") {
      document.getElementById("q" + q.n).querySelector(".model-answer").style.display = "block";
    }
  });

  const box = document.getElementById("scoreBox");
  box.style.display = "block";
  const percent = Math.round((correctCount / totalMcq) * 100);
  box.textContent = "النتيجة: " + correctCount + " من " + totalMcq + " (" + percent + "%)";
  box.scrollIntoView({behavior:"smooth"});
}

function showAllAnswers() {
  data.forEach(q => {
    const qdiv = document.getElementById("q" + q.n);
    if (q.type === "mcq") {
      qdiv.classList.add("checked");
      const lis = qdiv.querySelectorAll(".options li");
      lis.forEach((li, i) => {
        if (i === q.correct) li.classList.add("correct");
      });
      qdiv.querySelector(".explain").style.display = "block";
    } else {
      qdiv.querySelector(".model-answer").style.display = "block";
    }
  });
}

restoreProgress();
