// Progress saving & loading utility
const pageName = window.location.pathname.split("/").pop() || "index.html";
const examKey = "exam_progress_" + pageName;

function getSavedAnswers() {
  try {
    return JSON.parse(localStorage.getItem(examKey)) || {};
  } catch (e) {
    return {};
  }
}

function saveAnswer(qNum, value) {
  const answers = getSavedAnswers();
  answers[qNum] = value;
  localStorage.setItem(examKey, JSON.stringify(answers));
}

function clearProgress() {
  if (confirm("هل أنت متأكد من رغبتك في مسح جميع إجاباتك والبدء من جديد؟")) {
    localStorage.removeItem(examKey);
    window.location.reload();
  }
}

function restoreProgress() {
  const answers = getSavedAnswers();
  for (const qNum in answers) {
    const qdiv = document.getElementById("q" + qNum);
    if (!qdiv) continue;
    const ul = qdiv.querySelector(".options");
    if (ul) {
      const selectedIndex = answers[qNum];
      const lis = ul.querySelectorAll("li");
      if (lis[selectedIndex]) {
        lis[selectedIndex].classList.add("selected");
      }
    }
  }
}

 correct:1,
 explain:"حمورابي يمثل الحضارة البابلية، وقوانينه من أقدم القوانين المسجلة في التاريخ."},

{n:5, chapter:0, text:"٥- إن العدالة مبدأ فطري يبقى في أعماق الإنسان، كصوت يفرّق بين الصواب والانحراف. يبرر ما سبق أحد مصادر القانون، وهو..........",
 options:["العرف","التشريع","الشريعة الإسلامية","القانون الطبيعي"],
 correct:3,
 explain:"مبادئ القانون الطبيعي: قواعد ثابتة لا تتغير بتغير الزمان أو المكان، وهي مرتبطة بالفطرة الإنسانية كالعدالة."},

{n:6, chapter:0, text:"٦- أثر مادي رادع تطبقه السلطات المختصة على من يخرق القانون. يدل ما سبق على إحدى خصائص القوانين وهي أنها.........",
 options:["خاصة","مقترنة بالجزاء","اختيارية","متعلقة بالنوايا"],
 correct:1,
 explain:"خاصية الإلزام المقترن بالجزاء: يجب الالتزام بالقانون ولها أثر رادع (الجزاء) على من يخالفه."},

{n:7, chapter:0, text:"٧- سلوك معين يصدر عن مجموعة من الأشخاص ويتكرر في مناسبات أخرى إلى الحد الذي يتولد معه اعتقاد لدى العامة بضرورة احترامه. نستنتج مما سبق أحد مصادر القانون وهو........",
 options:["التشريع","الشريعة الإسلامية","العرف","القانون الطبيعي"],
 correct:2,
 explain:"العرف: سلوك اعتاد عليه الناس وأصبح قاعدة عامة يتولد معها اعتقاد بضرورة احترامها."},

{n:8, chapter:0, text:"٨- «القانون يضبط العلاقة بين الناس في المجتمع ويحقق العدالة بينهم». يدل ما سبق على إحدى خصائص القانون وهي ................",
 options:["خاص","عام","اختياري","منظم"],
 correct:3,
 explain:"خاصية أن القانون منظم للسلوك: ينظم سلوك الأفراد في المجتمع، ويضبط العلاقة بينهم."},

{n:9, chapter:0, text:"٩- يقول (جيفارا): الحق الذي لا يستند إلى قوة تحميه باطل في شرع السياسة. تشير المقولة إلى أهمية .........",
 options:["تعاليم الدين","قواعد القانون","مبادئ العرف","مبادئ الأخلاق"],
 correct:1,
 explain:"المقولة تشير إلى أهمية قواعد القانون التي تحمي الحقوق بقوة الإلزام والجزاء، فبدون قانون يبقى الحق دون حماية."},

{n:10, chapter:0, text:"١٠- يقول بوزنياس: \"ينبغي أن يكون للقانون سلطة على البشر، لا أن يكون للبشر سلطة على القانون\"، المقولة توضح أحد خصائص القانون وهو أنه...............",
 options:["عام","منظم","مجرد","ملزم"],
 correct:3,
 explain:"خاصية أن القانون ملزم: يجب الالتزام به وله سلطة على الجميع، فلا يجوز أن تكون للبشر سلطة فوق القانون."},

{n:11, chapter:0, text:"١١- يقول (مونتسكيو): \"القانون يجب أن يكون مثل الموت الذي لا يستثني أحدًا\". تصف المقولة السابقة القوانين من حيث أنها ...",
 options:["تهتم بالمشاعر والنوايا","ملزمة لجميع الأفراد","تروع من يسايرها","تهمل الأفعال والأقوال"],
 correct:1,
 explain:"القانون عام مجرد وملزم لجميع الأفراد دون استثناء، تمامًا كالموت الذي لا يستثني أحدًا."},

// ===== الفصل الأول - الدستور - حل معانا =====
{n:12, chapter:1, text:"١- أسلوب ينفرد فيه الشعب بوضع الدستور بواسطة هيئة منتخبة بطريقة ديموقراطية. يصف ما سبق أحد أساليب نشأة الدساتير وهو...........",
 options:["الجمعية التأسيسية","المنحة","التعاقد","الاستفتاء الدستوري"],
 correct:0,
 explain:"أسلوب الجمعية التأسيسية النيابية: ينتخب الشعب ممثلين لإعداد الدستور نيابة عنه بطريقة ديمقراطية."},

{n:13, chapter:1, text:"٢- إن مصر وطن للمصريين ورسالة ومحبة لكل الشعوب وبالديموقراطية والتعددية السياسية. نستخلص مما سبق أحد أبواب الدستور المصري وهو......",
 options:["سيادة القانون","الدولة","الأحكام العامة","الحقوق والواجبات"],
 correct:1,
 explain:"الباب الأول - الدولة: ينص على أن الوطن خالد للمصريين ورسالة محبة للسلام، وطن يؤمن بالديمقراطية والتعددية السياسية."},

{n:14, chapter:1, text:"٣- دستور لا يمكن تعديله باتباع الإجراءات التي يتم اتباعها في تعديل أحكام القانون العادي. يكشف ما سبق عن أحد أنواع الدساتير وهي........",
 options:["المرنة","المدونة","غير المدونة","الجامدة"],
 correct:3,
 explain:"الدستور الجامد (غير المرن): يستلزم إجراءات معقدة لتعديله تختلف عن إجراءات تعديل القانون العادي."},

{n:15, chapter:1, text:"٤- توضيح وتحديد معنى القاعدة القانونية وبيان مداها ومحاولة الوصول إلى روح التشريع. نستخرج مما سبق أحد اختصاصات المحكمة الدستورية وهو..........",
 options:["الرقابة على دستورية القانون","الفصل في تنفيذ أحكام نهائية","تفسير النصوص التشريعية","الفصل في تنازع الاختصاص"],
 correct:2,
 explain:"تفسير النصوص التشريعية: من اختصاصات المحكمة الدستورية، توضح معنى القاعدة القانونية وتصل إلى روح التشريع."},

{n:16, chapter:1, text:"٥- يقول (أرسطو): الدولة الصالحة هي التي تكون فيها سيد يسير على مبادئه الحاكم. نستنتج من المقولة السابقة أهمية الدور ...........",
 options:["العرف","الدستور","الأخلاق","الدين"],
 correct:1,
 explain:"يقصد بالمقولة أهمية دور الدستور، فهو السيد الذي يسير الحاكم على مبادئه ويحكمه."},

{n:17, chapter:1, text:"٦- إلزام جميع أفراد حكامًا ومحكومين وسلطات الدولة على السواء باحترام القانون كأساس لمشروعية الأعمال التي يؤدونها. تصنف العبارة أحد أبواب الدستور وهو باب.............",
 options:["نظام الحكم","سيادة القانون","الحقوق والحريات","مجلس الشيوخ"],
 correct:1,
 explain:"الباب الرابع - سيادة القانون: سيادة القانون أساس الدولة، ويلتزم به الحكام والمحكومون وسلطات الدولة على السواء."},

{n:18, chapter:1, text:"٧- \"الحاكم قد يفرض الدستور دون موافقة الشعب وهذا يدل على أحد أساليب نشأة الدساتير\". نستنتج مما سبق أحد أساليب نشأة الدساتير، وهو .....",
 options:["التعاقد","الجمعية النيابية","استفتاء دستوري","المنحة"],
 correct:3,
 explain:"أسلوب المنحة: دساتير يضعها الحاكم دون مشاركة الشعب، وهذا الأسلوب يعني فرض الدستور دون موافقة الشعب."},

{n:19, chapter:1, text:"٨- تفسير النصوص التشريعية التي تثير خلافات في التطبيق يبرر وجود............",
 options:["مجلس الوزراء","مجلس النواب","مجلس الشعب","المحكمة الدستورية"],
 correct:3,
 explain:"المحكمة الدستورية العليا هي المسؤولة عن تفسير النصوص التشريعية التي تثير خلافًا في التطبيق."},

{n:20, chapter:1, text:"٩- القانون الأساسي الأعلى الذي يرسي القواعد والأصول التي يقوم عليها نظام الحكم ويحدد السلطات العامة ويرسم لها وظائفها. تكشف العبارة السابقة عن مفهوم.......",
 options:["الأخلاق","الدين","العرف","الدستور"],
 correct:3,
 explain:"هذا هو تعريف الدستور: القانون الأساسي الأعلى الذي يرسي قواعد نظام الحكم ويحدد السلطات العامة."},

{n:21, chapter:1, text:"١٠- \"عدم توقيع عقوبة إلا بحكم قضائي، وإن التقاضي حق مصون ومكفول للجميع\". تكشف العبارة السابقة عن أحد أبواب الدستور المصري وهو ....",
 options:["نظام الحكم","الأحكام العامة الانتقالية","المقومات الأساسية للمجتمع","سيادة القانون"],
 correct:3,
 explain:"باب سيادة القانون: ينص على أن سيادة القانون أساس الدولة، ولا تقع عقوبة إلا بحكم قضائي."},

// ===== الفصل الثاني - الديمقراطية - حل معانا =====
{n:22, chapter:2, text:"١- المشورة مبدأ ديموقراطي يسعى لاستطلاع رأي ذوي الخبرة للاطلاع والاستفادة منه. يصف ما سبق مفهوم الديموقراطية في الحضارة........",
 options:["المصرية القديمة","بلاد ما بين النهرين","العربية الإسلامية","الصينية القديمة"],
 correct:2,
 explain:"الحضارة العربية الإسلامية: الشورى أو مبدأ المشاورة، وهي استطلاع رأي ذوي الخبرة للاستفادة منه."},

{n:23, chapter:2, text:"٢- آلية تساعد على انتقال المنصب السياسي إلى شخص آخر. يكشف ما سبق عن إحدى خصائص الديموقراطية وهي..........",
 options:["تداول السلطة","التراضي والمنح","المساواة بين المواطنين","الحكم للأغلبية"],
 correct:0,
 explain:"تداول السلطة: عملية انتقال المنصب السياسي من شخص لآخر، وهي إحدى خصائص الديمقراطية."},

{n:24, chapter:2, text:"٣- شكل من أشكال الديموقراطية يتخذ فيها الشعب القرارات عبر تصويت مباشر من أفراد الشعب. يوظف ما سبق للدلالة على إحدى صور الديموقراطية وهي.........",
 options:["غير المباشرة","التمثيلية","النيابية","المباشرة"],
 correct:3,
 explain:"الديمقراطية المباشرة: الشعب يحكم نفسه بنفسه ويتخذ القرارات عبر تصويت مباشر من أفراده."},

{n:25, chapter:2, text:"٤- خضوع كل الأفراد للقانون بما في ذلك المشرع ومنفذي القانون والقضاة. نستخلص مما سبق أحد مقومات الديموقراطية وهو.........",
 options:["سيادة الشعب","العدالة الاجتماعية","التعددية السياسية","سيادة القانون"],
 correct:3,
 explain:"سيادة القانون: القانون يطبق على جميع أفراد الدولة بما فيها أجهزة الدولة، أي خضوع الجميع للقانون."},

{n:26, chapter:2, text:"٥- الجمود العقلي عائق يمنع التعددية الفكرية التي تكشف عنه السلبيات والعيوب في الآراء المعروضة. يبرر ما سبق أحد تحديات تحقيق الديموقراطية وهو........",
 options:["الأمية","ضعف المجتمع المدني","الفقر","التعصب الفكري"],
 correct:3,
 explain:"التعصب الفكري: معناه عدم قبول اختلاف الآراء بسبب الجمود العقلي الذي يمنع التعددية الفكرية."},

{n:27, chapter:2, text:"٦- يرى (ديبو): إن أهم الموارد البشرية هو الابتكار والاكتشاف وكسر القيود والأنماط المتكررة. تدافع المقولة عن أهمية الديموقراطية في............",
 options:["حماية حقوق الإنسان","إتاحة فرص الإبداع","ترسيخ قيم التعددية","تحقيق الاستقرار السياسي"],
 correct:1,
 explain:"المقولة تتحدث عن الابتكار والاكتشاف وكسر القيود، وهذا يرتبط بأهمية الديمقراطية في إتاحة فرص الإبداع."},

{n:28, chapter:2, text:"٧- دعا (بركليس) الشعب إلى: «أن يحكم نفسه ويعيش جميع المواطنين متساوين». تستخلص من الدعوة السابقة نشأة الديموقراطية في الحضارة............",
 options:["العراقية القديمة","اليونانية القديمة","العربية الإسلامية","المصرية القديمة"],
 correct:1,
 explain:"بريكليس من أعلام الحضارة اليونانية القديمة، وعلى يده ازدهرت الديمقراطية الأثينية."},

{n:29, chapter:2, text:"٨- نشأت في العصور التاريخية القديمة والوسطى وكانت تنص على مبدأ المشاركة والانتماء بين المواطنين في المجتمع الواحد. يستخلص مما سبق علاقة الديموقراطية بـ..........",
 options:["الأمن","الإبداع","الحرية","المواطنة"],
 correct:3,
 explain:"أساس الديمقراطية هي المواطنة، وهي مبدأ المشاركة والانتماء بين المواطنين في المجتمع الواحد."},

{n:30, chapter:2, text:"٩- الاعتراف بوجود تنوع في مجتمع ما يقبل وجود عدة دوائر انتمائية ضمن هويته الواحدة. يفسر ما سبق أحد مقومات الديموقراطية وهو .................",
 options:["حقوق الإنسان","سيادة القانون","العدالة الاجتماعية","التعددية السياسية"],
 correct:3,
 explain:"التعددية السياسية: وجود أكثر من اتجاه فكري في الدولة، وهذا يعني قبول وجود دوائر انتمائية متعددة."},

{n:31, chapter:2, text:"١٠- تشدد الأفراد مع وجهات النظر السياسية المختلفة يمكن أن يؤدي إلى الاستقطاب والانقسام داخل المجتمع. تكشف العبارة عن أحد تحديات الديموقراطية وهو. ............",
 options:["الأمية","ضعف المجتمع المدني","الفقر","التعصب الفكري"],
 correct:3,
 explain:"التعصب الفكري: تشدد الأفراد مع آرائهم السياسية ورفض الاختلاف يؤدي إلى استقطاب وانقسام المجتمع."},

{n:32, chapter:2, text:"١١- «الشعب هو الموكل والنواب وكلاء عنه يعبرون عن إرادته ويتصرفون باسمه». ينطبق ذلك على الديموقراطية. ............",
 options:["المباشرة","شبه المباشرة","التمثيلية / غير المباشرة","التوافقية"],
 correct:2,
 explain:"الديمقراطية غير المباشرة (النيابية/التمثيلية): الشعب يختار نوابًا يمثلونه ويتصرفون باسمه نيابة عنه."},

{n:33, chapter:2, text:"١٢- بدأ ظهور فكرة (العقد الاجتماعي) الذي ينص على أن هناك عقد ضمني بين الحاكم والمحكومين، ومن حق المحكومين أن يسحبوا الثقة من الحاكم عند الإخلال بشروط العقد: يشير ذلك إلى الديمقراطية في.........",
 options:["الحضارة اليونانية القديمة","الحضارة الأوروبية الحديثة","الحضارة المصرية القديمة","الحضارة العربية الإسلامية"],
 correct:1,
 explain:"فكرة العقد الاجتماعي ظهرت في العصر الحديث على يد جون لوك، وهي مرتبطة بالحضارة الأوروبية الحديثة."},

{n:34, chapter:2, text:"١٣- قد يمارس الناس بشكل مباشر سلطة صنع القرار دون وجود وسطاء أو نواب يقومون عنهم. يغير ما سبق عن طبيعة الديمقراطية في العصر..........",
 options:["الإسلامي","اليوناني","الحديث","المعاصر"],
 correct:1,
 explain:"الديمقراطية المباشرة كانت في العصر اليوناني، حيث يمارس الشعب الحكم مباشرة دون وسطاء أو نواب."},

{n:35, chapter:2, text:"١٤- اهتمت بلاد ما بين النهرين بإصدار قوانين تحفظ للفرد حقوقه وحريته، وهذا بعد أولى تجارب الديمقراطية. يشير ما سبق إلى الديمقراطية...........",
 options:["المباشرة","النيابية","التمثيلية","البدائية"],
 correct:3,
 explain:"الديمقراطية البدائية مثل النصوص السومرية في الحضارة العراقية القديمة (بلاد ما بين النهرين)."},

{n:36, chapter:2, text:"١٥- تعمل على تجسيد السيادة الشعبية بأرقى صورها، ولا تقبل أي وساطة؛ لأن الشعب نفسه صاحب السلطة. تناقش العبارة السابقة إحدى صور الديمقراطية...........",
 options:["النيابية","التمثيلية","غير المباشرة","المباشرة"],
 correct:3,
 explain:"الديمقراطية المباشرة: تجسد السيادة الشعبية بأرقى صورها دون أي وساطة، فالشعب صاحب السلطة مباشرة."},

{n:37, chapter:2, text:"١٦- اشتراك الشعب في الحكم وإدارة الشؤون العامة للدولة، يشير إلى أحد مقومات النظام الديمقراطي وهو........",
 options:["سيادة القانون","سيادة الشعب","التعددية السياسية","سيادة الحاكم"],
 correct:1,
 explain:"سيادة الشعب: الشعب يشارك في الحكم وإدارة الدولة."},

{n:38, chapter:2, text:"١٧- حكيم وزعيم يوناني أشرف على وضع الدستور وأتاح للمواطنين المشاركة السياسية، ووضع جميع المواطنين على قدم المساواة أمام القانون وساوى بين الجميع في الحقوق عدا العبيد والأجانب الغير يونانيين، هو...........",
 options:["بيزايتراتوس","بروتا جوراس","تراسيما خوس","بركليس"],
 correct:3,
 explain:"بركليس هو الذي أشرف على ازدهار الديمقراطية الأثينية وأتاح المشاركة السياسية والمساواة أمام القانون بين المواطنين."},

// ===== الفصل الثالث - الأحزاب السياسية - تعالى نمرن نفسنا =====
{n:39, chapter:3, text:"١- \"تتسابق الأحزاب السياسية فيما بينها إلى تقديم بدائل واقتراحات وحلول أمام الناخب للمشاكل التي يعاني منها داخليًا وخارجيًا\" يدل ما سبق على أحد مبادئ الأحزاب السياسية وهو..........",
 options:["التداول","الصراع","التسامح","التنافس"],
 correct:3,
 explain:"التنافس: تنافس شريف بحيث تقدم حلول أمام الناخب لحل المشاكل الداخلية والخارجية."},

{n:40, chapter:3, text:"٢- تنظيم اجتماعي قائم على مستويين (وطني، محلي) يسعى للحصول على دعم شعبي بهدف الوصول للسلطة لتطبيق سياسات محددة. يصف ما سبق مفهوم.........",
 options:["المحكمة الدستورية","المشاركة السياسية","التعددية السياسية","الحزب السياسي"],
 correct:3,

// ===================== بناء الصفحة =====================
const container = document.getElementById("examArea");
let lastChapter = -1;

data.forEach((q) => {
  if (q.chapter !== lastChapter) {
    const chap = chapters[q.chapter];
    const h2 = document.createElement("h2");
    h2.className = "chapter";
    h2.textContent = chap.title;
    container.appendChild(h2);

    chap.sections.forEach(sec => {
      const h3 = document.createElement("h3");
      h3.className = "section";
      h3.textContent = sec.h;
      container.appendChild(h3);
      const div = document.createElement("div");
      div.className = "summary";
      div.textContent = sec.content;
      container.appendChild(div);
    });

    const qHeader = document.createElement("h3");
    qHeader.className = "section";
    qHeader.textContent = "أسئلة الفصل";
    container.appendChild(qHeader);

    lastChapter = q.chapter;
  }

  const qdiv = document.createElement("div");
  qdiv.className = "question";
  qdiv.id = "q" + q.n;

  const qt = document.createElement("div");
  qt.className = "qtext";
  qt.textContent = q.text;
  qdiv.appendChild(qt);

  const ul = document.createElement("ul");
  ul.className = "options";
  const letters = ["أ","ب","ج","د"];
  q.options.forEach((opt, i) => {
    if (!opt) return;
    const li = document.createElement("li");
    li.textContent = letters[i] + ") " + opt;
    li.dataset.index = i;
    li.onclick = () => {
      if (qdiv.classList.contains("checked")) return;
      ul.querySelectorAll("li").forEach(l => l.classList.remove("selected"));
      li.classList.add("selected");
      saveAnswer(q.n, i);
    };
    ul.appendChild(li);
  });
  qdiv.appendChild(ul);

  const exp = document.createElement("div");
  exp.className = "explain";
  exp.textContent = "التوضيح: " + q.explain;
  qdiv.appendChild(exp);

  container.appendChild(qdiv);
});

function checkAnswers() {
  let correctCount = 0;
  let total = 0;
  data.forEach(q => {
    total++;
    const qdiv = document.getElementById("q" + q.n);
    qdiv.classList.add("checked");
    const lis = qdiv.querySelectorAll(".options li");
    let selectedIndex = -1;
    lis.forEach((li, i) => {
      if (li.classList.contains("selected")) selectedIndex = i;
    });
    lis.forEach((li, i) => {
      if (i === q.correct) li.classList.add("correct");
      if (selectedIndex === i && i !== q.correct) li.classList.add("wrong");
    });
    if (selectedIndex === q.correct) correctCount++;
    qdiv.querySelector(".explain").style.display = "block";
  });

  const box = document.getElementById("scoreBox");
  box.style.display = "block";
  const percent = Math.round((correctCount / total) * 100);
  box.textContent = "النتيجة: " + correctCount + " من " + total + " (" + percent + "%)";
  box.scrollIntoView({behavior:"smooth"});
}

function showAllAnswers() {
  data.forEach(q => {
    const qdiv = document.getElementById("q" + q.n);
    qdiv.classList.add("checked");
    const lis = qdiv.querySelectorAll(".options li");
    lis.forEach((li, i) => {
      if (i === q.correct) li.classList.add("correct");
    });
    qdiv.querySelector(".explain").style.display = "block";
  });
}

restoreProgress();
</script>
