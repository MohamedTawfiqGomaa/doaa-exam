p1:`اقرأ ثم أجب: (أعمالنا بين التخطيط والارتجال)

هل من المعقول أن يسارع المهندس المعماري بتحويل صورة المنزل الذي تخيّله صاحبه فكلّفه بتنفيذه إلى واقع ملموس عن طريق بنائه على الفور؟ أم لا بد قبل الشروع في البناء من المرور بسلسلة من الإجراءات وكل إجراء يكون بمثابة فصل في رواية قصة من قصص النجاح؟ والإجابة عن هذا السؤال واضحة لا لَبس فيها ولا مِراء؛ فقبل أن يشرع المهندس في أعمال البناء يدرك أن ثمة مراحل ضروريةً من التخطيط والتجهيز ذات أبعاد متباينة.

ربما يأتي في مقدمة هذه التجهيزات البُعد التنظيمي والبُعد الطبيعي، والأول يتعلق بصاحب المشروع والثاني يقع على كاهل منفّذ المشروع؛ إذ يجب أن يحصل المالك على موافقة الجهات المختصة؛ فلديها رُؤى مسبقة لكل منطقة وقد يتعارض المبنى المُزمَع إقامته - وهو تابع للملك الخاص - مع تلك الرؤى التي ستخدم الصالح العام، وقد يكون خاضعًا لمنطقة تتماس مع الأمن القومي أو هيئة الآثار. ومن البَدَهيّ أن يجري مهندس المشروع قياسًا لمساحة الأرض المخصصة، ويلي ذلك إجراء مسوح جيولوجية على باطن الأرض؛ لتحديد عدد الطوابق التي سيكون في مقدور تلك البقعة تحمّلها، وأخيرًا وليس آخرًا إعداد تصميم يحاكي المشروع وكل خطوة من الخطوات السابقة هي أكبر من أختها.

بعد ذلك يلتفت المهندس المعماري إلى تفاصيل تخضع للبُعد الاقتصادي، فيبدأ بتحديد التكلفة المتوقعة ودراسة جدوى المشروع أو المبنى وفق ميزانية تفصيلية تضع ضمن حساباتها ما قد يستجد من أمور كصعوبة الطبقات الخفية من الأرض وارتفاع أسعار الخامات خلال فترة البناء التي قد تمتد ربما إلى سنوات حسب ضخامة المشروع وحدود تصميمه.

يأتي بعد ذلك دور البُعد الفكري؛ فمن البَدَهيّ عند أي مهندس يبغي التفوق في تصميماته أن يخرج عن القوالب التقليدية إلى قوالب أكثر عصرية لن تبلغ بالطبع حد الكمال لكنها تحاول أن تقترب منه، والبحث عن أفكار جديدة تحاول الانعتاق من الأُطر العتيقة التي لا يزال بعضها يحتفظ برونقه وبالطبع أصالته - أمر في غاية الصعوبة وربما راق هذا التحدي الفكري أصعب من التحدي المادي؛ إذ لا يُقدم أيُّ مستثمر على البدء في مشروعه المرجو دون الاستعداد المادي أما التحدي الفكري فهو محكُّ العبقرية أو الإلهام.

على أن التخطيط ودراسة الجدوى والعبقرية أو الإلهام في التصميم ليس ذلك كله بأهم من البُعد التنفيذي والعمل الجاد؛ فكم من أعمال خُطّط لها وأُعدّت لها الموازنات المالية وحصلت على موافقات الجهات المختصة لكنها لم تر النور؛ لأنها لم تحظَ بالجدية، ولم تدخل تحت مظلة التنفيذ فظلت أوراقها حبيسة الأدراج وأفكارها حبيسة العقول وأرصدتها رهينة الخزائن تتخطفها يد الحاجة وتنتقص من أصولها أفراح الدهر وأتراحه.

لقد كثُر الحديث خلال الأعوام الماضية عن الابتكار وإدارة الابتكار وأظهرت شركات عديدة اهتمامها بالابتكار، وجدّت في تطوير الابتكارات ورفع كفاءة المبتكرين لكن وبكل أسف معظم هذا الاهتمام يأتي بعد فوات الأوان لظنّهم أن الأفكار مطروحة في الطريق طالما وُجد المهندس المرموق، وأن الإنشاء ميسور طالما أن المال في المقدور، لكن تبدّى للجميع أن الأمر ليس بهذه السهولة إنما هو سلسلة من دراسة المكان وتخيّر الزمان وتحديد الجدوى أو المنفعة والتنسيق بين المنفعة الشخصية وبين الصالح العام والانعتاق من أسر الأنماط التقليدية إلى آفاق التجديد والعصرية المتزنة لا العبثية المبتذَلة.

وفي الحق أن كل ما سبق في المقال من الحديث عن دور المهندس الناجح والأطوار التي يمر بها لينجز عملًا ناجحًا بديعًا - يُقال في دور المعلم والطبيب والباحث والقائد؛ فوراء كل منتَج ناجح إنسان مارس عمله بتنظيم وفاعلية ونأى له عن الارتجال والعشوائية.`,

p7_q:`"وكان في الكُتّاب نحوَ عشرين صبيًّا مختلفي الأعمار من التاسعة إلى نحو الخامسة عشرة وكلهم يُحاول استظهار القرآن وكلهم يخافون من \"سيدنا\" خوفًا شديدًا إذ كانت بيده دائمًا مقرعة وكانت عادته أن يدعو أحد الناشئة لتسميع \"اللوح\" (الواجب اليومي) وأحيانًا يدعوه لتسميع \"الماضي\" وهو ما حفظه قبل ذلك وكان الصبي مثل أقرانه كلما حفظ واجبه تلاه عليه وقد يتلو قسمًا من \"الماضي\" وكان يجلس في التسميع - مثلهم - أمام \"سيدنا\" وقد وضع ساقه اليُمنى فوق ساقه اليسرى وباطن القدم اليمنى مكشوف فإذا أخطأ أو تعثّر لم يقل له سيدنا تعثرتَ أو أخطأتَ وإنما تنزل المقرعة توًّا على باطن قدمه، فينتبه إلى أنه أخطأ.

وكان يلفت الصبيَّ رفيقٌ له تعوّد إذا قرأ واجبه أو \"ماضيه\" ألا يُتبيّن أحدٌ ما يقرأه فهو يكرّر كرًّا سريعًا بحيث لا يستطيع أحد أن يعرف بوضوح ما يقرأ فضلًا عن أن يتتبعه في آية من الآيات، ومع ذلك كان إذا قرأ على \"سيدنا\" بهذا الكرّ السريع يهوي بالمقرعة على باطن قدمه من حين لآخر وكأنه عرف خطأً سقط على لسانه، وفي واقع الأمر كان يريد أن يخيف رفاقه وأنهم إذا قرءوا كرًّا على غراره فلن يفلتوا منه ومن مقرعته فأولى لهم أن يقرءوا قراءة متأنية حتى يأخذوا الفرصة الكافية لتذكّر الكلمات والآيات.

وكان الصبيُّ يَرهب \"سيدنا\" ومقرعته رهبةً شديدة، وكان يتلو يوميًّا الربع الذي استظهره تسميعًا وقلما يُخطئ فيه، وكيف يُخطئ وقدمه اليُمنى مُلقاةٌ على ساقه اليسرى مكشوفةٌ للمقرعة؟! وقد تَهوي فجأةً دون أي تنبيه أو تحذير؟! وبالمثل يتلو \"ماضيَه\" على سيدنا فقلما يزلّ لسانه أو يلحن أي لحن وكانت العادة في هذا الكُتّاب أن يتناول كل صبيٍّ غداءه في داره ولكن بعد أن يحفظ واجبه اليومي ويسمّعه على سيدنا فإذا لم يحفظه ولم يسمّعه حتى نهاية اليوم ظل في الكُتّاب لا يبرحه، وظلّ دون غداء وأمعاؤه جوعًا ومَسغَبةً."`,

p12_compare:`قال الدكتور (طه حسين) في كتاب الأيام:

"ومضى على هذا شهر وشهر وشهر يذهب صاحبنا إلى الكُتّاب ويعود منه في غير عمل وهو واثق بأنه قد حفظ القرآن وسيدنا مطمئن إلى أنه حفظ القرآن إلى أن كان اليوم المشؤوم.. دعاه أبوه بلقب الشيخ.. ثم طلب إليه أن يقرأ »سورة الشعراء« وما هي إلا أن وقع عليه هذا السؤال وقع الصاعقة ولكنه مضى لا يدري أيلوم نفسه لأنه نسي القرآن أم يلوم سيدنا لأنه أهمله أم يلوم أباه لأنه امتحنه!."

وقال الدكتور (شوقي ضيف):
"وقدمه اليُمنى مُلقاةٌ على ساقه اليسرى مكشوفةٌ للمقرعة؟! وقد تَهوي فجأةً دون أي تنبيه وكانت العادة في هذا الكُتّاب أن يتناول كل صبيٍّ غداءه في داره ولكن بعد أن يحفظ واجبه اليومي ويسمّعه على سيدنا فإذا لم يحفظه ولم يسمّعه حتى نهاية اليوم ظل في الكُتّاب لا يبرحه".`,

p13_20:`قال إبراهيم ناجي:

١ - وطنٌ دعا وفتًى أجابَ بوركتَ يا عزمَ الشبابْ!
٢ - يا فتيةَ النيلِ المسالمَ والكريمَ بلا حسابْ
٣ - جناتُه مرآتُكم ولكم خلائقُها العِذابْ
٤ - حتى إذا نادتكم الأوطانُ والوادي أهابْ!
٥ - اليومَ يبدو حبُّ مصرَ فلا خفاءَ ولا حجابْ!
٦ - اللهُ ينظرُ والليالي عندها لكم الحسابْ
٧ - هاتوا الفداءَ الغاليَ لمصرَ وأَرخِصوه كالترابْ
٨ - المالُ والأرواحُ كلٌّ ضحيةٌ ولها ثوابْ`,

p21:`قال حافظ إبراهيم في الخديوي (عباس حلمي):

مشيئةُ اللهِ في العباسِ قد سبقَت     إلى الجدودِ ومَن يأتي على العَقِبِ
فهوَ ابنُ أكرمَ مَن سادوا ومَن مَلَكوا    وهوَ الأبُ المُفتدى للسادةِ النُّجُبِ`,

p22:`قال العقاد:

الطيشُ أن تعملَ ما تشتهي    وقد يُساوي النفعُ فيهِ الضَّرَرْ
والحزمُ أن تحـذرَ ما تتَّقي   وقلَّمـا يُغنيـكَ فيهِ الحَـذَرْ`,

p23:`يقول فاروق جويدة:

لقد كنتَ تأتي
وتحملُ شيئًا حبيبًا علينا
يُغيِّرُ طعمَ الزمانِ الرديءِ..
فينسابُ في الأفقِ فجرٌ مضيءُ..
وتبدو السماءُ بثوبٍ جديدٍ`,

p24:`قال نسيب عريضة:

يا رفيقي على طريقِ الحَزاني      سِر فإنَّ القضاءَ أقصى مَدانا
سِر بنا نقطعُ شوطًا قبلَ أن تفنى الليالي
كم حظينا فوجدنا أَلَمًا ما كان حَظَّوا
كم شرِبنا كم أكلنا خُبزَنا مُرًّا وحُلوًا`,

p25_35:`مما كتبه الأستاذ المنفلوطي في كتابه (النظرات):

"عرفتُ أنِّي فكرتُ ليلةَ أمس فيما أكتب اليوم، وعرفت أني آخذُ الساعةَ بقلمي بين أناملي، وأنَّ بين يديَّ صحيفةً بيضاء تَسوَدُّ قليلًا قليلًا كلما أجريتُ القلم فيها، ولكني لا أعلم هل يبلغ القلم مداه؟ وهل كُلَّما كَبا دون غايته؟ وهل أستطيع أن أُتمّ رسالتي هذه؟ أم سيعترضني عارض من عوارض الدهر في سبيلها؟ لأنني لا أعرف من شؤون الغد شيئًا؛ ولأن المستقبل بيد الله؟

الغد شبحٌ مبهمٌ يتراءى للناظر من مكانٍ بعيد، فربما كان مَلَكًا رحيمًا وربما كان شيطانًا رجيمًا، بل ربما كان سحابةً سوداء إذا هبّت عليها ريحٌ باردة حلّلت أجزاءها وفرّقت ذرّاتها فأصبحت كأنما هي عَدَم. الغد بحرٌ خضمٌ زاخر يعبُّ عُبابَه وتصطخب أمواجه فما يدريك إن كان يحمل في جوفه الدرَّ والجوهر أو الموت الأحمر؟ لقد غمَض الغد عن العقول ودقَّ شخصه عن الأنظار حتى لو أنَّ إنسانًا رفع قدمَه ليضعها في خروجه من باب قصره لا يدري أيضعها على عتبة القصر أم على حافة القبر؟ الغد صدرٌ مملوء بالأسرار الغزار تحوم حوله البصائر وتتسقّطه العقول وتستدرجه الأنظار فلا يبوح بسرٍّ من أسراره إلا إذا جادل الصخرةَ بالماء الزلال!

كأني بالغد وهو كامنٌ في مكمنه ينظر إلى آمالنا وأمانينا نظراتِ الاستهزاء ويبتسم ابتساماتِ الازدراء. لقد ذلّل الإنسان كلَّ عقبةٍ في هذا العالم فاتخذ نفقًا في الأرض وصعد بسلّم إلى السماء وعقد ما بين المشرق والمغرب بأسباب من حديد وخيوط من نحاس، ووضع المقاييس لمعرفة أبعاد النجوم ومسافات الأشعة والموازين لوزن كرة الأرض إجمالًا وتفصيلًا، وغاص في البحار فعرف أعماقها وفحص تربتها وأزعج سكانها وغلبها على آلاتها وجواهرها، ونفذ من بين الأحجار والآكام إلى القرون الخالية فعرف أصحابها كيف يعيشون وأين يسكنون وماذا يأكلون ويشربون وتسرّب من منافذ الحواس الظاهرة إلى الحواس الباطنة فعرف النفوس وطبائعها والعقول ومذاهبها حتى كاد يسمع حديث النفس ودبيب المنى، واخترق بذكائه كل حجاب وفتح كل باب، ولكنه سقط أمام باب الغد عاجزًا مقهورًا لا يجرؤ على فتحه بل لا يجسر على قرعه؛ لأنه باب الله والله لا يُطلع على غيبه أحدًا.

أيها الشبحُ الملثَّمُ بلثام الغيب هل لك أن ترفع عن وجهك هذا اللثامَ قليلًا لنرى صفحةً واحدةً من صفحات وجهك المقنّع. اقترب منا قليلًا لعلّنا نستطيع أن نستشفّ صورتك من وراء هذا اللثام المُسدَل دوننا فقد طارت قلوبنا شوقًا إليك وذابت أكبادنا وجدًا عليك؟ أيها الغد! إن لنا آمالًا كبارًا وصغارًا وأمانيَّ حسانًا وغير حسان، فحدّثنا عن آمالنا أين مكانها منك؟ وخبّرنا عن أمانينا ماذا صنعتَ بها؟ أأذللتها واحتقرتها أم كنت لها من المكرمين؟

لا، لا! صُنْ سرَّك في صدرك، وأبقِ لثامك على وجهك ولا تحدّثنا حديثًا واحدًا عن آمالنا وأمانينا حتى لا تُفجعنا فيها فتُفجعنا في أرواحنا ونفوسنا فإنما نحن أحياء بالآمال وإن كانت باطلة، وسعداء بالأماني وإن كانت كاذبة:

وليست حياة المرء إلا أمانيًا     إذا هي ضاعت فالحياة على الأثر"`,

p32_compare:`قال المنفلوطي السابق: "وتسرَّب من منافذ الحواس الظاهرة إلى الحواس الباطنة فعرف النفوس وطبائعها والعقول ومذاهبها حتى كاد يسمع حديث النفس ودبيب المنى، واخترق بذكائه كل حجاب وفتح كل باب، ولكنه سقط أمام باب الغد عاجزًا مقهورًا لا يجرؤ على فتحه بل لا يجسر على قرعه؛ لأنه باب الله والله لا يُطلع على غيبه أحدًا."

وقال الزيات في مقال "التكافل الاجتماعي في الإسلام":
"كانت جزيرة العرب إبّان الدعوة العظمى مثلًا تمحَّضنا لما يجنيه الفقر على بني الإنسان من تَضرية الغرائز وتمزيق العلائق ومعاناة الغزو ومكابدة الحرمان وقتل الأولاد وفحش الربا وأكل السحت وتطفيف الكيل وعنت الكبراء وأثرة الأغنياء وفقد الأمن وانحطاط المرء إلى الدرك الأسفل من حياة البهيم."`,

p51_q:`- يتعرض بعض الناس للدوّار عند ركوب البحر، وربما صاحب ذلك قيء أو إغماء وربما يُفيق بعد ذلك بقليل دون مساعدة طبية وفي بعض الأحيان يحتاج إلى مساعدة طبية.

- يحدث دوار البحر بسبب تعارض الإشارات بين الأذن الداخلية والعينين والدماغ حيث يستشعر الجسم الحركةَ بينما ترى العينان شيئًا ثابتًا أو العكس مما يربك الدماغ ويؤدي إلى الغثيان والدوخة والتعرق والقيء، وخاصة في المياه المضطربة أو عند التركيز على شيء ثابت داخل المركب.`,

p53_q:`قال طه حسين في كتابه الأيام:

"ولم يكدْ يدخل الدارَ حتى دعاه أبوه بلقب الشيخ، فأقبل عليه ومعه صديقان له فتلقّاه أبوه مبتهجًا وأجلسه في رِفق.. ثم طلب إليه أن يقرأ »سورة الشعراء« وما هي إلا أن وقع عليه هذا السؤال وقع الصاعقة ففكّر وقدّر.. ولكنه لم يذكر من سورة الشعراء إلا أنها إحدى سوَر ثلاث أولها »طسم« فأخذ يردّد: طسم مرةً ومرةً ومرةً دون أن يستطيع الانتقال إلى ما بعدها وفتَح عليه أبوه.. فلم يستطع أن يتقدّم خطوة. قال أبوه: فاقرأ سورة النمل فذكر أن أول سورة النمل كأول سورة الشعراء »طس« وأخذ يردّد هذا اللفظ وفتح عليه أبوه فلم يستطع أن يتقدّم خطوةً أخرى. قال أبوه: فاقرأ سورة القصص فذكر أنها الثالثة وأخذ يردّد: طسم ولم يفتح عليه أبوه هذه المرة ولكنه قال له في هدوء: قُمْ؛ فقد كنت أحسب أنك حفظت القرآن فقام خجلًا يتصبّب عَرَقًا.."`
};

explain:"فالبيت يعني أن الجزاء يكون على قدر التضحية والبذل فمن يقدم الروح ينال جزاء يساويها ومن يقدم المال ينال جزاء يساويه - أما بقية الإجابات فلا تصلح للأسباب التالية:\nب- تعني أن الجزاء = العمل - بينما معنى البيت أن الجزاء قد يختلف باختلاف التضحية والعمل.\nج- لم يتحدث الشاعر عن سوء عاقبة الشر بل هو يتحدث عن البذل من أجل الوطن وأن الثواب يكون مساويًا لنوع البذل.\nد- يُفسّر معناه أن أرواح الموتى وأرواح أحبائهم الأحياء مترابطة (الأرواح جنود مجنّدة) جزء من حديث ارتباط الأرواح وأن المال نعمة دنيوية زائلة وأن الميت لا يحمل ثروته معه (الأموال وديعة مستردّة) حكمة تعني أن المال نعمة دنيوية زائلة."},

{n:17,type:"mcq",passage:null,
text:"١٧- هات من الأبيات ما يدل على أن البذل والعمل من أجل الأوطان يعود على أهلها بالخير والرفاهية.",
options:["\"جناتُه مرآتُكم ولكم خلائقُها العِذابْ\"","\"اليومَ يبدو حبُّ مصرَ فلا خفاءَ ولا حجابْ\"","\"اللهُ ينظرُ والليالي عندها لكم الحسابْ\"","\"المالُ والأرواحُ كلٌّ ضحيةٌ ولها ثوابْ\""],
correct:0,
explain:"فمعنى الجملة = جنات الوطن مرآة لأعمالكم في سبيله وهذه الجنات من أشياء عذبة ولكم ما فيها - أما بقية الإجابات فلا تصلح للأسباب التالية:\nب- اليوم (وقت الشدة) يظهر حب مصر بلا أي غموض أو خفاء.\nج- الجملة تعني: راقبوا الله ولو بعد حين أعمالكم وجزاؤكم سيأتي في الليالي.\nد- يختلف الجزاء باختلاف التضحية ونوعية العمل."},

{n:18,type:"mcq",passage:null,
text:"١٨- استنتج العاطفة المسيطرة على الشاعر في الأبيات السابقة.",
options:["الإعجاب بطبيعة الوطن الخلّابة والفخر بما يمتلكه من مقدرات وثروات.","الفخر والإشادة بما أحرزه الشباب من تقدّم في مجال العمل وبناء الوطن.","الاعتزاز بماضي الوطن والدعوة إلى العمل في الحاضر لبناء المستقبل.","الحماس والإعجاب بشباب الوطن المسارعين لتلبية ندائه وقت المحن."],
correct:3,
explain:"تظهر تلك العاطفة من خلال تعبيرات الشاعر مثل: (البيت الأول - نادتكم الأوطان - اليوم يبدو حب مصر - لمصر هاتوا الفداء الغالي)."},

{n:19,type:"mcq",passage:null,
text:"١٩- دلّل على استخدام الشاعر للصورة المركّبة.",
options:["\"بوركتَ يا عزمَ الشبابْ\".","\"وطنٌ دعا وفتًى أجابْ\".","\"جناتُه مرآتُكم ولكم خلائقُها العِذابْ\".","\"يبدو حبُّ مصرَ فلا خفاءَ ولا حجابْ\"."],
correct:2,
explain:"شبه الجنات بالمرآة + شبه خلائق الجنات بالثمار العِذاب (الحلوة أو اللذيذة) - أما بقية الإجابات فخطأ للأسباب التالية:\nأ- صورة ممتدة حيث شبه عزم الشباب بإنسان يُدعى له بالبركة + شبه عزم الشباب بإنسان يناديه.\nب- صورة ممتدة حيث شبه الوطن بإنسان يُنادى + شبه الوطن بإنسان يُجاب نداؤه.\nد- صورة ممتدة حيث شبه حب مصر بشيء مادي يبدو + شبه حب مصر بشيء مادي لا يخفى (لا يحتجب)."},

{n:20,type:"mcq",passage:null,
text:"٢٠- بيّن - من خلال النص - كيف طبّق الشاعر سمات مدرسة أبولو.",
options:["أظهر عاطفة حادّة تجاه قضايا الوطن.","أكثر من استعمال الكلمات الرمزية.","استعمل ما توحي به دلالات الألفاظ والمجازات والصور.","امتزج بالطبيعة وشكا لها وأظهر حبّه وتعلّقه بها."],
correct:0,
explain:"فقد عبّر الشاعر عن عاطفة حادّة تجاه الوطن - بينما بقية الإجابات خطأ للأسباب التالية:\nب- لم يستخدم الشاعر رموزًا.\nج- لم يستخدم ألفاظًا لها مجازات مبتكرة.\nد- لم يشكُ للطبيعة ولا يصفها."},

{n:21,type:"mcq",passage:"p21",section:"القسم الرابع: المدارس الأدبية",
text:"٢١- استنتج المأخذ الذي يعيب هذا البيت من وجهة نظر شعراء الديوان.",
options:["استعمال الألفاظ التراثية.","عدم تحقّق الوحدة الفنية.","طغيان شعر المناسبات.","الاهتمام بالنواحي البيانية."],
correct:2,
explain:"يمدح الشاعر الخديوي عباس حلمي - ومدح الشخصيات من أشعار المناسبات وقد عابه شعراء الديوان على شعراء الإحياء والبعث."},

{n:22,type:"mcq",passage:"p22",
text:"٢٢- استنتج – مما يلي – السمة التي اتضحت في هذين البيتين من سمات مدرسة الديوان.",
options:["التأمّل واستبطان النفس.","الذهنية وطغيان الجانب الفكري.","استخدام اللغة الحية.","ظهور مسحة الحزن والتشاؤم."],
correct:1,
explain:"فالبيتان يعبّران عن حكمتين: الأولى تعريف الطيش وبيان سوء عاقبته + الثانية تعريف الحزم وبيان حسن عاقبته وعلاقته بالحذر."},

{n:23,type:"mcq",passage:"p23",
text:"٢٣- استنتج من الأسطر الشعرية السابقة سمةً من سمات المدرسة الواقعية.",
options:["حدة العاطفة والحنين إلى مواطن الذكريات.","استخدام القصة واعتماد طريقة الحكاية في التعبير.","استخدام اللغة الحية والتخفف من جماليات الشكل.","المغالاة في التجديد والتساهل في اللغة."],
correct:2,
explain:"فقد استخدم اللغة الحية في بعض كلماته مثل: \"حبيبًا علينا - طعم الزمان - ثوب جديد\" ولم يهتم بجماليات الشكل حيث كتب الفقرة بطريقة الشعر المرسل (أسطر وليس أبيات - تنويع القافية)."},

{n:24,type:"mcq",passage:"p24",
text:"٢٤- استنتج من الأسطر السابقة إحدى سمات مدرسة المهاجر.",
options:["ظهور مسحة الحزن والتشاؤم والاستسلام للأحزان.","استبطان النفس الإنسانية والتأمّل في الكون وأسرار الوجود.","الامتزاج بالطبيعة ومناجاتها والشكوى إليها.","النزعة الإنسانية والمشاركة الوجدانية والدعوة إلى التساند."],
correct:3,
explain:"فالشاعر يناشد رفيقه ويطلب منه أن يشاركه حياته وأن يقطعا معًا فيها شوطًا."},

{n:25,type:"mcq",passage:"p25_35",section:"القسم الخامس: نص المنفلوطي",
text:"٢٥- ما التركيب الذي يحلّ محلَّ كلمة \"الازدراء\" الواردة في سياق الفقرة الثالثة؟",
options:["البُعد والنفور.","الزهو والانتصار.","الأمل والاستبشار.","الاستهانة والاحتقار."],
correct:3,
explain:"فالمقصود بابتسامات الازدراء = ابتسامات الاستهانة والاحتقار والاستهزاء - فهذا هو معناها في المعجم وفي الفقرة."},

{n:26,type:"mcq",passage:null,
text:"٢٦- استنتج علاقة الفقرة الأخيرة بالفقرة التي قبلها.",
options:["نتيجة.","تفصيل.","استدراك.","تعليل."],
correct:2,
explain:"(لا لا) لينفي السابق وإثبات اللاحقة - الفقرة السابقة ثم يُثبت معنى الاستدراك = نفي السابق والإثبات اللاحق - وهذا ما فعله الكاتب فقد كرّر النفي (لا لا) لينفي الفقرة السابقة ثم يُثبت معنى اللاحقة."},

{n:27,type:"mcq",passage:null,
text:"٢٧- استنتج دلالة عبارة: \"إلا إذا جادل الصخرةَ بالماء الزلال\" في سياق الفقرة الثانية.",
options:["تشجيع الإنسان على تحمّل المشاق للوصول إلى ما يرتجيه.","تأكيد أثر الإصرار على الأمل في انفراج الأزمات بعد اشتدادها.","بيان الأثر الطيب للصبر في بلوغ الأمل وتحقيق الطموح.","تيئيس الإنسان من معرفة المستقبل مهما بلغ علمه أو نفوذه."],
correct:3,
explain:"لأن معنى الجملة = شيء مستحيل.. فمستحيل أن يخرج الماء الزلال (العذب) من صخرة وكذلك مستحيل أن يكشف المرء أسرار الغد."},

{n:28,type:"mcq",passage:null,
text:"قال زهير بن أبي سلمى: \"وأعلمُ علمَ اليومِ والأمسِ قبلَه    ولكنَّني عن علمِ ما في غدٍ عَمِ\"\n\n٢٨- وازن بين قول زهير وما ورد في الفقرة الأولى عند المنفلوطي من حيث طريقة إيصال فكرة الجهل بالمستقبل.",
options:["آثر زهير تقديم الدليل الواقعي على فكرته بينما اكتفى المنفلوطي بالعرض المباشر؛ لأنها فكرة بديهية.","هيّأ المنفلوطي لفكرته بمثال من التجارب الواقعية المقنعة بينما اكتفى زهير بالأسلوب الخطابي المباشر.","اعتمد المنفلوطي على أسلوب الحوار الداخلي بينما اعتمد زهير على التصوير الذي لا غنى للشعر عنه.","قدّم زهير فكرته في قالب ذو طابع قصصي بينما طرح المنفلوطي فكرته في قالب من الحكمة مباشرة."],
correct:1,
explain:"فقد هيّأ المنفلوطي لفكرته بمثال من التجارب الواقعية وهو أنه عندما يمسك بقلمه ليكتب فلا يدري هل سيستطيع تكملة ما بدأ كتابته أم سيعوقه عن ذلك عائق من عوائق الزمن فهو لا يستطيع التنبؤ بالغيب - أما زهير فقد عبّر بطريقة مباشرة وصريحة عن أنه يستطيع معرفة الماضي والحاضر لكنه أعمى عن التنبؤ بالغد."},

{n:29,type:"mcq",passage:null,
text:"٢٩- استنتج نوع الصورة البيانية في قوله: \"الشبحُ الملثَّمُ بلثام الغيب\" في الفقرة الرابعة وبيّن قيمتها الفنية.",
options:["استعارة مكنية - تجسيم وتوحي بالخوف من المجهول.","استعارة تصريحية - تشخيص وتوحي بشدة التخفّي.","تشبيه بليغ - تشخيص ويوحي بالتزيّن والجمال.","مجاز مرسل - الإيجاز ويوحي بالشجاعة والإقدام."],
correct:1,
explain:"فقد شبه الغد بإنسان ملثَّم (وجهه يُغطَّى) بغطاء الغيب فأصبح كالشبح - ثم حذف المشبه وصرّح بالمشبه به والصورة توحي بالتخفّي."},

{n:30,type:"mcq",passage:null,
text:"٣٠- ميّز – مما يلي – التركيب الذي يُمثّل تشبيهًا.",
options:["\"ربما كان مَلَكًا رحيمًا وربما كان شيطانًا رجيمًا\"","\"كأني بالغد وهو كامنٌ\"","\"يسمع حديث النفس ودبيب المنى\"","\"طارت قلوبنا شوقًا إليك\""],
correct:0,
explain:"المشبه (الغد) والمشبه به (المَلَك الرحيم أو الشيطان الرجيم) ولا يوجد أداة أو وجه شبه."},

{n:31,type:"mcq",passage:null,
text:"٣١- دلّل على أن المقال كُتب بأسلوب أدبي.",
options:["أظهر رأيه في خفاء المستقبل بأسلوب قصصي.","قدّم أدلة وساق استشهادات وأمثلة واقعية.","اعتمد على الإحصاء والأدلة العقلية التي تقنع القارئ بفكرته.","وظّف الكاتب الصور البيانية والتضاد ومزج بين الخبر والإنشاء."],
correct:3,
explain:"فقد تضمّن النص من عناصر الأسلوب الأدبي:\n* الصور مثل: (الغد شبح - كان مَلَكًا أو كان شيطانًا...).\n* والتضاد مثل: (ملك × شيطان - رحيم × رجيم - ذلّل × عقبة).\n* تنوع الأساليب بين الخبر مثل: (الغد شبح مبهم - كأن بالغد.. ينظر) والإنشاء مثل: (أيها الشبح - هل لك أن ترفع..؟ - صُن - لا تحدثنا).\n- أما بقية الإجابات فلا تصلح للأسباب التالية:\nأ- أسلوب النص ليس قصصيًّا كما أنه لم يذكر استشهادات.\nب- تقديم الأدلة والاستشهادات ليس من ضروريات المقال الأدبي.\nج- هذه السمات تخص المقال العلمي."},

{n:32,type:"mcq",passage:"p32_compare",
text:"٣٢- وازن بين العبارتين من حيث الاعتماد على الإطناب.",
options:["كلا الكاتبَين لم يوظّف الإطناب في إيصال فكرته.","أكثر المنفلوطي من توظيف وسائل الإطناب بينما لم يوظّفه الزيات.","وظّف الزيات الإطناب بينما اعتمد المنفلوطي على الإيجاز.","كلا الكاتبَين وظّف الإطناب في إيصال فكرته."],
correct:3,
explain:"* فمن دلائل الإطناب عند المنفلوطي: * التفصيل في: \"فعرف النفوس وطبائعها والعقول ومذاهبها...\" والترادف في \"حديث النفس ودبيب المنى - اخترق بذكائه كل حجاب وفتح كل باب\".\n* ومن دلائل الإطناب عند الزيات: * التفصيل في: \"تضريه الغرائز وتمزيق العلائق ومعاناة الغزو ومكابدة الحرمان وقتل الأولاد.....\""},

{n:33,type:"mcq",passage:null,
text:"قال النقاد: \"اللغة هي التي تُمكّن الروائي من محاكاة الواقع فتُقدّم للقارئ الأحداث في صورة محسوسة من خلال الحوار بين الشخصيات وبها تنكشف الأحداث وتُرسم خلفية الزمان والمكان.\"\n\n٣٣- توقّع – من خلال المقولة السابقة - سمة اللغة التي يستخدمها الروائي.",
options:["تفيض بالصور البلاغية الموحية والمحسّنات البديعية.","تتسم بروعة الأسلوب وجلال الصياغة ورصانة الفواصل.","تُناسب المستوى الفكري والطبقي للقارئ.","تعبّر بواقعية عن طبيعة الشخصيات والأحداث."],
correct:3,
explain:"فهذا هو مضمون العبارة + أن محاكاة الواقع أهم سمات الرواية."},

{n:34,type:"mcq",passage:null,section:"القسم السادس: النحو والصرف",
text:"قال الشاعر: إذا ما سفيهٌ نالَني منه قادحٌ    من الذمّ لم يَحرُجَ لموقفه صدري  (*يَحرُجَ: يضيق)\n\n٣٤- ميّز الموقع الإعرابي لجملة (لم يَحرُج) الواردة في الشطر الثاني.",
options:["جزم جواب الشرط.","لا محل لها.","جر مضاف إليه.","رفع خبر."],
correct:1,
explain:"لأنها جواب شرط أداته (إذا) غير جازمة."},

{n:35,type:"mcq",passage:null,
text:"\"الحقود يتألّم كلما نظر إلى نعمة أسبغها الله على أحد عباده والطامع لا يكتفي من جمع المال أو يُواريه التراب\"\n\n٣٥- ميّز الفعل المتعدي الوارد في المقولة السابقة.",
options:["يتألّم.","نظر.","يكتفي.","أسبغ."],
correct:3,
explain:"مفعوله الهاء - أما بقية الأفعال فهي لازمة لأنها لا تقبل الاتصال بضمائر النصب."},

{n:36,type:"mcq",passage:null,
text:"يقول الشاعر: ومَن يغترَّ بالدنيا فإنِّي    لبستُ بها فأَبليتُ الثيابَا\n\n٣٦- ميّز – مما يلي – نوع الفاء في كلمة (فأبليتُ) الواردة في الشطر الثاني.",
options:["الجزاء.","العطف.","السببية.","الاستئناف."],
correct:1,
explain:"الفاء عطفت جملة (أبليتُ الثيابا) على (لبستُ بها) أما جواب الشرط فهو جملة (فإنّي لبستُ بها)."},

{n:37,type:"mcq",passage:null,
text:"قال الشاعر: إنَّ خيرَ الودِّ ودٌّ تطوَّعَت    بهِ النفسُ، لا ودٌّ أتى وهو مُتعَبُ\n\n٣٧- ميّز إعراب كلمة \"ودٌّ\" الواردة في الشطر الأول.",
options:["توكيد لفظي.","خبر إنّ.","مضاف إليه.","اسم إنّ مؤخّر."],
correct:1,
explain:"لأنها أكملت معنى جملة (إنّ) ولا تصلح توكيدًا لفظيًّا لأنها لا يمكن حذفها كما أنها منفيّة والأولى مُثبَتة."},

{n:38,type:"mcq",passage:null,
text:"(إنَّ خيرَ الرجالِ مَن كان بطيءَ الغضبِ سريعَ الرِّضا)\n\n٣٨- بيّن خبر الناسخ ونوعه في العبارة السابقة.",
options:["سريعَ الرِّضا - مفرد.","من كان - شبه جملة.","خيرَ الرجال - جملة اسمية.","كان بطيءَ - جملة فعلية."],
correct:0,
explain:"خير ثان لـ(إنّ) - والخبر الأول (من) لكنها خبر مفرد وليست شبه جملة - و(خير الرجال) اسم إنّ - و(ءَ) جملة الصلة لا محل لها."},

{n:39,type:"mcq",passage:null,
text:"قال الشاعر: غفرتُ ذنوبَهُ وصفحتُ عنهُ    مخافةَ أن أكونَ بلا صديقٍ\n\n٣٩- ميّز سبب نصب كلمة \"مخافة\" الواردة في البيت السابق.",
options:["مفعول به.","حال.","مفعول لأجله.","تمييز."],
correct:2,
explain:"مصدر يُبيّن سبب حدوث الفعل (غفرتُ)."},

{n:40,type:"mcq",passage:null,

{n:52,type:"essay",passage:null,section:"أسئلة مقالية",
text:"٥٢- هات من الفقرة أربعة أدلة تؤكد أن التخطيط المتقَن والميزانيات الضخمة لا تكفي وحدها لإخراج المشروعات إلى حيّز الوجود.\n\n(الفقرة المقصودة: \"على أن التخطيط ودراسة الجدوى...وأتراحه\")",

{n:55,type:"essay",passage:null,
text:"٥٥- اكتب كلمة افتتاحية لندوة تهدف إلى نشر الوعي بضرورة السياحة وأهميتها في إنعاش الاقتصاد القومي بعنوان: \"السياحة مؤشرات وتنمية\".\n\nالكلمة من ٦-٨ أسطر تتضمن:\n- التعريف بغرض الندوة وأهميتها والجمهور المستهدف.\n- التعريف بالمتحدثين الرئيسيين في الندوة.\n- عبارات ترحيبية تستثير الجمهور لمتابعة الندوة - استشهادات أو أقوال مأثورة.",
model:`الحضور الكرام ... يسرنا في مستهل ندوتنا هذه أن نرحب بحضراتكم وأن نؤكد تقديرنا لحضوركم الكريم وتلبيتكم دعوتنا من أجل النقاش حول موضوع السياحة وأهميتها في إنعاش الاقتصاد القومي وكيفية نشر الوعي السياحي بين جموع الشعب المصري ودورها في تنمية الوطن.

ويسعدنا أن نستضيف في لقائنا هذا لفيفًا من أعلام الاقتصاد المصري ورجال الأعمال والمستثمرين في مجال السياحة في مصر، يتقدمهم الأستاذ الدكتور (محمود هارون) نائب وزير الاقتصاد والتخطيط والأستاذة الدكتورة (أحمد تهاني) نائب وزير السياحة والسيد الأستاذ (محمود عبد السلام) المستثمر في مجال السياحة وصاحب العديد من المشروعات السياحية في عدد من المناطق السياحية في مصر.

نرجو أن تحقق ندوتنا أهدافها المرجوة بالخروج بتوصيات مهمة قابلة للتنفيذ ويكون من شأنها خدمة وطننا مصر والنهوض باقتصاده والرقي بشعبه وموارده.. ونحن على قناعة بأن تلك الأهداف لن تتحقق إلا بسواعد وعقول شبابنا الواعد إن شاء الله.

ونُذكّر دائمًا بقول علماء الاقتصاد والمختصين في مجال السياحة: (السياحة عصب الاقتصاد، وأحد أعمدة التنمية المستدامة).`}
];

const container=document.getElementById("examArea");
let lastPassage=null,lastSection=null;
data.forEach(q=>{
  if(q.section&&q.section!==lastSection){const s=document.createElement("h2");s.textContent=q.section;container.appendChild(s);lastSection=q.section;lastPassage=null;}
  if(q.passage&&q.passage!==lastPassage){const p=document.createElement("div");p.className="passage";p.textContent=passages[q.passage];container.appendChild(p);lastPassage=q.passage;}
  if(!q.passage)lastPassage=null;
  const qdiv=document.createElement("div");qdiv.className="question";qdiv.id="q"+q.n;
  const qt=document.createElement("div");qt.className="qtext";qt.textContent=q.text;qdiv.appendChild(qt);
  if(q.type==="mcq"){
    const ul=document.createElement("ul");ul.className="options";
    const L=["أ","ب","ج","د"];
    q.options.forEach((opt,i)=>{const li=document.createElement("li");li.textContent=L[i]+") "+opt;li.dataset.index=i;li.onclick=()=>{if(qdiv.classList.contains("checked"))return;ul.querySelectorAll("li").forEach(l=>l.classList.remove("selected"));li.classList.add("selected");};ul.appendChild(li);});
    qdiv.appendChild(ul);
    const exp=document.createElement("div");exp.className="explain";exp.textContent="التوضيح: "+q.explain;qdiv.appendChild(exp);
  }else{
    const ta=document.createElement("textarea");ta.className="essay-box";ta.placeholder="اكتب إجابتك هنا...";qdiv.appendChild(ta);
    const ans=document.createElement("div");ans.className="model-answer";ans.textContent="الإجابة النموذجية:\n"+q.model;qdiv.appendChild(ans);
  }
  container.appendChild(qdiv);
});

function checkAnswers(){
  let correct=0,total=0,wrong=[];
  data.forEach(q=>{if(q.type!=="mcq")return;total++;const qdiv=document.getElementById("q"+q.n);qdiv.classList.add("checked");const lis=qdiv.querySelectorAll(".options li");let sel=-1;lis.forEach((li,i)=>{if(li.classList.contains("selected"))sel=i;});lis.forEach((li,i)=>{if(i===q.correct)li.classList.add("correct");if(sel===i&&i!==q.correct)li.classList.add("wrong");});if(sel===q.correct)correct++;else wrong.push(q.n);qdiv.querySelector(".explain").style.display="block";});
  data.forEach(q=>{if(q.type==="essay")document.getElementById("q"+q.n).querySelector(".model-answer").style.display="block";});
  const box=document.getElementById("scoreBox");box.style.display="block";const pct=Math.round(correct/total*100);box.style.color=pct>=80?"#2e7d32":pct>=60?"#e65100":"#c62828";box.style.borderColor=box.style.color;box.textContent="النتيجة: "+correct+" من "+total+" ("+pct+"%)";
  const wl=document.getElementById("wrongList");
  if(wrong.length>0){const L=["أ","ب","ج","د"];wl.style.display="block";wl.innerHTML="<h3>الأسئلة التي أخطأت فيها:</h3><ul>"+wrong.map(n=>{const q=data.find(x=>x.n===n);return`<li>سؤال ${n}: الإجابة الصحيحة هي (${L[q.correct]}) ${q.options[q.correct]}</li>`;}).join("")+"</ul>";}else wl.style.display="none";
  box.scrollIntoView({behavior:"smooth"});
}
function showAllAnswers(){data.forEach(q=>{const d=document.getElementById("q"+q.n);if(q.type==="mcq"){d.classList.add("checked");d.querySelectorAll(".options li").forEach((li,i)=>{if(i===q.correct)li.classList.add("correct");});d.querySelector(".explain").style.display="block";}else d.querySelector(".model-answer").style.display="block";});}
</script>
