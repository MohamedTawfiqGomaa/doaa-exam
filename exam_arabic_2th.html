<script>
// Progress saving & loading utility
const pageName = window.location.pathname.split("/").pop() || "index.html";
const examKey = "exam_progress_" + pageName;

function getSavedAnswers() {
  try {
    return JSON.parse(localStorage.getItem(examKey)) || {};
  } catch (e) {
    return {};
  }
}

function saveAnswer(qNum, value) {
  const answers = getSavedAnswers();
  answers[qNum] = value;
  localStorage.setItem(examKey, JSON.stringify(answers));
}

function clearProgress() {
  if (confirm("هل أنت متأكد من رغبتك في مسح جميع إجاباتك والبدء من جديد؟")) {
    localStorage.removeItem(examKey);
    window.location.reload();
  }
}

function restoreProgress() {
  const answers = getSavedAnswers();
  for (const qNum in answers) {
    const qdiv = document.getElementById("q" + qNum);
    if (!qdiv) continue;
    const ul = qdiv.querySelector(".options");
    if (ul) {
      const selectedIndex = answers[qNum];
      const lis = ul.querySelectorAll("li");
      if (lis[selectedIndex]) {
        lis[selectedIndex].classList.add("selected");
      }
    }
    const ta = qdiv.querySelector(".essay-box");
    if (ta) {
      ta.value = answers[qNum];
    }
  }
}

const passages = {
p1: `المدن الذكية

يقول (كالوس شواب) مؤسس المنتدى الاقتصادي العالمي: "ثمة عناصر ذكية تأخذ طريقها تلقائيًا دون إذن من أحد، وإننا لنقف على شفا ثورة تكنولوجية من شأنها أن تغير طريقة عيشنا وعملنا تغييرًا جوهريًا"، ويُعد من أبرز تلك العناصر المدن الذكية التي لم تعد تنتمي إلى عالم الخيال العلمي، بل أصبحت واقعًا تعيشه كثير من مدن العالم، فهناك نحو (3000) إلى (5000) مدينة على هذه الطريقة حاليًا، وفي مصر تأسست (العاصمة الإدارية الجديدة) وأُدخل إليها كثير من أنظمة التكنولوجيا الذكية، وبخاصة في مجال الطاقة النظيفة.

المدن الذكية هي مبادرة تقنية طويلة الأمد، تعتمد على بنية تحتية متطورة تشمل تقنيات المعلومات والاتصالات الحديثة، هذه البنية تمكن من إدارة المدن بكفاءة عالية، بحيث تصبح مكونات المدينة مرتبطة بالشبكة العالمية عبر أجهزة الاستشعار؛ حيث تُحوّل الأشياء وأنشطة الأفراد إلى مكون رقمي تقوم أنظمة المدينة بحوسبته وتحليله وتحويله إلى معلومات مفيدة.

وتعتبر الهجرة المتزايدة من الريف إلى المدن من أهم الدوافع لإنشاء المدن الذكية، حيث يشكل هذا التوسع تحديًا كبيرًا للبنية التحتية التقليدية، والحل الوحيد لمواجهة هذا التحدي هو جعل هذه المدن أكثر فعالية وكفاءة عبر الأنظمة الذكية متعددة الاستخدامات، ووفقًا للخبراء فإن المدن المستقبلية إذا لم تتحول إلى مدن ذكية فإنها ستواجه مصيرًا محتومًا من الانهيار؛ فالتطوير التكنولوجي يستدعي وجود بنية تحتية ذكية، فعلى سبيل المثال: معظم الشركات الكبرى في صناعة السيارات تخطط لتصنيع سيارات ذاتية القيادة، ما يعزز الحاجة إلى هذه البنية.

ومن أبرز الإيجابيات المهمة التي تقدمها المدن الذكية في المجال الصحي - على سبيل المثال - هي الانتقال من التركيز على العلاج إلى التركيز على الوقاية بتوفير المعلومات المتعلقة بالصحة العامة، فهناك كثير من أجهزة الاستشعار تراقب أجساد البشر، وترسل المعلومات إلى متخصصين في مراكز صحية قادرين على استخدام البيانات لتحليلها وإرسالها إلى الأشخاص مباشرة عبر طابعة في المنازل، وعلى مستوى جمع النفايات فإن المدن الذكية تمكنت من ابتكار حاويات ذكية تعمل بالطاقة الشمسية تراقب مستويات القمامة في كل حاوية، فترسل إشارات إلى شاحنات القمامة للتوجه إليها مباشرة بدلًا من أن تجوب المدينة بأكملها؛ مما يقلل من الازدحام، والتلوث.

باتت المدن الذكية المستدامة نقطة رئيسة في السياسة العامة للدول في مختلف أنحاء العالم، السيما أن تكنولوجيا المعلومات والاتصالات أضحت تؤدي دورًا حاسمًا في تعزيز الكفاءة البيئية، والحفاظ على الموارد، وتخفيض الانبعاثات الكربونية، وذلك عبر إتاحة الكثير من الابتكارات في مجالات عديدة، من قبيل أنظمة النقل الذكية، والإدارة الذكية للمياه والطاقة والمخلفات.`,

p7: `باتت المدن الذكية المستدامة نقطة رئيسة في السياسة العامة للدول في مختلف أنحاء العالم، السيما أن تكنولوجيا المعلومات والاتصالات أضحت تؤدي دورًا حاسمًا في تعزيز الكفاءة البيئية، والحفاظ على الموارد، وتخفيض الانبعاثات الكربونية، وذلك عبر إتاحة الكثير من الابتكارات في مجالات عديدة، من قبيل: أنظمة النقل الذكية، والإدارة "الذكية" للمياه والطاقة والمخلفات.`,

p8_12: `اقرأ ثم أجب:

"أُصِبْتُ في السنة الثالثة من مدرسة الحقوق بالتهاب قرنية العينين، وكانت الإصابة شديدة بحيث اقتضت علاجي ثلاثة شهور كاملة، كانت آلام المرض مبرحة، ولكن كانت إلى جانب هذه الآلام آلام أخرى نفسية كانت تزيد من بلوتي، فقد كنت مهددًا بفقد البصر، وقد أدركت ذلك رغم إخفائه عني من حالة اليأس التي بدت على والدي.

وقد قاسى والدي من جراء مرضي هذا أمَرّ الآلام: ألم النفس من إشفاقه عليّ من شدة ألم المرض ومن نتيجته المحتملة، وألم الجسم من إصابته نفسه بمرض كان يقتضيه ملازمة الفراش، ولكن الله سبحانه وتعالى أشفق على والدي وعليّ؛ إذ منّ عليّ بالشفاء بعد ثلاثة شهور من مرضي، وبذلك طابت نفسانا بهذا الشفاء.

ظللت ثلاثة شهور تحت العلاج، وأوصاني الدكتور بألا أرهق ناظريّ بالقراءة أو بالتحديق في أي شيء آخر أربعة أشهر. وقد لاحظت حين شرعت في عصيانه أن أثر المرض والعلاج يعوقني عن القراءة.

وسمع أساتذتي بعزمي على التقدم للامتحان، فزاروني مشكورين محاولين تثبيطي عن عزمي، وحذا حذوهم كثيرون من رفاقي، ولكنني أصررت في النهاية على تجربة حظي، بالاستعداد للامتحان في الحدود التي تسمح بها حالتي، وعاونني صديق على متابعة الدراسة بتلاوة مذكراته عليّ، ثم زودني بعد ذلك بعض الزملاء بمذكراتهم في الدروس التي أُلقيت عليهم أثناء مرضي، فكنت أقرؤها ثم ألخصها للرجوع إليها عند الاقتضاء.

وأخيرًا نجحت في الامتحان بفضل هؤلاء الزملاء الأوفياء، وأستطيع أن أقول إن نجاحي كان ببعض التفوق؛ لأني كنت في ترتيبي ضمن الثلاثة الأُول من الناجحين."`,

p13: `يقول طه حسين في "الأيام":

"على أن الصبي لم يلبث أن تبيّن سبب هذا كله، فقد أحسّ أن لغيره من الناس عليه فضلًا، وأن إخوته وأخواته يستطيعون ما لا يستطيع، وينهضون من الأمر بما لا ينهض به، وأحس أن أمه تأذن لإخوته وأخواته في أشياء تحظرها عليه، وكان ذلك يحفِّظه، ولكن لم تلبث هذه الحفيظة أن استحالت إلى حزن صامت عميق؛ ذلك أنه سمع إخوته يصفون ما لا علم له به، فعلم أنهم يرون ما لا يرى".`,

p14: `قال طه حسين في كتاب "الأيام":

"وكانت هذه الأسماء تقع من نفس الصبي مواقع تيهٍ وإعجاب؛ لأنه لا يفهم لها معنًى، ولأنه يقدّر أنها تدل على العلم، ولأنه يعلم أن أخاه الأزهري قد حفظها وفهمها فأصبح عالمًا وظفر بهذه المكانة الممتازة في نفس أبويه وإخوته وأهل القرية جميعًا، ألم يكونوا جميعًا يتحدثون بعودته قبل أن يعود بشهر، حتى إذا جاء أقبلوا إليه فرحين مبتهجين متلطفين! ألم يكن الشيخ يشرب كلامه شُربًا، ويعيده على الناس في إعجاب وفخار! ألم يكن أهل القرية يتوسّلون إليه أن يقرأ لهم درسًا في التوحيد أو الفقه! وماذا عسى أن يكون التوحيد؟ وماذا عسى أن يكون الفقه؟"`,

p15_22: `قال محمود حسن إسماعيل عن "راية العرب":

1- في طريق الشمس عودي، وأعيدي عزة الشرق على وجه الوجود
2- وازحفي بالنور والنار على صرخة للثأر في باقي القيود
3- من قديم الدهر حياك الإله وبصوت الوحي نادت سماه
4- واصطفى أرضك من بين الثرى فحباها بالرسالات يداه
5- بسناها شعّت الدنيا هدى وبها ثارت على الذل الجباه
6- ومضت تسقي الليالي من ضحاها وتذيب الرق من وجه العبيد`,

p23: `قال حافظ إبراهيم:

النأي يبعد ما بيننا الحبَّ امتزج بالحشا إن في الحياة لأنفُسٍ
موسى الردى من يدِّعوها ظلاما الرسل سلَّ حياة أو شك يجعل`,

p24: `قال عبد الرحمن شكري:

على باب الحياة أرى زحامًا من الأشباح عجَّ بهم وسالا
من العهد القديم إلى زمانٍ حديثٍ قد مضوا زمرًا توالى`,

p25: `قال خليل مطران عن فتاة:

سمت بهذه الزهرة من جنة يا خليل بالقدر
وما هواه قد أحرز الباري خيرًا بها`,

p26: `قال إيليا أبو ماضي:

إذا أنا لم أجد حقلًا أنيقًا خلقتُ الحقل في روحي وذهني`,

p27_32: `يقول أحمد أمين (بتصرف):

هل العلماء في جملتهم أشقى من الجهلاء؟ وهل العلم يسبب الشقاء، والجهل يسبب السعادة؟ إن صح هذا فالمنطق يقضي بمحاربة العلم ونشر الجهل، وإغلاق المدارس والجامعات، لكن الناس يجمعون على فضل العلم وكونه طريقًا للسعادة، مما يعني بطلان هذا الرأي.

إن تصور السعادة لدى كثيرين يقوم على أنها حياة كسل لا يكدرها عمل، وحياة حقوق لا واجب فيها، وحياة لذة مشتعلة لا خمود لها، وبعد عن الآلام من غير التعب في إبعادها، وحضور لكل ما يخطر بالبال من مسرة من غير نصب في جلبها، ولكن السعادة الحقيقية ليست في الغاية نفسها، بل في الطريق إليها؛ فالإنسان يسعد باستخدام قواه وملكاته لبلوغ غايته، فإذا بلغها تفتحت له غايات جديدة، وبذل فيها جهودًا جديدة، وظهر في أثناء الطريق صعوبات استخرجت أقصى الجهد في التغلب عليها، فشعر بلذة الجهد ولذة الغلبة ولذة اعتداده بشخصيته واستخدامه ملكاته واستكماله نفسه أكثر من لذته بالغاية نفسها.

وقد يرى بعض الناس أن العلم يرهف إحساس العالم، ويوسّع نظره، فيجعله أشد ألمًا وأكثر وعيًا بمسئولياته، في حين لا يرضى الجاهل إلا بالقليل، ومع ذلك، فإن ما يحرزه العلماء من فهم للكون ومواجهة للصعاب يمنحهم لذة خاصة لا يدركها الجاهل، وهَب أن العلماء شقوا أكثر من الجهلاء، أليس في تضحياتهم ما يجعل العالم أصلح وأرقى؟ إن الحضارات قامت بفضل جهود العلماء الذين قدموا للبشرية أعظم سبل الاختراعات متجاوزين الصعوبات والتضحيات لا لمصلحتهم الفردية بل لخدمة الجماعة الإنسانية، فلا يصح للعلماء أن يندبوا حظهم أفرادًا، ما دامت الجمعية الإنسانية تستفيد من شقائهم وجهدهم.

العلم والثقافة بطبيعتهما يرفعان العقل والمشاعر، مما يجعل المثقف أكثر إدراكًا للذة، وأكثر تأثرًا بالألم، ومتى وجدت الظروف المناسبة كان المثقف أسعد من الجاهل، وإلى أن يتم هذا لا بد أن ننظر لصالح المجتمع أكثر من صالح الأفراد، وأن ندعو إلى انتشار الثقافة لا انكماشها، وكثرة العلماء لا قلتهم، وألا نعبأ بمن يشقى من العلماء إذا كان في شقائهم سعادة المجموع، وأن نطالبهم بأن يصوغوا أنفسهم حتى يجدوا سعادتهم في علمهم وشعورهم برقي مجتمعهم، وكما قالوا: "لأن تكون سقراط ساخطًا خير من أن تكون أبله راضيًا".`,

p33: `▪ قال الكاتب: "وقد يرى بعض الناس أن العلم يرهف إحساس العالم، ويوسّع نظره، فيجعله أشد ألمًا وأكثر وعيًا بمسئولياته، في حين لا يرضى الجاهل إلا بالقليل".

▪ قال الزيات في نص "التكافل الاجتماعي في الإسلام": "إنما جعل للفقير في مال الغني حقًا معلومًا لا يكمل دينه إلا بأدائه، ذلك الحق هو الركن الثالث من الأركان الخمسة التي بُني عليها الإسلام".`,

p35: `قال أحد النقاد: "إن الممثل لا يستطيع النهوض بدوره على خشبة المسرح ما لم يقدم له المؤلف شخصية حية، ليستطيع أن يتقمصها فيحرك الجماهير، ولا يكون بوقًا للمؤلف".`,

p53: `إن الحد من ظاهرة الاحتباس الحراري يتطلب تضافر الجهود العالمية من الحكومات والأفراد لتحقيق بيئة مستدامة.`,

p54: `وسائل التواصل الاجتماعي - رغم أهميتها - أدت إلى ظهور "الإدمان الرقمي"، حيث يقضي الأفراد ساعات طويلة يوميًا على المنصات، مما يضعف العلاقات الاجتماعية الواقعية ويقلل الإنتاجية، ويسبب أمراضًا نفسية كالقلق والاكتئاب نتيجة المقارنة المستمرة بالآخرين، كما يزيد التوتر وانعدام الثقة بالنفس بسبب المحتوى السلبي.

وللحد من الإدمان الرقمي، يجب اتخاذ خطوات عملية، وتشمل: تحديد أوقات استخدام للمنصات، وتفعيل خاصية تذكير الوقت، واستبدال أنشطة مفيدة بالوقت الضائع كالمطالعة أو الرياضة أو قضاء الوقت مع العائلة، وتوعية الأفراد بمخاطر الإدمان الرقمي من خلال ورش العمل والندوات.`

 explain:"فالشاعر يقصد بالحقل الأمل والطموح، ويقول إنه إذا لم يجد هذا الأمل في الواقع من حوله خلقه داخل نفسه وعاشه في روحه وذهنه."},

{n:27, type:"mcq", passage:"p27_32", text:"27- ما سبب شعور الإنسان بلذة الجهد في ضوء فهمك للفقرة الثانية؟",
 options:["تجنب التحديات.","الوصول إلى غايته.","الراحة بعد العمل.","تحقيق الثراء."],
 correct:1,
 explain:"لقوله: \"ولكن السعادة الحقيقية ليست في الغاية نفسها، بل في الطريق إليها؛ فالإنسان يسعد باستخدام قواه وملكاته لبلوغ غايته\"."},

{n:28, type:"mcq", passage:"p27_32", text:"28- استنتج المغزى من قول الكاتب: \"لأن تكون سقراط ساخطًا خير من أن تكون أبله راضيًا\" في ضوء سياق الفقرة الأخيرة.",
 options:["إظهار أن الوعي والمعرفة هما القيمة الحقيقية للمرء وإن صاحبه ما ألم.","بيان سبب رضا سقراط بحياته رغم معاناته.","إظهار أن الابتعاد عن الغضب يضمن للمرء الأمن والسعادة والراحة.","بيان قناعة الجاهل ورضاه أمام تحديات الحياة."],
 correct:0,
 explain:"فهو يفضّل أن يكون الإنسان مثل سقراط في ثقافته ووعيه، حتى إذا كان ساخطًا أو متألمًا، على أن يكون أبله أو أحمق يشعر بالرضا."},

{n:29, type:"mcq", passage:"p27_32", text:"29- استنتج علاقة قوله: \"لكن الناس يجمعون على فضل العلم وكونه وسيلة للسعادة\" بما قبله في الفقرة الأولى.",
 options:["استدراك.","تعليل.","نتيجة.","توضيح."],
 correct:0,
 explain:"لأن (لكن) حرف استدراك - والاستدراك هو نقض السابق وإثبات اللاحق."},

{n:30, type:"mcq", passage:"p27_32", text:"30- بيّن نوع الصورة البيانية، وقيمتها الفنية في عبارة: \"وحياة لذة مشتعلة لا خمود فيها\" في الفقرة الثانية.",
 options:["تشبيه بليغ، يوحي باستمرار السعادة بلا انقطاع.","استعارة تصريحية، أكدت متعة السعادة دون تعب.","استعارة مكنية، تعكس الرغبة في دوام المتع.","تشبيه بليغ، يوضح نظرة الكسالى للسعادة الحقيقية."],
 correct:2,
 explain:"فقد صوّر اللذة بشيء مادي مشتعل لا يخمد (لا ينطفئ) أبدًا، وهذا يدل على شدة اللذة والرغبة في استمرارها."},

{n:31, type:"mcq", passage:"p27_32", text:"31- هات من النص ما يتوافق مع معنى البيت السابق: \"ذو العقل يشقى في النعيم بعقله وأخو الجهالة في الشقاوة ينعم\".",
 options:["الناس يجمعون على فضل العلم.","يجعله أشد ألمًا وأكثر وعيًا بمسئولياته.","إن الحضارات قامت بفضل جهود العلماء.","فالإنسان يسعد باستخدام قواه وملكاته."],
 correct:1,
 explain:"معناه: إن صاحب العقل والحكمة يشقى ويتعب في الدنيا لأنه يواجه جهل الناس ويقيس كل شيء حوله بمقياس العقل، فهو يقول إن من يتحمل المسئولية قد يعاني بعض الألم لأنه يتحمل أمانة القيام بها - والاختيار (ب) يعطي نفس المعنى."},

{n:32, type:"mcq", passage:"p27_32", text:"32- استخرج من النص تشبيهًا، وبيّن سر جماله.",
 options:["\"الجهل يسبب السعادة\"، التشخيص.","\"فضل العلم وكونه طريقًا للسعادة\"، التجسيد.","\"انتشار الثقافة لا انكماشها\"، التجسيد.","\"الجمعية الإنسانية تستفيد\"، التوضيح."],
 correct:1,
 explain:"فقد صوّر المعنوي (العلم) بشيء مادي (طريق) للسعادة."},

{n:33, type:"mcq", passage:"p33", text:"33- وازن بين العبارتين من حيث استخدام وسائل التوكيد.",
 options:["استخدم الكاتب توكيدًا واحدًا بالحرف، في حين اقتصر الزيات على القصر بالنفي والاستثناء.","اقتصر الكاتبان على استخدام أسلوب القصر.","اكتفى الكاتب والزيات باستخدام حروف التوكيد.","أكد الكاتب كلامه بحروف التوكيد وأسلوب القصر، واقتصر الزيات على أسلوب القصر."],
 correct:3,
 explain:"فقد استخدم الكاتب حروف التوكيد مثل: (قد) - والاستثناء (إلا) + القصر مثل: (لا يرضى الجاهل إلا بالقليل) + (لا يكمل إلا بأدائه) + (إنما) - بينما اكتفى الزيات بالقصر فقط مثل: (إنما جعل للفقير في مال الغني حقًا معلومًا)."},

{n:34, type:"mcq", passage:"p27_32", text:"34- بيّن من خلال فهمك الفقرة الأخيرة من المقال تحقق سمة القناع عند الكاتب.",
 options:["أكد تضحيات العلماء في نشر العلم والثقافة من أجل ارتقاء المجتمع مستشهدًا بسقراط كعالم.","أظهر ضرورة تحقيق التوازن بين العلم والجهل في وصول العلماء إلى السعادة الحقة.","أظهر أهمية التركيز على المصلحة العامة للمجتمع وإن كان فيه شقاء العلماء والجهلاء.","أكد الدعوة إلى الثقافة والتركيز على العواطف وأثرهما في التخفيف من جفاف الفكر."],
 correct:2,
 explain:"يتضح ذلك من قوله في الفقرة الأخيرة: \"وإلى أن يتم هذا لا بد أن ننظر لصالح المجتمع أكثر من صالح الأفراد، وألا نعبأ بمن يشقى من العلماء إذا كان في شقائهم سعادة المجموع\"."},

{n:35, type:"mcq", passage:"p35", text:"35- توقع أحد أسس بناء المسرحية الذي يحقق مدلول العبارة السابقة.",
 options:["كُتبت لتؤدى أمام جمهور.","مشحونة بالعاطفة.","أحداثها واقعية.","تتفاوت فيها لغة الحوار."],
 correct:0,
 explain:"لأن السمة الأبرز في النص المسرحي هو أنه كُتب لكي يؤدى أمام الجمهور على المسرح، ولأن تقديم شخصية حية يقوم الممثل بدورها يعني أن يتحول النص المسرحي إلى حركات وأحداث ومشاهد تُمثَّل على المسرح."},

{n:36, type:"mcq", passage:null, text:"قال: (ليس الشجاع بمسارعٍ إلى فعلٍ قبل التعقل، إنما الشجاع من يتأنى)\n\n36- حدد خبر (ليس)، ونوعه في المقولة السابقة.",
 options:["الشجاع - مفرد.","قبل التعقل - شبه جملة.","بمسارعٍ - مفرد.","يتأنى - جملة فعلية."],
 correct:2,
 explain:"لأن حرف الجر زائد، وحرف الجر الزائد لا يمثل مع المجرور شبه جملة، ويُعرب خبر (ليس) مجرورًا لفظًا منصوبًا محلًا."},

{n:37, type:"mcq", passage:null, text:"37- بيّن الجملة التي تحتوي على أسلوب تحذير.",
 options:["مضيعة الوقت جريمة في حق نفسك.","التستر بالكذب؛ فما تستر به إنسان إلا انكشف أمره.","إياك أعني، فألزم نفسك بما سمعته.","لا حذر لا حذر مما يعتذر منه يا بني."],
 correct:1,
 explain:"لأن (التستر) مفعول به لفعل محذوف تقديره (احذر).\n* أما (أ) فهي جملة اسمية عادية: (مضيعة) مبتدأ + (جريمة) خبر.\n* وفي (ج) كلمة (إياك) ضمير مبني في محل مفعول به للفعل (أعني) ولكنه تقدم على الفعل، وأصله: (أعني إياك...)."},

{n:38, type:"mcq", passage:null, text:"قال: (إذا بدأت الامتحان فثق بربك وسمِّ الله، تنل بركة تتعجب لها)\n\n38- حدد نوع الفعلين (سمِّ - تنل) من حيث الإعراب والبناء على الترتيب في المقولة السابقة.",
 options:["معربان.","مبنيان.","معرب - مبني.","مبني - معرب."],
 correct:3,
 explain:"(سمِّ) فعل أمر مبني على حذف حرف العلة - (تنل) مضارع مجزوم في جواب الطلب."},

{n:39, type:"mcq", passage:null, text:"قال الشاعر: (وإذا ما خلا الجبان والنزال طلب الطعن وحده)\n\n39- ميّز المحل الإعرابي لجملة (طلب الطعن) الواردة في الشطر الثاني.",
 options:["جر نعت.","نصب حال.","لا محل لها.","جزم جواب الشرط."],
 correct:2,
 explain:"لأن أداة الشرط (إذا) غير جازمة، وبالتالي جواب الشرط لا محل له من الإعراب."},

{n:40, type:"mcq", passage:null, text:"قال الشاعر: (قد يزعم الناس أن البخل مقطعة فما لقلبي يهواها وما سمحت)\n\n40- ميّز الحال، ونوعها في البيت السابق.",
 options:["مقطعة - مفرد.","يهواها - جملة فعلية.","أن البخل مقطعة - جملة اسمية.","لقلبي - شبه جملة."],
 correct:1,
 explain:"كما قلنا في شرح درس الحال: فإنك إن وجدت (ما الاستفهامية + الفاء + مجرور باللام) فما بعدها حال."},

{n:41, type:"mcq", passage:null, text:"(الحب هو الطريقة المثلى لأن يتأسى بك أبناؤك دون إجبارهم على ذلك)\n\n41- صغ المصدر الصريح من المصدر المؤول الوارد في المقولة السابقة.",
 options:["أسى أبنائك.","أسوة أبناءك.","تأسي أبنائك.","مواساة أبناؤك."],
 correct:2,
 explain:"لأن (تأسي) مصدر بكسر ما قبل الآخر فيصبح (تأسّي)، وكلمة (أبنائك) مضاف إليه مجرور."},

{n:42, type:"mcq", passage:null, text:"قال الشاعر: (إني لأحمل في هواك صبابة يا مصر إني قد خرجت عن الأطواق)\n\n42- ميّز إعراب الفعل المضارع في البيت السابق.",
 options:["منصوب بالفتحة الظاهرة.","مبني على الفتح.","مجزوم بالسكون.","مرفوع بالضمة الظاهرة."],
 correct:3,
 explain:"لأن اللام هنا هي لام التوكيد المفتوحة المزحلقة، ولا تأثير لها في إعراب ما بعدها."},

{n:43, type:"mcq", passage:null, text:"قال الشاعر: (تأوّهي فتلفت الخلي سمع وأصابه عجب فقال: من الفتى؟)\n\n43- حدد الفعل اللازم في البيت السابق.",
 options:["سمع.","تلفت.","أصاب.","قال."],
 correct:1,
 explain:"لأنه لا ينصب مفعولًا به ولا يقبل الاتصال بأي ضمير نصب، بينما بقية الإجابات لا تصلح لما يلي:\n* سمع: لأن مفعولها (تأوه) في محل نصب مفعول به.\n* أصاب: لأن مفعولها (الهاء).\n* قال: لأن مفعولها مقول القول، فجملة (من الفتى) في محل نصب مفعول به."},

{n:44, type:"mcq", passage:null, text:"قال الشاعر: (لا تكن غرًّا مسرفًا بالخلة السرافِ والبخل، فبئست الخلة السراف)\n\n44- حدد الإعراب الصحيح لكلمة (السراف) الواردة في الشطر الثاني.",
 options:["بدل.","فاعل.","مبتدأ مؤخر.","اسم تكن مؤخر."],
 correct:2,
 explain:"(السراف) مخصوص بالذم بعد (بئس) فعل الذم الجامد، وفاعله (الخلة)، والمخصوص بالذم يُعرب مبتدأ مؤخرًا والجملة قبله خبر مقدم."},

{n:45, type:"mcq", passage:null, text:"قال الشاعر: (سبحانه جلّ عن وصفٍ يحيط به وكيف يُدرك وصف الدائم الفاني؟)\n\n45- حدد الإعراب الصحيح لكلمة (الفاني) في الشطر الثاني.",
 options:["فاعل.","مفعول به.","نعت.","مضاف إليه."],
 correct:0,
 explain:"(الفاني) فاعل للفعل (يدرك)، فقد تقدم المفعول (وصف الدائم) على الفاعل، وأصلها: (فكيف يُدرك وصفَ الدائمِ الفانيُ؟)."},

{n:46, type:"mcq", passage:null, text:"(أعطى الله الدنيا كلها لسليمان -عليه السلام- والنمرود، ولو كانت معيارًا للتمايز لما ساوى فيها بين نبي وطاغية)\n\n46- حدد الكلمة المعربة بعلامة فرعية في المقولة السابقة.",
 options:["الدنيا.","سليمان.","التمايز.","نبي."],
 correct:1,
 explain:"(سليمان) ممنوع من الصرف (علم مزيد بألف ونون) مجرور بالفتحة، والجر بالفتحة علامة فرعية لأن الوظيفة الأصلية للفتحة هي النصب."},

{n:47, type:"mcq", passage:null, text:"(هيهات أن يُرَدَّ قضاء الله إنسانٌ ولا جانٌّ)\n\n47- حدد نوع اسم الفعل المذكور وزمنه.",
 options:["أمر - قياسي.","مضارع - سماعي.","ماضٍ - سماعي.","مضارع - قياسي."],
 correct:2,
 explain:"لأن (هيهات) بمعنى (بَعُدَ) وهو اسم فعل ماضٍ سماعي، ألنه ليس مشتقًا من فعل وإنما هو كلمة جامدة."},

{n:48, type:"mcq", passage:null, text:"قال الشاعر: (عهد الشباب لسالف الأزمان ناعيًا لك المشيب مبلغًا)\n\n48- ميّز الإعراب الصحيح لكلمة (عهد) في الشطر الثاني.",
 options:["مفعول به.","فاعل.","مضاف إليه.","مبتدأ مؤخر."],
 correct:0,
 explain:"لأن (ناعيًا) اسم فاعل عامل، فقد وقع في موقع الحال، وكلمة (عهد) مفعول به لاسم الفاعل العامل."},

{n:49, type:"mcq", passage:null, text:"49- بيّن - مما يلي - التركيب الصحيح نحويًا.",
 options:["لا ذوي علمٍ مهضومٌ حقهم.","لا ذا علمٍ مهضومًا حقهم.","لا ذو علمٍ مهضومٌ حقهم.","لا ذو علمٍ مهضومًا حقهم."],
 correct:0,
 explain:"* (ذوي) اسم (لا) النافية للجنس منصوب بالياء لأنه ملحق بجمع المذكر السالم، وهو مضاف + (علمٍ) مضاف إليه + (مهضوم) خبر (لا) مرفوع بالضمة وهو اسم مفعول عامل + (حقهم) نائب فاعل لاسم المفعول العامل.\nبقية الإجابات خطأ:\n(ب) مهضومًا: فخبر (لا) يُرفع ولا يُنصب.\n(ج) ذو: فهو مرفوع بالواو، بينما اسم (لا) ينصب.\n(د) مهضومًا: فخبر (لا) يُرفع ولا يُنصب."},

{n:50, type:"mcq", passage:null, text:"(إن كثيرًا من الناس يهدر مجهوده وهو يسعى حثيثًا لنيل السعادة ظانًّا أنها في المال فقط، ولا يعلم أنه قد نحا منحى بعيدًا)\n\n50- حدد - مما يلي - النائب عن المفعول المطلق الوارد في المقولة السابقة.",
 options:["كثيرًا.","حثيثًا.","ظانًّا.","بعيدًا."],
 correct:1,
 explain:"لأنها صفة المفعول المطلق المحذوف (سعيًا حثيثًا)."},

{n:51, type:"mcq", passage:null, text:"51- حدد الجملة التي تشتمل على اسم مفعول في الجمل التالية.",
 options:["البيت الحرام معتاد أبي كل عام.","المسئولية معتاد عليها من قبل القادة.","الشعب الفلسطيني معتاد على الشدائد.","غروب الشمس معتادي للتنزه بالحديقة."],
 correct:1,
 explain:"* (معتاد) في (ب) تؤدي معنى الفعل المبني للمجهول (يُعتاد)، بينما بقية الإجابات خطأ لأن:\n(أ) معتاد: اسم مكان يعود على البيت الحرام.\n(ج) معتاد: اسم فاعل يؤدي معنى الفعل المبني للمعلوم.\n(د) معتادي: اسم زمان."},

{n:52, type:"essay", passage:null, text:"(إن تتقِ ربك تصبر إلى الجنة)\n\n52- خاطب بالجملة السابقة المثنى المؤنث.",
 model:"إن تتقيا ربكما تصبرا إلى الجنة\n\n* (تتقيا): فعل مضارع مجزوم بـ (إن) الشرطية، وعلامة جزمه حذف النون لأنه من الأفعال الخمسة.\n* (تصبرا): جواب الشرط مجزوم بنفس العلامة (حذف النون)."},

{n:53, type:"mcq", passage:"p53", text:"53- حدد التفصيلة التي يجدر بالكاتب حذفها؛ لتكون كتابته وثيقة الصلة بالموضوع.",
 options:["التحول إلى مصادر الطاقة المتجددة كالطاقة الشمسية وطاقة الرياح يقلل الانبعاثات الكربونية.","تشجيع الأفراد على استخدام الأجهزة الكهربائية بدلًا من الأجهزة التي تعمل عن طريق الغاز.","وضع قوانين تحد من الانبعاثات الصناعية يقلل تأثير ظاهرة الاحتباس الحراري في المدى البعيد.","تحسين التغذية الصحية للأفراد يعزز قدرتهم على مقاومة الأمراض الناتجة عن التغيرات المناخية."],
 correct:3,
 explain:"لأن التغذية أمر لا علاقة له بالحد من الانبعاثات أو الاحتباس الحراري."},

{n:54, type:"mcq", passage:"p54", text:"54- حدد النموذج الذي اتبعه الكاتب في ترتيب الفقرتين اللتين يتألف منهما المقال السابق.",
 options:["مشكلة - حل.","مقدمة - نتيجة.","زعم - تفنيد.","رأي - دليل."],
 correct:0,
 explain:"فقد تحدث الكاتب في الفقرة الأولى عن مشكلة الإدمان الرقمي وأضراره، وفي الفقرة الثانية اقترح حلولًا للحد من تلك المشكلة."},

const container = document.getElementById("examArea");
let lastPassage = null;

data.forEach((q, idx) => {
  if (q.passage && q.passage !== lastPassage) {
    const pdiv = document.createElement("div");
    pdiv.className = "passage";
    pdiv.textContent = passages[q.passage];
    container.appendChild(pdiv);
    lastPassage = q.passage;
  }
  if (!q.passage) lastPassage = null;

  const qdiv = document.createElement("div");
  qdiv.className = "question";
  qdiv.id = "q" + q.n;

  const qt = document.createElement("div");
  qt.className = "qtext";
  qt.textContent = q.text;
  qdiv.appendChild(qt);

  if (q.type === "mcq") {
    const ul = document.createElement("ul");
    ul.className = "options";
    const letters = ["أ","ب","ج","د"];
    q.options.forEach((opt, i) => {
      const li = document.createElement("li");
      li.textContent = letters[i] + ") " + opt;
      li.dataset.index = i;
      li.onclick = () => {
        if (qdiv.classList.contains("checked")) return;
        ul.querySelectorAll("li").forEach(l => l.classList.remove("selected"));
        li.classList.add("selected");
        saveAnswer(q.n, i);
      };
      ul.appendChild(li);
    });
    qdiv.appendChild(ul);

    const exp = document.createElement("div");
    exp.className = "explain";
    exp.textContent = "التوضيح: " + q.explain;
    qdiv.appendChild(exp);
  } else {
    const ta = document.createElement("textarea");
    ta.className = "essay-box";
    ta.placeholder = "اكتب إجابتك هنا...";
    ta.oninput = (e) => {
      saveAnswer(q.n, e.target.value);
    };
    qdiv.appendChild(ta);

    const ans = document.createElement("div");
    ans.className = "model-answer";
    ans.textContent = "الإجابة النموذجية:\n" + q.model;
    qdiv.appendChild(ans);
  }

  container.appendChild(qdiv);
});

function checkAnswers() {
  let correctCount = 0;
  let totalMcq = 0;
  data.forEach(q => {
    if (q.type !== "mcq") return;
    totalMcq++;
    const qdiv = document.getElementById("q" + q.n);
    qdiv.classList.add("checked");
    const lis = qdiv.querySelectorAll(".options li");
    let selectedIndex = -1;
    lis.forEach((li, i) => {
      if (li.classList.contains("selected")) selectedIndex = i;
    });
    lis.forEach((li, i) => {
      if (i === q.correct) li.classList.add("correct");
      if (selectedIndex === i && i !== q.correct) li.classList.add("wrong");
    });
    if (selectedIndex === q.correct) correctCount++;
    qdiv.querySelector(".explain").style.display = "block";
  });

  // show essay model answers too
  data.forEach(q => {
    if (q.type === "essay") {
      document.getElementById("q" + q.n).querySelector(".model-answer").style.display = "block";
    }
  });

  const box = document.getElementById("scoreBox");
  box.style.display = "block";
  const percent = Math.round((correctCount / totalMcq) * 100);
  box.textContent = "النتيجة: " + correctCount + " من " + totalMcq + " (" + percent + "%)";
  box.scrollIntoView({behavior:"smooth"});
}

function showAllAnswers() {
  data.forEach(q => {
    const qdiv = document.getElementById("q" + q.n);
    if (q.type === "mcq") {
      qdiv.classList.add("checked");
      const lis = qdiv.querySelectorAll(".options li");
      lis.forEach((li, i) => {
        if (i === q.correct) li.classList.add("correct");
      });
      qdiv.querySelector(".explain").style.display = "block";
    } else {
      qdiv.querySelector(".model-answer").style.display = "block";
    }
  });
}
